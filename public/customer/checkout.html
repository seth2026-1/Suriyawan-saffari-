<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Checkout - Suriyanwa Saffari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .step-active .step-number {
            background: #f59e0b;
            color: white;
            border-color: #f59e0b;
        }
        .step-completed .step-number {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }
        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            background: white;
        }
        .address-card.selected {
            border-color: #10b981;
            background: #f0fdf4;
        }
        .golden-claim-btn {
            background: linear-gradient(135deg, #facc15, #eab308, #ca8a04);
            color: #451a03;
            font-weight: 900;
        }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 12px;
            z-index: 200;
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24">

<div id="toast" class="toast"></div>

<!-- Header -->
<nav class="bg-white p-4 flex items-center gap-3 border-b sticky top-0 z-50">
    <button onclick="window.history.back()" class="text-gray-600">
        <i class="fa-solid fa-chevron-left text-xl"></i>
    </button>
    <h2 class="text-xl font-black text-blue-900">Checkout</h2>
</nav>

<!-- Progress Steps -->
<div class="flex justify-between items-center px-6 py-5 bg-white mb-3">
    <div class="flex flex-col items-center gap-1 step-active" id="step1">
        <div class="step-number">1</div>
        <span class="text-[9px] font-bold text-orange-600 uppercase text-center">Address<br>& Payment</span>
    </div>
    <div class="h-[2px] bg-orange-200 flex-1 mx-3"></div>
    <div class="flex flex-col items-center gap-1" id="step2">
        <div class="step-number">2</div>
        <span class="text-[9px] font-medium text-gray-400 uppercase text-center">Confirm</span>
    </div>
</div>

<!-- Main Content -->
<div id="checkoutContent" class="px-4 space-y-4 pb-24">
    <!-- Loading State -->
    <div class="bg-white p-8 rounded-2xl text-center">
        <div class="loader mx-auto mb-3"></div>
        <p class="text-gray-500">Loading checkout...</p>
    </div>
</div>

<!-- Bottom Button (Fixed) -->
<div id="bottomBar" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t shadow-lg hidden">
    <div class="flex items-center justify-between">
        <div>
            <span class="text-[10px] text-gray-400 font-bold uppercase">Total Amount</span>
            <span id="bottomTotal" class="text-xl font-black text-blue-900">₹0</span>
        </div>
        <button id="placeOrderBtn" onclick="placeOrder()" class="bg-gradient-to-r from-orange-500 to-orange-600 text-white px-8 py-4 rounded-2xl font-black text-sm shadow-lg shadow-orange-200 active:scale-95 transition-all">
            PLACE ORDER <i class="fa-solid fa-circle-check ml-2"></i>
        </button>
    </div>
</div>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>
<script src="/js/cart-manager.js"></script>

<script>
    let cartItems = [];
    let selectedAddress = null;
    let addresses = [];
    let useWallet = false;
    let useCoins = false;
    let userData = null;
    let deliveryCharge = 40;
    let freeDeliveryMin = 499;
    let codAvailable = true;
    
    // Source: 'cart' or 'buynow'
    const urlParams = new URLSearchParams(window.location.search);
    const source = urlParams.get('source') || 'cart';
    
    document.addEventListener('DOMContentLoaded', function() {
        loadCheckoutData();
    });
    
    async function loadCheckoutData() {
        const user = AuthService.getCurrentUser();
        if (!user || !user.cust_id) {
            showToast('Please login to continue', 'warning');
            setTimeout(() => location.href = 'login.html?redirect=checkout.html', 1500);
            return;
        }
        
        userData = user;
        
        // Load cart or buy now item
        if (source === 'buynow') {
            const buyNowItem = sessionStorage.getItem('buyNowItem');
            if (buyNowItem) {
                cartItems = [JSON.parse(buyNowItem)];
                sessionStorage.removeItem('buyNowItem');
            } else {
                cartItems = [];
            }
        } else {
            await loadCart();
        }
        
        if (cartItems.length === 0) {
            document.getElementById('checkoutContent').innerHTML = `
                <div class="bg-white p-8 rounded-2xl text-center">
                    <i class="fa-solid fa-cart-shopping text-5xl text-gray-300 mb-3"></i>
                    <p class="text-gray-500 mb-4">Your cart is empty</p>
                    <button onclick="location.href='shop.html'" class="bg-orange-600 text-white px-6 py-2 rounded-xl">Shop Now</button>
                </div>
            `;
            return;
        }
        
        await loadAddresses();
        await loadSettings();
        renderCheckout();
    }
    
    async function loadCart() {
        try {
            const response = await fetch(`/api/customer/cart?cust_id=${userData.cust_id}`, {
                headers: AuthService.getAuthHeaders()
            });
            const data = await response.json();
            if (data.success) {
                cartItems = data.cart || [];
            }
        } catch (error) {
            console.error('Error loading cart:', error);
        }
    }
    
    async function loadAddresses() {
        try {
            const response = await fetch(`/api/customer/profile?cust_id=${userData.cust_id}`, {
                headers: AuthService.getAuthHeaders()
            });
            const data = await response.json();
            if (data.success && data.addresses) {
                addresses = data.addresses;
                selectedAddress = addresses.find(a => a.is_default) || addresses[0];
            }
        } catch (error) {
            console.error('Error loading addresses:', error);
        }
    }
    
    async function loadSettings() {
        try {
            const response = await fetch('/api/owner/settings/cod-settings');
            const data = await response.json();
            if (data.success) {
                deliveryCharge = parseInt(data.settings.delivery_charge) || 40;
                freeDeliveryMin = parseInt(data.settings.free_delivery_min) || 499;
            }
        } catch (error) {
            console.error('Error loading settings:', error);
        }
    }
    
    function renderCheckout() {
        // Calculate totals
        let subtotal = 0;
        let itemsHtml = '';
        
        cartItems.forEach(item => {
            const itemTotal = (item.current_price || item.price) * item.quantity;
            subtotal += itemTotal;
            
            itemsHtml += `
                <div class="flex gap-3 border-b pb-3 mb-3">
                    <img src="${item.image || 'https://via.placeholder.com/60/f9f9f9/000?text=Product'}" class="w-16 h-16 rounded-xl object-cover">
                    <div class="flex-1">
                        <p class="text-xs font-bold text-gray-800 leading-tight">${item.name}</p>
                        <p class="text-[10px] text-gray-400 mt-1">Qty: ${item.quantity}</p>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-sm font-black text-blue-900">₹${item.current_price || item.price}</span>
                            <span class="text-[9px] text-gray-400 line-through">₹${item.mrp}</span>
                        </div>
                    </div>
                </div>
            `;
        });
        
        const discount = cartItems.reduce((sum, item) => sum + ((item.mrp - (item.current_price || item.price)) * item.quantity), 0);
        const finalSubtotal = subtotal;
        const finalDelivery = (finalSubtotal >= freeDeliveryMin) ? 0 : deliveryCharge;
        const total = finalSubtotal + finalDelivery;
        
        const checkoutHtml = `
            <!-- Delivery Address Section -->
            <div class="bg-white p-4 rounded-2xl border border-blue-100 shadow-sm">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-black text-blue-900 text-sm flex items-center gap-2">
                        <i class="fa-solid fa-location-dot text-orange-600"></i> Delivery Address
                    </h3>
                    <button onclick="openAddressModal()" class="text-[10px] font-bold text-orange-600">Change / Add</button>
                </div>
                ${selectedAddress ? `
                    <div class="bg-blue-50 p-3 rounded-xl">
                        <p class="text-sm font-bold text-gray-800">${selectedAddress.name || userData.name}</p>
                        <p class="text-xs text-gray-600 mt-1">${selectedAddress.address_line1}, ${selectedAddress.city}, ${selectedAddress.state} - ${selectedAddress.pincode}</p>
                        <p class="text-xs font-bold text-blue-900 mt-2">${selectedAddress.mobile || userData.mobile}</p>
                    </div>
                ` : `
                    <button onclick="openAddressModal()" class="w-full py-3 border-2 border-dashed border-gray-300 rounded-xl text-center text-gray-500 text-sm">
                        + Add Delivery Address
                    </button>
                `}
            </div>
            
            <!-- Order Summary -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="font-black text-blue-900 mb-3 text-xs uppercase tracking-wide">Order Summary</h3>
                ${itemsHtml}
                
                <div class="space-y-2 pt-2">
                    <div class="flex justify-between text-xs text-gray-500">
                        <span>Total MRP</span>
                        <span class="line-through">₹${(subtotal + discount).toFixed(0)}</span>
                    </div>
                    <div class="flex justify-between text-xs text-gray-500">
                        <span>Discount on MRP</span>
                        <span class="text-green-600">-₹${discount.toFixed(0)}</span>
                    </div>
                    <div class="flex justify-between text-xs text-gray-500">
                        <span>Delivery Fee</span>
                        <span class="text-green-600">${finalDelivery === 0 ? 'FREE' : `₹${finalDelivery}`}</span>
                    </div>
                    <div class="flex justify-between text-sm font-black text-blue-900 pt-2 border-t mt-2">
                        <span>Total Amount</span>
                        <span>₹${total.toFixed(0)}</span>
                    </div>
                </div>
            </div>
            
            <!-- Payment Methods (COD Only) -->
            <div class="bg-white p-4 rounded-2xl border border-gray-100">
                <h3 class="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest">Payment Method</h3>
                
                <label class="block cursor-pointer">
                    <input type="radio" name="payment" value="cod" checked class="hidden peer">
                    <div class="bg-white p-4 rounded-xl border-2 border-gray-200 peer-checked:border-green-500 peer-checked:bg-green-50 transition-all flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center text-green-600">
                                <i class="fa-solid fa-truck-fast text-xl"></i>
                            </div>
                            <div>
                                <p class="font-black text-blue-900 text-sm">Cash on Delivery</p>
                                <p class="text-[10px] text-green-600 font-medium">Pay at your doorstep • Open box delivery</p>
                            </div>
                        </div>
                        <div class="w-5 h-5 rounded-full border-2 border-gray-300 peer-checked:border-green-600 flex items-center justify-center">
                            <div class="w-3 h-3 bg-green-600 rounded-full scale-0 peer-checked:scale-100 transition-transform"></div>
                        </div>
                    </div>
                </label>
                
                <!-- Wallet Option -->
                <div class="mt-3">
                    <label class="flex items-center gap-3 cursor-pointer p-3 bg-gray-50 rounded-xl">
                        <input type="checkbox" id="useWallet" onchange="toggleWallet()" class="w-4 h-4">
                        <div>
                            <p class="text-sm font-bold text-gray-700">Use Wallet Balance</p>
                            <p class="text-xs text-gray-500">Available: ₹${userData?.wallet_balance || 0}</p>
                        </div>
                    </label>
                </div>
                
                <!-- Coins Option -->
                <div class="mt-2">
                    <label class="flex items-center gap-3 cursor-pointer p-3 bg-gradient-to-r from-yellow-50 to-amber-50 rounded-xl">
                        <input type="checkbox" id="useCoins" onchange="toggleCoins()" class="w-4 h-4">
                        <div>
                            <p class="text-sm font-bold text-amber-700">Use Gift Coins</p>
                            <p class="text-xs text-amber-600">1 Coin = ₹1 | Available: ${userData?.coins || 0} coins</p>
                        </div>
                    </label>
                </div>
            </div>
            
            <!-- Secure Payment Notice -->
            <div class="px-2 py-3 flex items-center gap-2 bg-green-50 rounded-xl border border-green-100">
                <i class="fa-solid fa-shield-halved text-green-600 text-lg"></i>
                <p class="text-[10px] text-green-800 font-medium leading-tight">
                    100% Secure | Cash on Delivery Only | Open Box Delivery Available
                </p>
            </div>
        `;
        
        document.getElementById('checkoutContent').innerHTML = checkoutHtml;
        document.getElementById('bottomBar').classList.remove('hidden');
        document.getElementById('bottomTotal').innerHTML = `₹${total.toFixed(0)}`;
    }
    
    function openAddressModal() {
        // Simple address addition prompt
        const pincode = prompt('Enter delivery pincode:');
        if (pincode && pincode.length === 6) {
            selectedAddress = {
                name: userData.name,
                mobile: userData.mobile,
                address_line1: 'New Address',
                city: 'Suriyawan',
                state: 'Uttar Pradesh',
                pincode: pincode
            };
            renderCheckout();
        } else {
            showToast('Invalid pincode', 'error');
        }
    }
    
    function toggleWallet() {
        const check = document.getElementById('useWallet');
        useWallet = check.checked;
        renderCheckout();
    }
    
    function toggleCoins() {
        const check = document.getElementById('useCoins');
        useCoins = check.checked;
        renderCheckout();
    }
    
    async function placeOrder() {
        if (!selectedAddress) {
            showToast('Please add delivery address', 'warning');
            return;
        }
        
        const placeBtn = document.getElementById('placeOrderBtn');
        placeBtn.disabled = true;
        placeBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Placing Order...';
        
        // Prepare order items
        const orderItems = cartItems.map(item => ({
            prod_id: item.prod_id,
            quantity: item.quantity,
            price: item.current_price || item.price,
            variation_id: item.variation_id || null
        }));
        
        let subtotal = cartItems.reduce((sum, item) => sum + ((item.current_price || item.price) * item.quantity), 0);
        let finalDelivery = (subtotal >= freeDeliveryMin) ? 0 : deliveryCharge;
        let finalAmount = subtotal + finalDelivery;
        
        // Apply wallet deduction
        let walletDeduction = 0;
        if (useWallet && userData.wallet_balance > 0) {
            walletDeduction = Math.min(userData.wallet_balance, finalAmount);
            finalAmount -= walletDeduction;
        }
        
        // Apply coins deduction
        let coinDeduction = 0;
        if (useCoins && userData.coins > 0) {
            coinDeduction = Math.min(userData.coins, finalAmount);
            finalAmount -= coinDeduction;
        }
        
        const orderData = {
            cust_id: userData.cust_id,
            items: orderItems,
            address: selectedAddress,
            total_amount: subtotal,
            delivery_charge: finalDelivery,
            discount_amount: 0,
            final_amount: finalAmount,
            use_wallet: useWallet,
            use_coins: useCoins,
            wallet_amount: walletDeduction,
            coins_amount: coinDeduction
        };
        
        try {
            const response = await fetch('/api/customer/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });
            
            const data = await response.json();
            
            if (data.success) {
                // Clear cart
                if (source === 'cart') {
                    await fetch(`/api/customer/cart?cust_id=${userData.cust_id}`, { method: 'DELETE' });
                }
                
                // Store order info for success page
                sessionStorage.setItem('lastOrder', JSON.stringify({
                    book_id: data.orders[0]?.book_id,
                    amount: finalAmount,
                    cancel_code: data.orders[0]?.cancel_code
                }));
                
                location.href = 'order-success.html';
            } else {
                showToast(data.error || 'Order failed', 'error');
                placeBtn.disabled = false;
                placeBtn.innerHTML = 'PLACE ORDER <i class="fa-solid fa-circle-check ml-2"></i>';
            }
        } catch (error) {
            console.error('Order error:', error);
            showToast('Failed to place order', 'error');
            placeBtn.disabled = false;
            placeBtn.innerHTML = 'PLACE ORDER <i class="fa-solid fa-circle-check ml-2"></i>';
        }
    }
    
    function showToast(message, type) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.backgroundColor = type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#10b981';
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }
</script>
</body>
</html>
