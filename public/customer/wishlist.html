<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>My Wishlist - Suriyanwa Saffari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .wishlist-item {
            transition: all 0.3s ease;
        }
        .wishlist-item.removing {
            opacity: 0;
            transform: translateX(20px);
        }
        .golden-claim-btn {
            background: linear-gradient(135deg, #facc15, #eab308, #ca8a04);
            color: #451a03;
            font-weight: 900;
        }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 12px;
            z-index: 200;
            display: none;
        }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-36">

<div id="toast" class="toast"></div>

<!-- Header -->
<header class="bg-white sticky top-0 z-50 shadow-md">
    <div class="p-4 flex items-center justify-between border-b border-gray-100">
        <button onclick="window.history.back()" class="text-blue-900 text-xl">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        
        <div class="flex flex-col items-center">
            <h1 class="text-2xl font-black text-blue-900 italic tracking-tighter">
                SURIYANWA <span class="text-orange-600">SAFFARI</span>
            </h1>
            <p class="text-[10px] text-orange-600 uppercase tracking-[2px] mt-0.5 font-bold">
                MY WISHLIST
            </p>
        </div>

        <div class="flex gap-3 text-gray-500">
            <button onclick="location.reload()" class="active:rotate-180 transition-all duration-500">
                <i class="fa-solid fa-arrows-rotate text-lg"></i>
            </button>
            <div class="relative cursor-pointer" onclick="location.href='cart.html'">
                <i class="fa-solid fa-cart-shopping text-lg"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-orange-600 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </div>
        </div>
    </div>
</header>

<!-- Folder Tabs -->
<div class="bg-white border-b px-4">
    <div class="flex gap-4 overflow-x-auto no-scrollbar">
        <button class="folder-tab active py-3 text-sm font-bold text-orange-600 border-b-2 border-orange-600" data-folder="all" onclick="selectFolder('all')">All Items</button>
        <button class="folder-tab py-3 text-sm font-bold text-gray-500" data-folder="Default" onclick="selectFolder('Default')">Default</button>
        <button class="folder-tab py-3 text-sm font-bold text-gray-500" data-folder="Fashion" onclick="selectFolder('Fashion')">Fashion</button>
        <button class="folder-tab py-3 text-sm font-bold text-gray-500" data-folder="Electronics" onclick="selectFolder('Electronics')">Electronics</button>
        <button class="folder-tab py-3 text-sm font-bold text-gray-500" data-folder="Home" onclick="selectFolder('Home')">Home</button>
        <button onclick="createNewFolder()" class="py-3 text-sm font-bold text-gray-400">
            <i class="fa-solid fa-plus"></i> New
        </button>
    </div>
</div>

<!-- Wishlist Stats -->
<div class="px-4 py-3 bg-white border-b flex justify-between items-center">
    <div>
        <span id="wishlistCount" class="text-sm font-bold text-blue-900">0</span>
        <span class="text-xs text-gray-500"> items in wishlist</span>
    </div>
    <button onclick="clearWishlist()" class="text-xs text-red-500 font-medium">Clear All</button>
</div>

<!-- Wishlist Items -->
<main class="px-4 py-4">
    <div id="wishlistGrid" class="space-y-3">
        <div class="skeleton h-28 rounded-xl"></div>
        <div class="skeleton h-28 rounded-xl"></div>
        <div class="skeleton h-28 rounded-xl"></div>
    </div>
    <div id="emptyWishlist" class="text-center py-12 hidden">
        <i class="fa-regular fa-heart text-5xl text-gray-300 mb-3"></i>
        <h3 class="text-lg font-bold text-gray-700 mb-2">Your wishlist is empty</h3>
        <p class="text-gray-500 text-sm mb-4">Save your favorite items here</p>
        <button onclick="location.href='shop.html'" class="bg-orange-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm">
            Start Shopping
        </button>
    </div>
</main>

<!-- Bottom Navigation -->
<div class="fixed bottom-3 left-3 right-3 z-[100]">
    <nav class="bg-white/95 backdrop-blur-xl border border-gray-200 rounded-[2rem] shadow-2xl flex justify-around items-center py-2.5">
        <button onclick="location.href='index.html'" class="text-gray-400 flex flex-col items-center gap-0.5">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[8px] font-black uppercase">Home</span>
        </button>
        <button onclick="location.href='shop.html'" class="text-gray-400 flex flex-col items-center gap-0.5">
            <i class="fa-solid fa-table-cells-large text-xl"></i>
            <span class="text-[8px] font-bold uppercase">Shop</span>
        </button>
        <div class="flex flex-col items-center -mt-7">
            <button onclick="location.href='cart.html'" class="bg-orange-500 text-white w-14 h-14 rounded-full shadow-2xl border-[5px] border-gray-50 flex items-center justify-center">
                <i class="fa-solid fa-cart-shopping text-xl"></i>
            </button>
            <div class="mt-2 text-center w-24">
                <div class="text-amber-600 font-bold text-sm flex items-center justify-center gap-1">
                    <i class="fa-solid fa-coins"></i>
                    <span id="walletBalance">0</span>
                </div>
                <button onclick="claimWallet()" class="golden-claim-btn mt-1 px-5 py-1.5 rounded-2xl text-[10px] uppercase w-full">
                    Claim
                </button>
            </div>
        </div>
        <button onclick="location.href='services.html'" class="text-gray-400 flex flex-col items-center gap-0.5">
            <i class="fa-solid fa-layer-group text-xl"></i>
            <span class="text-[8px] font-bold uppercase">Services</span>
        </button>
        <button onclick="location.href='account.html'" class="text-gray-400 flex flex-col items-center gap-0.5">
            <i class="fa-regular fa-user text-xl"></i>
            <span class="text-[8px] font-bold uppercase">Account</span>
        </button>
    </nav>
</div>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>
<script src="/js/cart-manager.js"></script>

<script>
    let wishlistItems = [];
    let currentFolder = 'all';
    
    document.addEventListener('DOMContentLoaded', function() {
        loadWishlist();
        loadWalletBalance();
        updateCartCount();
    });
    
    async function loadWishlist() {
        const user = AuthService.getCurrentUser();
        if (!user || !user.cust_id) {
            document.getElementById('wishlistGrid').innerHTML = '<div class="text-center text-gray-500 py-8">Please login to view wishlist</div>';
            return;
        }
        
        try {
            let url = `/api/customer/wishlist?cust_id=${user.cust_id}`;
            if (currentFolder !== 'all') {
                url += `&folder=${encodeURIComponent(currentFolder)}`;
            }
            
            const response = await fetch(url, {
                headers: AuthService.getAuthHeaders()
            });
            const data = await response.json();
            
            if (data.success) {
                wishlistItems = data.wishlist || [];
                renderWishlist();
                document.getElementById('wishlistCount').innerText = wishlistItems.length;
            }
        } catch (error) {
            console.error('Error loading wishlist:', error);
            showToast('Failed to load wishlist', 'error');
        }
    }
    
    function renderWishlist() {
        const container = document.getElementById('wishlistGrid');
        const emptyDiv = document.getElementById('emptyWishlist');
        
        if (wishlistItems.length === 0) {
            container.innerHTML = '';
            emptyDiv.classList.remove('hidden');
            return;
        }
        
        emptyDiv.classList.add('hidden');
        
        let html = '';
        wishlistItems.forEach((item, index) => {
            const discount = Math.round(((item.mrp - item.current_price) / item.mrp) * 100);
            html += `
                <div class="wishlist-item bg-white rounded-2xl border border-gray-100 p-3 flex gap-3" data-index="${index}">
                    <img src="${item.image || 'https://via.placeholder.com/80/f9f9f9/000?text=Product'}" class="w-20 h-20 rounded-xl object-cover">
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-bold text-sm text-gray-800 line-clamp-2">${item.name}</p>
                                <p class="text-[10px] text-gray-500 mt-0.5">${item.seller?.shop_name || 'Suriyawan Saffari'}</p>
                            </div>
                            <button onclick="removeFromWishlist(${index})" class="text-red-400">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <div>
                                <span class="text-base font-bold text-blue-900">₹${item.current_price}</span>
                                <span class="text-[10px] text-gray-400 line-through ml-1">₹${item.mrp}</span>
                                ${discount > 0 ? `<p class="text-[9px] font-bold text-green-600">${discount}% OFF</p>` : ''}
                            </div>
                            <button onclick="addToCartFromWishlist(${index})" class="bg-blue-900 text-white px-4 py-2 rounded-xl text-xs font-bold">
                                <i class="fa-solid fa-cart-shopping mr-1"></i> Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }
    
    function selectFolder(folder) {
        currentFolder = folder;
        
        // Update active tab
        document.querySelectorAll('.folder-tab').forEach(tab => {
            tab.classList.remove('active', 'text-orange-600', 'border-orange-600');
            tab.classList.add('text-gray-500');
            if (tab.dataset.folder === folder) {
                tab.classList.add('active', 'text-orange-600', 'border-orange-600');
                tab.classList.remove('text-gray-500');
            }
        });
        
        loadWishlist();
    }
    
    async function removeFromWishlist(index) {
        const item = wishlistItems[index];
        if (!item) return;
        
        const user = AuthService.getCurrentUser();
        if (!user) return;
        
        const element = document.querySelector(`.wishlist-item[data-index="${index}"]`);
        if (element) element.classList.add('removing');
        
        setTimeout(async () => {
            try {
                const response = await fetch(`/api/customer/wishlist?cust_id=${user.cust_id}&prod_id=${item.prod_id}`, {
                    method: 'DELETE',
                    headers: AuthService.getAuthHeaders()
                });
                
                const data = await response.json();
                if (data.success) {
                    wishlistItems.splice(index, 1);
                    renderWishlist();
                    document.getElementById('wishlistCount').innerText = wishlistItems.length;
                    showToast('Removed from wishlist', 'info');
                }
            } catch (error) {
                console.error('Error removing from wishlist:', error);
                showToast('Failed to remove', 'error');
            }
        }, 200);
    }
    
    async function addToCartFromWishlist(index) {
        const item = wishlistItems[index];
        if (!item) return;
        
        const user = AuthService.getCurrentUser();
        if (!user || !user.cust_id) {
            showToast('Please login to add to cart', 'warning');
            setTimeout(() => location.href = 'login.html', 1500);
            return;
        }
        
        try {
            const response = await fetch('/api/customer/cart', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    cust_id: user.cust_id,
                    prod_id: item.prod_id,
                    quantity: 1
                })
            });
            
            const data = await response.json();
            if (data.success) {
                showToast('Added to cart!', 'success');
                updateCartCount();
                // Optionally remove from wishlist
                removeFromWishlist(index);
            } else {
                showToast(data.error || 'Failed to add', 'error');
            }
        } catch (error) {
            console.error('Add to cart error:', error);
            showToast('Failed to add to cart', 'error');
        }
    }
    
    async function clearWishlist() {
        if (wishlistItems.length === 0) return;
        
        if (confirm('Are you sure you want to clear your entire wishlist?')) {
            const user = AuthService.getCurrentUser();
            if (!user) return;
            
            for (const item of wishlistItems) {
                await fetch(`/api/customer/wishlist?cust_id=${user.cust_id}&prod_id=${item.prod_id}`, {
                    method: 'DELETE',
                    headers: AuthService.getAuthHeaders()
                });
            }
            
            wishlistItems = [];
            renderWishlist();
            document.getElementById('wishlistCount').innerText = 0;
            showToast('Wishlist cleared', 'info');
        }
    }
    
    function createNewFolder() {
        const folderName = prompt('Enter folder name:');
        if (folderName && folderName.trim()) {
            showToast('Folder feature coming soon!', 'info');
        }
    }
    
    async function loadWalletBalance() {
        const user = AuthService.getCurrentUser();
        if (user && user.wallet_balance !== undefined) {
            document.getElementById('walletBalance').innerText = user.wallet_balance || 0;
        }
    }
    
    function claimWallet() {
        if (!AuthService.isAuthenticated()) {
            location.href = 'login.html';
            return;
        }
        location.href = 'account.html?tab=wallet';
    }
    
    async function updateCartCount() {
        if (CartManager) {
            const count = CartManager.getCartCount();
            const badge = document.getElementById('cartCount');
            if (badge) {
                if (count > 0) {
                    badge.innerText = count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
        }
    }
    
    function showToast(message, type) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.backgroundColor = type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#10b981';
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }
</script>
</body>
</html>
