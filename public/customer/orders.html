<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>My Orders - Suriyanwa Saffari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .filter-chip-active {
            background: #f59e0b !important;
            color: white !important;
        }
        .order-card {
            transition: all 0.2s ease;
        }
        .order-card:active {
            transform: scale(0.98);
        }
        .golden-claim-btn {
            background: linear-gradient(135deg, #facc15, #eab308, #ca8a04);
            color: #451a03;
            font-weight: 900;
        }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 12px;
            z-index: 200;
            display: none;
        }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-36">

<div id="toast" class="toast"></div>

<!-- Header -->
<header class="bg-white sticky top-0 z-50 shadow-md">
    <div class="p-4 flex items-center justify-between border-b border-gray-100">
        <button onclick="window.history.back()" class="text-blue-900 text-xl">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        
        <div class="flex flex-col items-center">
            <h1 class="text-2xl font-black text-blue-900 italic tracking-tighter">
                SURIYANWA <span class="text-orange-600">SAFFARI</span>
            </h1>
            <p class="text-[10px] text-orange-600 uppercase tracking-[2px] mt-0.5 font-bold">
                MY ORDERS
            </p>
        </div>

        <div class="flex gap-3 text-gray-500">
            <button onclick="location.reload()" class="active:rotate-180 transition-all duration-500">
                <i class="fa-solid fa-arrows-rotate text-lg"></i>
            </button>
            <div class="relative cursor-pointer" onclick="location.href='cart.html'">
                <i class="fa-solid fa-cart-shopping text-lg"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-orange-600 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </div>
        </div>
    </div>
</header>

<!-- Search Bar -->
<div class="px-4 py-3 bg-white border-b">
    <div class="relative flex items-center">
        <i class="fa-solid fa-magnifying-glass absolute left-3 text-gray-400 text-sm"></i>
        <input type="text" id="searchInput" placeholder="Search by order ID or product name..." class="w-full bg-gray-100 rounded-xl py-2.5 pl-10 pr-10 text-sm focus:outline-none border border-gray-200">
    </div>
</div>

<!-- Filter Chips -->
<div class="bg-white px-4 py-2 border-b overflow-x-auto no-scrollbar flex gap-2">
    <button class="filter-chip px-4 py-1.5 rounded-full text-xs font-medium bg-orange-500 text-white" data-status="all" onclick="filterOrders('all')">All</button>
    <button class="filter-chip px-4 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700" data-status="PENDING" onclick="filterOrders('PENDING')">Pending</button>
    <button class="filter-chip px-4 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700" data-status="ACCEPTED" onclick="filterOrders('ACCEPTED')">Accepted</button>
    <button class="filter-chip px-4 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700" data-status="SHIPPED" onclick="filterOrders('SHIPPED')">Shipped</button>
    <button class="filter-chip px-4 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700" data-status="OUT_FOR_DELIVERY" onclick="filterOrders('OUT_FOR_DELIVERY')">Out for Delivery</button>
    <button class="filter-chip px-4 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700" data-status="DELIVERED" onclick="filterOrders('DELIVERED')">Delivered</button>
    <button class="filter-chip px-4 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700" data-status="CANCELLED" onclick="filterOrders('CANCELLED')">Cancelled</button>
    <button class="filter-chip px-4 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700" data-status="RTO" onclick="filterOrders('RTO')">RTO</button>
</div>

<!-- Order Stats -->
<div class="bg-white px-4 py-3 border-b flex justify-between items-center">
    <div>
        <span id="orderCount" class="text-sm font-bold text-blue-900">0</span>
        <span class="text-xs text-gray-500"> orders found</span>
    </div>
    <div class="flex gap-3">
        <button onclick="toggleSort()" class="text-xs text-gray-500">
            <i class="fa-solid fa-arrow-down-wide-short"></i> Sort by date
        </button>
    </div>
</div>

<!-- Orders List -->
<main class="p-4 pb-32">
    <div id="ordersContainer" class="space-y-3">
        <div class="skeleton h-32 rounded-xl"></div>
        <div class="skeleton h-32 rounded-xl"></div>
        <div class="skeleton h-32 rounded-xl"></div>
    </div>
    <div id="emptyOrders" class="text-center py-12 hidden">
        <i class="fa-solid fa-box-open text-5xl text-gray-300 mb-3"></i>
        <h3 class="text-lg font-bold text-gray-700 mb-2">No orders found</h3>
        <p class="text-gray-500 text-sm mb-4">You haven't placed any orders yet</p>
        <button onclick="location.href='shop.html'" class="bg-orange-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm">
            Start Shopping
        </button>
    </div>
    <div id="loadMoreBtn" class="text-center mt-4 hidden">
        <button onclick="loadMoreOrders()" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-full text-sm font-medium">Load More</button>
    </div>
</main>

<!-- Bottom Navigation -->
<div class="fixed bottom-3 left-3 right-3 z-[100]">
    <nav class="bg-white/95 backdrop-blur-xl border border-gray-200 rounded-[2rem] shadow-2xl flex justify-around items-center py-2.5">
        <button onclick="location.href='index.html'" class="text-gray-400 flex flex-col items-center gap-0.5">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[8px] font-black uppercase">Home</span>
        </button>
        <button onclick="location.href='shop.html'" class="text-gray-400 flex flex-col items-center gap-0.5">
            <i class="fa-solid fa-table-cells-large text-xl"></i>
            <span class="text-[8px] font-bold uppercase">Shop</span>
        </button>
        <div class="flex flex-col items-center -mt-7">
            <button onclick="location.href='cart.html'" class="bg-orange-500 text-white w-14 h-14 rounded-full shadow-2xl border-[5px] border-gray-50 flex items-center justify-center">
                <i class="fa-solid fa-cart-shopping text-xl"></i>
            </button>
            <div class="mt-2 text-center w-24">
                <div class="text-amber-600 font-bold text-sm flex items-center justify-center gap-1">
                    <i class="fa-solid fa-coins"></i>
                    <span id="walletBalance">0</span>
                </div>
                <button onclick="claimWallet()" class="golden-claim-btn mt-1 px-5 py-1.5 rounded-2xl text-[10px] uppercase w-full">
                    Claim
                </button>
            </div>
        </div>
        <button onclick="location.href='services.html'" class="text-gray-400 flex flex-col items-center gap-0.5">
            <i class="fa-solid fa-layer-group text-xl"></i>
            <span class="text-[8px] font-bold uppercase">Services</span>
        </button>
        <button onclick="location.href='account.html'" class="text-gray-400 flex flex-col items-center gap-0.5">
            <i class="fa-regular fa-user text-xl"></i>
            <span class="text-[8px] font-bold uppercase">Account</span>
        </button>
    </nav>
</div>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>
<script src="/js/cart-manager.js"></script>

<script>
    let allOrders = [];
    let filteredOrders = [];
    let currentStatus = 'all';
    let currentPage = 1;
    let totalPages = 1;
    let sortAscending = false;
    let searchQuery = '';
    
    document.addEventListener('DOMContentLoaded', function() {
        loadOrders();
        loadWalletBalance();
        updateCartCount();
        
        document.getElementById('searchInput').addEventListener('input', function(e) {
            searchQuery = e.target.value.toLowerCase();
            applyFilters();
        });
    });
    
    async function loadOrders() {
        const user = AuthService.getCurrentUser();
        if (!user || !user.cust_id) {
            showToast('Please login to view orders', 'warning');
            setTimeout(() => location.href = 'login.html', 1500);
            return;
        }
        
        try {
            const response = await fetch(`/api/customer/orders-list?cust_id=${user.cust_id}&limit=50`, {
                headers: AuthService.getAuthHeaders()
            });
            const data = await response.json();
            
            if (data.success) {
                allOrders = data.orders || [];
                document.getElementById('orderCount').innerText = allOrders.length;
                applyFilters();
            } else {
                showToast('Failed to load orders', 'error');
            }
        } catch (error) {
            console.error('Error loading orders:', error);
            showToast('Failed to load orders', 'error');
        }
    }
    
    function filterOrders(status) {
        currentStatus = status;
        currentPage = 1;
        
        // Update active filter chip
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.classList.remove('bg-orange-500', 'text-white');
            chip.classList.add('bg-gray-100', 'text-gray-700');
            if (chip.dataset.status === status) {
                chip.classList.add('bg-orange-500', 'text-white');
                chip.classList.remove('bg-gray-100', 'text-gray-700');
            }
        });
        
        applyFilters();
    }
    
    function applyFilters() {
        let filtered = [...allOrders];
        
        // Filter by status
        if (currentStatus !== 'all') {
            filtered = filtered.filter(order => order.status === currentStatus);
        }
        
        // Filter by search
        if (searchQuery) {
            filtered = filtered.filter(order => 
                order.book_id?.toLowerCase().includes(searchQuery) ||
                order.items?.some(item => item.name?.toLowerCase().includes(searchQuery))
            );
        }
        
        // Sort by date
        filtered.sort((a, b) => {
            const dateA = new Date(a.placed_at);
            const dateB = new Date(b.placed_at);
            return sortAscending ? dateA - dateB : dateB - dateA;
        });
        
        filteredOrders = filtered;
        totalPages = Math.ceil(filteredOrders.length / 10);
        renderOrders();
    }
    
    function toggleSort() {
        sortAscending = !sortAscending;
        applyFilters();
    }
    
    function renderOrders() {
        const container = document.getElementById('ordersContainer');
        const emptyDiv = document.getElementById('emptyOrders');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        
        const start = (currentPage - 1) * 10;
        const end = start + 10;
        const pageOrders = filteredOrders.slice(start, end);
        
        if (pageOrders.length === 0) {
            container.innerHTML = '';
            emptyDiv.classList.remove('hidden');
            loadMoreBtn.classList.add('hidden');
            return;
        }
        
        emptyDiv.classList.add('hidden');
        
        let html = '';
        pageOrders.forEach(order => {
            const firstItem = order.items?.[0];
            html += `
                <div class="order-card bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm" onclick="location.href='track-order.html?book_id=${order.book_id}'">
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="text-xs font-mono text-gray-500">#${order.book_id}</p>
                                <p class="text-[10px] text-gray-400">${formatDate(order.placed_at)}</p>
                            </div>
                            <span class="px-2 py-1 rounded-full text-[9px] font-bold ${getStatusColor(order.status)}">${order.status_display}</span>
                        </div>
                        <div class="flex gap-3 mt-2">
                            <img src="${firstItem?.image || 'https://via.placeholder.com/60/f9f9f9/000?text=Product'}" class="w-14 h-14 rounded-xl object-cover">
                            <div class="flex-1">
                                <p class="text-sm font-bold text-gray-800 line-clamp-2">${firstItem?.name || 'Product'}</p>
                                <p class="text-[10px] text-gray-500 mt-0.5">Qty: ${firstItem?.quantity || 1} • ₹${firstItem?.price || 0}</p>
                                ${order.items?.length > 1 ? `<p class="text-[9px] text-gray-400 mt-0.5">+${order.items.length - 1} more items</p>` : ''}
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-bold text-blue-900">₹${order.final_amount}</p>
                                <button onclick="event.stopPropagation(); reorder('${order.book_id}')" class="text-[10px] text-orange-600 mt-1">Reorder</button>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 px-4 py-2 flex justify-between border-t border-gray-100">
                        <button onclick="event.stopPropagation(); trackOrder('${order.book_id}')" class="text-xs text-blue-600 font-medium">
                            <i class="fa-solid fa-location-dot"></i> Track
                        </button>
                        ${order.status === 'DELIVERED' ? `
                            <button onclick="event.stopPropagation(); viewInvoice('${order.book_id}')" class="text-xs text-gray-600 font-medium">
                                <i class="fa-solid fa-file-pdf"></i> Invoice
                            </button>
                            <button onclick="event.stopPropagation(); returnOrder('${order.book_id}')" class="text-xs text-red-500 font-medium">
                                <i class="fa-solid fa-undo"></i> Return
                            </button>
                        ` : ''}
                        ${['PENDING', 'ACCEPTED'].includes(order.status) ? `
                            <button onclick="event.stopPropagation(); cancelOrder('${order.book_id}', '${order.cancel_code}')" class="text-xs text-red-500 font-medium">
                                <i class="fa-solid fa-xmark"></i> Cancel
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        
        if (currentPage < totalPages) {
            loadMoreBtn.classList.remove('hidden');
        } else {
            loadMoreBtn.classList.add('hidden');
        }
    }
    
    function loadMoreOrders() {
        if (currentPage < totalPages) {
            currentPage++;
            renderOrders();
        }
    }
    
    function trackOrder(bookId) {
        location.href = `track-order.html?book_id=${bookId}`;
    }
    
    function reorder(bookId) {
        showToast('Adding items to cart...', 'info');
        // Add to cart functionality
    }
    
    function viewInvoice(bookId) {
        window.open(`/api/barcode/generate-invoice?book_id=${bookId}`, '_blank');
    }
    
    function returnOrder(bookId) {
        location.href = `return-exchange.html?book_id=${bookId}`;
    }
    
    async function cancelOrder(bookId, cancelCode) {
        if (confirm('Are you sure you want to cancel this order?')) {
            try {
                const response = await fetch('/api/customer/cancel-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        book_id: bookId,
                        cancel_code: cancelCode,
                        reason: 'Cancelled by customer'
                    })
                });
                const data = await response.json();
                if (data.success) {
                    showToast('Order cancelled successfully', 'success');
                    loadOrders();
                } else {
                    showToast(data.error || 'Cancellation failed', 'error');
                }
            } catch (error) {
                showToast('Failed to cancel order', 'error');
            }
        }
    }
    
    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }
    
    function getStatusColor(status) {
        const colors = {
            'PENDING': 'bg-yellow-100 text-yellow-800',
            'ACCEPTED': 'bg-blue-100 text-blue-800',
            'PACKED': 'bg-purple-100 text-purple-800',
            'SHIPPED': 'bg-cyan-100 text-cyan-800',
            'OUT_FOR_DELIVERY': 'bg-green-100 text-green-800',
            'DELIVERED': 'bg-emerald-100 text-emerald-800',
            'CANCELLED': 'bg-red-100 text-red-800',
            'RTO': 'bg-red-100 text-red-800'
        };
        return colors[status] || 'bg-gray-100 text-gray-600';
    }
    
    async function loadWalletBalance() {
        const user = AuthService.getCurrentUser();
        if (user && user.wallet_balance !== undefined) {
            document.getElementById('walletBalance').innerText = user.wallet_balance || 0;
        }
    }
    
    function claimWallet() {
        if (!AuthService.isAuthenticated()) {
            location.href = 'login.html';
            return;
        }
        location.href = 'account.html?tab=wallet';
    }
    
    async function updateCartCount() {
        if (CartManager) {
            const count = CartManager.getCartCount();
            const badge = document.getElementById('cartCount');
            if (badge) {
                if (count > 0) {
                    badge.innerText = count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
        }
    }
    
    function showToast(message, type) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.backgroundColor = type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#10b981';
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }
</script>
</body>
</html>
