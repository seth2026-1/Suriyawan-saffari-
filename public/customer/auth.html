<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Customer - Suriyanwa Saffari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 50px; font-size: 12px; z-index: 200; display: none; }
        .strength-bar { height: 4px; border-radius: 2px; transition: all 0.3s ease; }
        .input-field:focus { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-900 to-orange-600 min-h-screen flex items-center justify-center p-4">

<div id="toast" class="toast"></div>

<div class="w-full max-w-md">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
        <div class="w-20 h-20 bg-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
            <i class="fa-solid fa-shop text-3xl text-orange-600"></i>
        </div>
        <h1 class="text-3xl font-black text-white">Suriyanwa Saffari</h1>
        <p class="text-blue-100 text-sm mt-1">Premium Shopping Experience</p>
    </div>

    <!-- Auth Card - Login/Signup Combined -->
    <div class="bg-white rounded-3xl shadow-2xl p-6">
        <!-- Tab Switcher -->
        <div class="flex gap-4 mb-6 border-b">
            <button class="tab-btn pb-3 text-orange-600 font-medium border-b-2 border-orange-600" data-tab="login" onclick="switchTab('login')">Login</button>
            <button class="tab-btn pb-3 text-gray-500 font-medium" data-tab="signup" onclick="switchTab('signup')">Sign Up</button>
            <button class="tab-btn pb-3 text-gray-500 font-medium" data-tab="fingerprint" onclick="switchTab('fingerprint')"><i class="fa-solid fa-fingerprint"></i></button>
        </div>

        <!-- LOGIN TAB -->
        <div id="loginTab">
            <div class="space-y-4">
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1">Mobile Number</label>
                    <div class="relative">
                        <i class="fa-solid fa-phone absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="tel" id="loginMobile" maxlength="10" class="w-full border border-gray-200 rounded-xl pl-10 pr-3 py-3 text-sm focus:outline-none focus:border-orange-500" placeholder="9876543210">
                    </div>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="password" id="loginPassword" class="w-full border border-gray-200 rounded-xl pl-10 pr-3 py-3 text-sm focus:outline-none focus:border-orange-500" placeholder="••••••••">
                        <i class="fa-regular fa-eye absolute right-3 top-3.5 text-gray-400 cursor-pointer" onclick="togglePassword('loginPassword')"></i>
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <label class="flex items-center gap-2"><input type="checkbox" id="rememberMe" class="w-4 h-4"> <span class="text-xs text-gray-500">Remember me</span></label>
                    <a href="#" class="text-xs text-orange-600" onclick="showToast('Contact support to reset password', 'info')">Forgot password?</a>
                </div>
                <button onclick="login()" class="w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition">Login</button>
            </div>
        </div>

        <!-- SIGNUP TAB -->
        <div id="signupTab" class="hidden">
            <div class="space-y-4">
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1">Full Name</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="text" id="signupName" class="w-full border border-gray-200 rounded-xl pl-10 pr-3 py-3 text-sm focus:outline-none focus:border-orange-500" placeholder="Enter your full name">
                    </div>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1">Mobile Number</label>
                    <div class="relative">
                        <i class="fa-solid fa-phone absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="tel" id="signupMobile" maxlength="10" class="w-full border border-gray-200 rounded-xl pl-10 pr-3 py-3 text-sm focus:outline-none focus:border-orange-500" placeholder="9876543210">
                    </div>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1">Create Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="password" id="signupPassword" class="w-full border border-gray-200 rounded-xl pl-10 pr-3 py-3 text-sm focus:outline-none focus:border-orange-500" placeholder="Create a password">
                        <i class="fa-regular fa-eye absolute right-3 top-3.5 text-gray-400 cursor-pointer" onclick="togglePassword('signupPassword')"></i>
                    </div>
                    <div class="mt-2">
                        <div class="strength-bar w-full bg-gray-200 rounded-full overflow-hidden">
                            <div id="strengthBar" class="strength-bar w-0 bg-red-500"></div>
                        </div>
                        <p id="strengthText" class="text-[9px] text-gray-500 mt-1">Password strength: <span id="strengthLabel">Not set</span></p>
                    </div>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1">Confirm Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="password" id="confirmPassword" class="w-full border border-gray-200 rounded-xl pl-10 pr-3 py-3 text-sm focus:outline-none focus:border-orange-500" placeholder="Confirm your password">
                    </div>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1">Referral Code (Optional)</label>
                    <div class="relative">
                        <i class="fa-solid fa-gift absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="text" id="referralCode" class="w-full border border-gray-200 rounded-xl pl-10 pr-3 py-3 text-sm focus:outline-none focus:border-orange-500" placeholder="Enter referral code if any">
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="termsCheckbox" class="w-4 h-4 text-orange-600 rounded">
                    <label class="text-xs text-gray-600">I agree to the <a href="#" class="text-orange-600">Terms & Conditions</a></label>
                </div>
                <button onclick="signup()" class="w-full bg-gradient-to-r from-blue-900 to-blue-700 text-white py-3 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition">Create Account</button>
            </div>
        </div>

        <!-- FINGERPRINT TAB -->
        <div id="fingerprintTab" class="hidden text-center py-6">
            <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-fingerprint text-4xl text-gray-400"></i>
            </div>
            <p class="text-gray-600 text-sm mb-4">Place your finger on the sensor to login</p>
            <button onclick="fingerprintLogin()" class="bg-blue-900 text-white px-6 py-2 rounded-xl text-sm">Use Fingerprint</button>
            <p class="text-xs text-gray-400 mt-4">Setup fingerprint in your account settings first</p>
        </div>
    </div>

    <p class="text-center text-blue-100 text-xs mt-6">© 2026 Suriyanwa Saffari. All rights reserved.</p>
</div>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>

<script>
    // Password strength checker
    const signupPassword = document.getElementById('signupPassword');
    if (signupPassword) {
        signupPassword.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            let color = '#ef4444';
            let text = 'Weak';

            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            if (strength >= 4) { color = '#22c55e'; text = 'Strong'; }
            else if (strength >= 2) { color = '#f59e0b'; text = 'Medium'; }

            const percentage = (strength / 5) * 100;
            const strengthBar = document.getElementById('strengthBar');
            const strengthLabel = document.getElementById('strengthLabel');
            if (strengthBar) strengthBar.style.width = percentage + '%';
            if (strengthBar) strengthBar.style.backgroundColor = color;
            if (strengthLabel) strengthLabel.innerText = text;
            if (strengthLabel) strengthLabel.style.color = color;
        });
    }

    function switchTab(tab) {
        document.getElementById('loginTab').classList.toggle('hidden', tab !== 'login');
        document.getElementById('signupTab').classList.toggle('hidden', tab !== 'signup');
        document.getElementById('fingerprintTab').classList.toggle('hidden', tab !== 'fingerprint');
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('text-orange-600', 'border-b-2', 'border-orange-600');
            btn.classList.add('text-gray-500');
        });
        const activeBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
        if (activeBtn) {
            activeBtn.classList.add('text-orange-600', 'border-b-2', 'border-orange-600');
        }
    }

    // LOGIN FUNCTION
    async function login() {
        const mobile = document.getElementById('loginMobile').value.trim();
        const password = document.getElementById('loginPassword').value;
        const rememberMe = document.getElementById('rememberMe').checked;

        if (!mobile || !password) {
            showToast('Please enter mobile number and password', 'warning');
            return;
        }

        if (!/^[6-9]\d{9}$/.test(mobile)) {
            showToast('Please enter a valid 10-digit mobile number', 'error');
            return;
        }

        const loginBtn = event.target;
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Logging in...';

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mobile: mobile, password, user_type: 'customer' })
            });
            const data = await response.json();

            if (data.success) {
                if (rememberMe) localStorage.setItem('saved_mobile', mobile);
                else localStorage.removeItem('saved_mobile');
                showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            } else {
                showToast(data.error || 'Login failed. Invalid mobile or password', 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login';
            }
        } catch (error) {
            console.error('Login error:', error);
            showToast('Login failed. Please try again.', 'error');
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Login';
        }
    }

    // SIGNUP FUNCTION
    async function signup() {
        const name = document.getElementById('signupName').value.trim();
        const mobile = document.getElementById('signupMobile').value.trim();
        const password = document.getElementById('signupPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const referralCode = document.getElementById('referralCode').value.trim();
        const termsAccepted = document.getElementById('termsCheckbox').checked;

        if (!name || !mobile || !password) {
            showToast('Please fill all required fields', 'warning');
            return;
        }
        if (!termsAccepted) {
            showToast('Please accept Terms & Conditions', 'warning');
            return;
        }
        if (password !== confirmPassword) {
            showToast('Passwords do not match', 'error');
            return;
        }
        if (password.length < 6) {
            showToast('Password must be at least 6 characters', 'warning');
            return;
        }
        if (!/^[6-9]\d{9}$/.test(mobile)) {
            showToast('Please enter a valid 10-digit mobile number', 'error');
            return;
        }

        const signupBtn = event.target;
        signupBtn.disabled = true;
        signupBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Creating account...';

        try {
            // Generate temporary email from mobile (since no email field)
            const tempEmail = `${mobile}@customer.suriyanwa.com`;
            
            const result = await AuthService.signup({
                name: name,
                email: tempEmail,
                mobile: mobile,
                password: password,
                referred_by: referralCode || null
            });

            if (result.success) {
                showToast('Account created successfully! Please login.', 'success');
                setTimeout(() => {
                    // Clear form and switch to login tab
                    document.getElementById('loginMobile').value = mobile;
                    document.getElementById('loginPassword').value = '';
                    switchTab('login');
                    signupBtn.disabled = false;
                    signupBtn.innerHTML = 'Create Account';
                }, 2000);
            } else {
                showToast(result.error || 'Signup failed. Mobile number may already exist.', 'error');
                signupBtn.disabled = false;
                signupBtn.innerHTML = 'Create Account';
            }
        } catch (error) {
            console.error('Signup error:', error);
            showToast('Something went wrong. Please try again.', 'error');
            signupBtn.disabled = false;
            signupBtn.innerHTML = 'Create Account';
        }
    }

    async function fingerprintLogin() {
        if (!window.PublicKeyCredential) {
            showToast('Fingerprint not supported on this device', 'error');
            return;
        }
        const fingerprintData = prompt('Enter fingerprint key (simulated):');
        if (!fingerprintData) return;

        const result = await AuthService.loginWithFingerprint(fingerprintData, AuthService.USER_TYPES.CUSTOMER);
        if (result.success) {
            showToast('Fingerprint login successful!', 'success');
            setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        } else {
            showToast(result.error || 'Fingerprint not recognized', 'error');
        }
    }

    function togglePassword(inputId) {
        const pwd = document.getElementById(inputId);
        if (pwd) {
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.backgroundColor = type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : type === 'info' ? '#3b82f6' : '#10b981';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    // Load saved mobile if remember me was checked
    document.addEventListener('DOMContentLoaded', function() {
        const savedMobile = localStorage.getItem('saved_mobile');
        if (savedMobile) {
            document.getElementById('loginMobile').value = savedMobile;
            document.getElementById('rememberMe').checked = true;
        }
    });
</script>
</body>
</html>
