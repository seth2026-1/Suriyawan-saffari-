<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Portal - Suriyanwa Saffari</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #f59e0b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #1e3a8a;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin: 10px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn-outline {
            background: white;
            color: #1e3a8a;
            border: 2px solid #1e3a8a;
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ Customer Portal</h1>
        <p class="subtitle">Welcome to Suriyanwa Saffari</p>
        
        <div>
            <a href="/customer/auth.html" class="btn">🔐 Login / Sign Up</a>
            <a href="/" class="btn btn-outline">🏠 Back to Home</a>
        </div>
        
        <div class="footer">
            Suriyanwa Saffari - Premium Shopping Experience
        </div>
    </div>
</body>
</html>
