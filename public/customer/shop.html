<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Shop - Suriyanwa Saffari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .premium-shine {
            background: linear-gradient(135deg, #d97706, #f59e0b, #d97706);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 3s linear infinite;
        }
        
        @keyframes shine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        
        .golden-claim-btn {
            background: linear-gradient(135deg, #facc15, #eab308, #ca8a04);
            color: #451a03;
            font-weight: 900;
            transition: transform 0.2s;
        }
        .golden-claim-btn:active { transform: scale(0.95); }
        
        .category-active {
            background: linear-gradient(135deg, #f59e0b, #ea580c) !important;
            color: white !important;
            border: 2px solid white !important;
        }
        
        .status-ring {
            border: 2px solid #ea580c;
            border-radius: 50%;
            padding: 2px;
        }
        
        .product-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .product-card:active { transform: scale(0.98); }
        
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 12px;
            z-index: 200;
            display: none;
        }
        
        #bubble-menu {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(150%) scale(0.8);
            opacity: 0;
            pointer-events: none;
        }
        
        #bubble-menu.show { 
            transform: translateY(0) scale(1); 
            opacity: 1; 
            pointer-events: auto; 
        }
        
        .overlay { 
            transition: opacity 0.3s ease; 
            display: none; 
        }
        
        .overlay.active { 
            display: block; 
            opacity: 1; 
        }
        
        .filter-chip-active {
            background: #1e3a8a !important;
            color: white !important;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans h-full pb-36">

<div id="toast" class="toast"></div>
<div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 z-[85] overlay"></div>

<script>
    // Global variables
    let currentMainCategory = 'all';
    let currentSubCategory = null;
    let currentPage = 1;
    let currentSort = 'popular';
    let currentFilters = {
        minPrice: null,
        maxPrice: null,
        rating: null,
        inStockOnly: false,
        codOnly: false,
        tags: []
    };
    let totalPages = 1;
    let isLoading = false;
    let allTags = [];
    let subCategories = {};

    // Category data with subcategories
    const categoryData = {
        electronics: {
            name: 'Electronics & Gadgets',
            sub: ['Mobiles', 'Laptops & Computers', 'Audio', 'Cameras', 'Accessories']
        },
        fashion: {
            name: 'Fashion & Apparel',
            sub: ["Men's Wear", "Women's Wear", "Footwear", "Accessories"]
        },
        home: {
            name: 'Home & Kitchen',
            sub: ['Appliances', 'Furniture', 'Kitchenware', 'Home Decor']
        },
        beauty: {
            name: 'Beauty & Personal Care',
            sub: ['Skincare', 'Haircare', 'Makeup', 'Grooming']
        },
        groceries: {
            name: 'Groceries & Essentials',
            sub: ['Daily Needs', 'Snacks & Beverages', 'Cleaning']
        },
        others: {
            name: 'Others',
            sub: ['Books & Stationery', 'Sports & Fitness', 'Toys & Baby Care']
        },
        all: {
            name: 'All Products',
            sub: []
        }
    };

    // Initialize page
    document.addEventListener('DOMContentLoaded', function() {
        loadProducts();
        loadTags();
        loadUserData();
        setupInfiniteScroll();
        highlightActiveCategory();
    });

    // Highlight active category
    function highlightActiveCategory() {
        document.querySelectorAll('.main-cat-item').forEach(item => {
            const cat = item.dataset.cat;
            if (cat === currentMainCategory) {
                const circle = item.querySelector('.rounded-full');
                circle.classList.add('category-active');
                item.querySelector('span').classList.add('text-orange-600');
                document.getElementById('header-cat-name').innerText = categoryData[cat]?.name || 'All Products';
            } else {
                const circle = item.querySelector('.rounded-full');
                circle.classList.remove('category-active');
                item.querySelector('span').classList.remove('text-orange-600');
            }
        });
    }

    // Select main category
    function selectMainCategory(category) {
        currentMainCategory = category;
        currentSubCategory = null;
        currentPage = 1;
        highlightActiveCategory();
        updateSubCategories();
        loadProducts();
    }

    // Update subcategories display
    function updateSubCategories() {
        const container = document.getElementById('subCategoryContainer');
        const list = document.getElementById('subCategoryList');
        
        const subs = categoryData[currentMainCategory]?.sub || [];
        
        if (subs.length > 0) {
            container.classList.remove('hidden');
            list.innerHTML = '<button onclick="selectSubCategory(null)" class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium ' + (currentSubCategory === null ? 'bg-blue-900 text-white' : 'bg-gray-100 text-gray-700') + '">All</button>';
            
            subs.forEach(sub => {
                list.innerHTML += `<button onclick="selectSubCategory('${sub}')" class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium ${currentSubCategory === sub ? 'bg-blue-900 text-white' : 'bg-gray-100 text-gray-700'}">${sub}</button>`;
            });
        } else {
            container.classList.add('hidden');
        }
    }

    function selectSubCategory(sub) {
        currentSubCategory = sub;
        currentPage = 1;
        updateSubCategories();
        loadProducts();
    }

    // Load products
    async function loadProducts(reset = true) {
        if (isLoading) return;
        isLoading = true;
        
        if (reset) {
            currentPage = 1;
            document.getElementById('productsGrid').innerHTML = '';
            showSkeletons();
        }
        
        try {
            let url = `/api/customer/products?page=${currentPage}&limit=10&sort=${currentSort}`;
            
            if (currentMainCategory !== 'all') {
                url += `&category=${currentMainCategory}`;
            }
            if (currentSubCategory) {
                url += `&subcategory=${encodeURIComponent(currentSubCategory)}`;
            }
            if (currentFilters.minPrice) url += `&min_price=${currentFilters.minPrice}`;
            if (currentFilters.maxPrice) url += `&max_price=${currentFilters.maxPrice}`;
            if (currentFilters.rating) url += `&rating=${currentFilters.rating}`;
            if (currentFilters.tags.length) url += `&tags=${currentFilters.tags.join(',')}`;
            
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.success) {
                totalPages = data.pagination.total_pages;
                renderProducts(data.products);
                document.getElementById('productCount').innerText = `${data.pagination.total_items} products`;
                
                if (currentPage < totalPages) {
                    document.getElementById('loadMoreBtn').classList.remove('hidden');
                } else {
                    document.getElementById('loadMoreBtn').classList.add('hidden');
                }
            }
        } catch (error) {
            console.error('Error loading products:', error);
            showToast('Failed to load products', 'error');
        } finally {
            isLoading = false;
        }
    }
    
    function showSkeletons() {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            grid.innerHTML += '<div class="skeleton h-64 rounded-2xl"></div>';
        }
    }
    
    function renderProducts(products) {
        const grid = document.getElementById('productsGrid');
        const noProductsDiv = document.getElementById('noProducts');
        
        if (currentPage === 1) {
            grid.innerHTML = '';
        }
        
        if (!products || products.length === 0) {
            if (currentPage === 1) {
                noProductsDiv.classList.remove('hidden');
                grid.innerHTML = '';
            }
            return;
        }
        
        noProductsDiv.classList.add('hidden');
        
        products.forEach(product => {
            const discount = Math.round(((product.mrp - product.current_price) / product.mrp) * 100);
            const card = document.createElement('div');
            card.className = 'bg-white border border-gray-100 rounded-2xl p-3 shadow-sm active:scale-95 transition-all product-card cursor-pointer';
            card.onclick = () => location.href = `product.html?prod_id=${product.prod_id}`;
            
            card.innerHTML = `
                <div class="relative">
                    <img src="${product.images?.[0] || 'https://via.placeholder.com/300/f9f9f9/000?text=Product'}" class="w-full h-40 object-cover rounded-xl">
                    ${discount > 20 ? `<span class="absolute top-2 left-2 bg-orange-600 text-white text-[8px] px-2 py-0.5 rounded-full font-bold">${discount}% OFF</span>` : ''}
                    ${product.tags && product.tags.length ? `<span class="absolute top-2 right-2 bg-blue-900 text-white text-[8px] px-2 py-0.5 rounded-full font-bold">${product.tags[0]}</span>` : ''}
                </div>
                <div class="mt-2 px-1">
                    <div class="flex items-center gap-1 mb-1">
                        <span class="text-[10px] font-black text-green-700 bg-green-50 px-1.5 py-0.5 rounded">${product.rating || 4.5} ★</span>
                        <span class="text-[8px] text-gray-400">${product.total_sold || 0} sold</span>
                    </div>
                    <h4 class="text-xs font-bold text-gray-800 line-clamp-2 h-8">${product.name}</h4>
                    <p class="text-[9px] text-gray-400 mt-0.5 italic line-clamp-1">${product.short_description || ''}</p>
                    <div class="flex items-center justify-between mt-2">
                        <div>
                            <span class="text-sm font-black text-blue-900">₹${product.current_price}</span>
                            <span class="text-[10px] text-gray-400 line-through ml-1">₹${product.mrp}</span>
                        </div>
                        <button onclick="event.stopPropagation(); addToCart('${product.prod_id}')" class="bg-blue-900 text-white w-8 h-8 rounded-xl flex items-center justify-center shadow-lg">
                            <i class="fa-solid fa-plus text-xs"></i>
                        </button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }
    
    function loadMoreProducts() {
        if (currentPage < totalPages && !isLoading) {
            currentPage++;
            loadProducts(false);
        }
    }
    
    function setupInfiniteScroll() {
        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 400) {
                loadMoreProducts();
            }
        });
    }
    
    // Load tags
    async function loadTags() {
        try {
            const response = await fetch('/api/owner/catalog/tags');
            const data = await response.json();
            if (data.success) {
                allTags = data.tags || [];
                renderTagFilters();
            }
        } catch (error) {
            console.error('Error loading tags:', error);
        }
    }
    
    function renderTagFilters() {
        const container = document.getElementById('tagsFilter');
        if (!container) return;
        
        container.innerHTML = '';
        allTags.slice(0, 30).forEach(tag => {
            const btn = document.createElement('button');
            btn.textContent = tag.tag_name;
            btn.className = 'tag-filter-btn px-3 py-1.5 rounded-full text-xs bg-gray-100 text-gray-700';
            btn.onclick = () => toggleTagFilter(tag.tag_name, btn);
            container.appendChild(btn);
        });
    }
    
    function toggleTagFilter(tag, btn) {
        const index = currentFilters.tags.indexOf(tag);
        if (index > -1) {
            currentFilters.tags.splice(index, 1);
            btn.classList.remove('bg-orange-500', 'text-white');
            btn.classList.add('bg-gray-100', 'text-gray-700');
        } else {
            currentFilters.tags.push(tag);
            btn.classList.add('bg-orange-500', 'text-white');
            btn.classList.remove('bg-gray-100', 'text-gray-700');
        }
    }
    
    // Filter functions
    function openFilterModal() {
        document.getElementById('filterModal').classList.add('flex');
        document.getElementById('filterModal').classList.remove('hidden');
        document.getElementById('minPrice').value = currentFilters.minPrice || '';
        document.getElementById('maxPrice').value = currentFilters.maxPrice || '';
        document.getElementById('ratingFilter').value = currentFilters.rating || '';
        document.getElementById('inStockOnly').checked = currentFilters.inStockOnly;
        document.getElementById('codOnly').checked = currentFilters.codOnly;
    }
    
    function closeFilterModal() {
        document.getElementById('filterModal').classList.remove('flex');
        document.getElementById('filterModal').classList.add('hidden');
    }
    
    function applyFilters() {
        currentFilters.minPrice = document.getElementById('minPrice').value || null;
        currentFilters.maxPrice = document.getElementById('maxPrice').value || null;
        currentFilters.rating = document.getElementById('ratingFilter').value || null;
        currentFilters.inStockOnly = document.getElementById('inStockOnly').checked;
        currentFilters.codOnly = document.getElementById('codOnly').checked;
        closeFilterModal();
        loadProducts();
        updateActiveFiltersDisplay();
    }
    
    function resetFilters() {
        currentFilters = { minPrice: null, maxPrice: null, rating: null, inStockOnly: false, codOnly: false, tags: [] };
        document.querySelectorAll('.tag-filter-btn').forEach(btn => {
            btn.classList.remove('bg-orange-500', 'text-white');
            btn.classList.add('bg-gray-100', 'text-gray-700');
        });
        closeFilterModal();
        loadProducts();
        updateActiveFiltersDisplay();
    }
    
    function resetAllFilters() {
        resetFilters();
        currentMainCategory = 'all';
        currentSubCategory = null;
        currentSort = 'popular';
        highlightActiveCategory();
        updateSubCategories();
        loadProducts();
    }
    
    function updateActiveFiltersDisplay() {
        const container = document
