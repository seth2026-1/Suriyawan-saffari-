<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>My Account - Suriyanwa Saffari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .tab-active {
            color: #f59e0b !important;
            border-bottom-color: #f59e0b !important;
        }
        .golden-claim-btn {
            background: linear-gradient(135deg, #facc15, #eab308, #ca8a04);
            color: #451a03;
            font-weight: 900;
        }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 12px;
            z-index: 200;
            display: none;
        }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-36">

<div id="toast" class="toast"></div>

<!-- Header -->
<header class="bg-white sticky top-0 z-50 shadow-md">
    <div class="p-4 flex items-center justify-between border-b border-gray-100">
        <button onclick="window.history.back()" class="text-blue-900 text-xl">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        
        <div class="flex flex-col items-center">
            <h1 class="text-2xl font-black text-blue-900 italic tracking-tighter">
                SURIYANWA <span class="text-orange-600">SAFFARI</span>
            </h1>
            <p class="text-[10px] text-orange-600 uppercase tracking-[2px] mt-0.5 font-bold">
                MY ACCOUNT
            </p>
        </div>

        <div class="flex gap-3 text-gray-500">
            <i class="fa-regular fa-bell text-lg"></i>
            <div class="relative cursor-pointer" onclick="location.href='cart.html'">
                <i class="fa-solid fa-cart-shopping text-lg"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-orange-600 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </div>
        </div>
    </div>
</header>

<!-- Profile Header -->
<div id="profileHeader" class="bg-gradient-to-r from-blue-900 to-blue-800 text-white p-6">
    <div class="flex items-center gap-4">
        <div class="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center text-3xl">
            <i class="fa-regular fa-user"></i>
        </div>
        <div class="flex-1">
            <p class="text-sm opacity-80">Welcome back,</p>
            <h2 id="userName" class="text-xl font-black">Loading...</h2>
            <p id="userId" class="text-xs opacity-70 mt-0.5">CUST ID: Loading...</p>
        </div>
        <button onclick="location.href='edit-profile.html'" class="bg-white/20 px-3 py-1.5 rounded-xl text-xs font-bold">
            <i class="fa-regular fa-pen-to-square"></i> Edit
        </button>
    </div>
</div>

<!-- Trust Score -->
<div class="px-4 -mt-5">
    <div class="bg-white rounded-2xl shadow-sm p-4 flex items-center justify-between">
        <div>
            <p class="text-xs text-gray-500">Trust Score</p>
            <p id="trustScore" class="text-2xl font-black text-blue-900">0</p>
        </div>
        <div class="w-2/3">
            <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                <div id="trustBar" class="h-full bg-gradient-to-r from-orange-500 to-green-500 rounded-full" style="width: 0%"></div>
            </div>
            <p class="text-[9px] text-gray-400 mt-1">Good standing</p>
        </div>
        <i class="fa-solid fa-circle-info text-gray-300"></i>
    </div>
</div>

<!-- Stats Cards -->
<div class="grid grid-cols-3 gap-3 px-4 mt-4">
    <div class="bg-white rounded-2xl p-3 text-center shadow-sm">
        <i class="fa-solid fa-coins text-amber-500 text-xl"></i>
        <p id="walletBalance" class="text-lg font-black text-blue-900">0</p>
        <p class="text-[9px] text-gray-500">Wallet</p>
    </div>
    <div class="bg-white rounded-2xl p-3 text-center shadow-sm">
        <i class="fa-solid fa-gem text-purple-500 text-xl"></i>
        <p id="coinsBalance" class="text-lg font-black text-blue-900">0</p>
        <p class="text-[9px] text-gray-500">Coins</p>
    </div>
    <div class="bg-white rounded-2xl p-3 text-center shadow-sm">
        <i class="fa-solid fa-tag text-green-500 text-xl"></i>
        <p id="codStatus" class="text-lg font-black text-green-600">Active</p>
        <p class="text-[9px] text-gray-500">COD Status</p>
    </div>
</div>

<!-- Tabs -->
<div class="border-b bg-white mt-4">
    <div class="flex overflow-x-auto no-scrollbar">
        <button class="tab-btn px-5 py-3 text-sm font-bold text-gray-500 border-b-2 border-transparent whitespace-nowrap active" data-tab="orders" onclick="switchTab('orders')">My Orders</button>
        <button class="tab-btn px-5 py-3 text-sm font-bold text-gray-500 border-b-2 border-transparent whitespace-nowrap" data-tab="bookings" onclick="switchTab('bookings')">Bookings</button>
        <button class="tab-btn px-5 py-3 text-sm font-bold text-gray-500 border-b-2 border-transparent whitespace-nowrap" data-tab="addresses" onclick="switchTab('addresses')">Addresses</button>
        <button class="tab-btn px-5 py-3 text-sm font-bold text-gray-500 border-b-2 border-transparent whitespace-nowrap" data-tab="wallet" onclick="switchTab('wallet')">Wallet & Coins</button>
        <button class="tab-btn px-5 py-3 text-sm font-bold text-gray-500 border-b-2 border-transparent whitespace-nowrap" data-tab="settings" onclick="switchTab('settings')">Settings</button>
    </div>
</div>

<!-- Tab Content -->
<div class="p-4 pb-32">
    <!-- My Orders Tab -->
    <div id="ordersTab" class="tab-content space-y-3">
        <div class="skeleton h-24 rounded-xl"></div>
        <div class="skeleton h-24 rounded-xl"></div>
        <div class="skeleton h-24 rounded-xl"></div>
    </div>

    <!-- Bookings Tab -->
    <div id="bookingsTab" class="tab-content hidden space-y-3">
        <div class="skeleton h-24 rounded-xl"></div>
        <div class="skeleton h-24 rounded-xl"></div>
    </div>

    <!-- Addresses Tab -->
    <div id="addressesTab" class="tab-content hidden space-y-3">
        <div class="skeleton h-28 rounded-xl"></div>
        <div class="skeleton h-28 rounded-xl"></div>
        <button onclick="addNewAddress()" class="w-full py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 text-sm font-medium">
            + Add New Address
        </button>
    </div>

    <!-- Wallet & Coins Tab -->
    <div id="walletTab" class="tab-content hidden space-y-4">
        <div class="bg-gradient-to-r from-amber-500 to-orange-500 rounded-2xl p-5 text-white">
            <p class="text-sm opacity-90">Total Balance</p>
            <p id="walletFullBalance" class="text-3xl font-black">₹0</p>
            <button onclick="claimWalletBalance()" class="mt-3 bg-white text-orange-600 px-4 py-2 rounded-xl text-xs font-bold">Claim to UPI</button>
        </div>
        <div class="bg-gradient-to-r from-purple-500 to-pink-500 rounded-2xl p-5 text-white">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-sm opacity-90">Gift Coins</p>
                    <p id="coinsFullBalance" class="text-3xl font-black">0</p>
                    <p class="text-xs opacity-80">1 Coin = ₹1</p>
                </div>
                <i class="fa-solid fa-coins text-5xl opacity-50"></i>
            </div>
        </div>
        <div class="bg-white rounded-2xl p-4">
            <h4 class="font-bold text-gray-800 mb-3">Recent Transactions</h4>
            <div id="transactionsList" class="space-y-2">
                <div class="skeleton h-12 rounded-lg"></div>
                <div class="skeleton h-12 rounded-lg"></div>
            </div>
        </div>
    </div>

    <!-- Settings Tab -->
    <div id="settingsTab" class="tab-content hidden space-y-2">
        <div class="bg-white rounded-2xl overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center">
                <span class="font-medium">Language</span>
                <select id="languageSelect" class="border rounded-lg p-2 text-sm">
                    <option value="hi">हिंदी</option>
                    <option value="en">English</option>
                    <option value="bho">भोजपुरी</option>
                </select>
            </div>
            <div class="p-4 border-b flex justify-between items-center">
                <span class="font-medium">Dark Mode</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="darkModeToggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:bg-orange-600"></div>
                </label>
            </div>
            <div class="p-4 border-b flex justify-between items-center">
                <span class="font-medium">Fingerprint Login</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="fingerprintToggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:bg-orange-600"></div>
                </label>
            </div>
            <div class="p-4 border-b">
                <button onclick="supportTicket()" class="w-full text-left">Support</button>
            </div>
            <div class="p-4 border-b">
                <button onclick="faq()" class="w-full text-left">FAQ</button>
            </div>
            <div class="p-4">
                <button onclick="logout()" class="w-full text-red-500 font-medium">Logout</button>
            </div>
        </div>
        <button onclick="deleteAccount()" class="w-full py-3 text-red-500 text-sm font-medium">Delete Account</button>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="fixed bottom-3 left-3 right-3 z-[100]">
    <nav class="bg-white/95 backdrop-blur-xl border border-gray-200 rounded-[2rem] shadow-2xl flex justify-around items-center py-2.5">
        <button onclick="location.href='index.html'" class="text-gray-400 flex flex-col items-center gap-0.5">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[8px] font-black uppercase">Home</span>
        </button>
        <button onclick="location.href='shop.html'" class="text-gray-400 flex flex-col items-center gap-0.5">
            <i class="fa-solid fa-table-cells-large text-xl"></i>
            <span class="text-[8px] font-bold uppercase">Shop</span>
        </button>
        <div class="flex flex-col items-center -mt-7">
            <button onclick="location.href='cart.html'" class="bg-orange-500 text-white w-14 h-14 rounded-full shadow-2xl border-[5px] border-gray-50 flex items-center justify-center">
                <i class="fa-solid fa-cart-shopping text-xl"></i>
            </button>
            <div class="mt-2 text-center w-24">
                <div class="text-amber-600 font-bold text-sm flex items-center justify-center gap-1">
                    <i class="fa-solid fa-coins"></i>
                    <span id="walletBalanceBottom">0</span>
                </div>
                <button onclick="claimWallet()" class="golden-claim-btn mt-1 px-5 py-1.5 rounded-2xl text-[10px] uppercase w-full">
                    Claim
                </button>
            </div>
        </div>
        <button onclick="location.href='services.html'" class="text-gray-400 flex flex-col items-center gap-0.5">
            <i class="fa-solid fa-layer-group text-xl"></i>
            <span class="text-[8px] font-bold uppercase">Services</span>
        </button>
        <button onclick="location.href='account.html'" class="text-orange-600 flex flex-col items-center gap-0.5">
            <i class="fa-regular fa-user text-xl"></i>
            <span class="text-[8px] font-black uppercase">Account</span>
        </button>
    </nav>
</div>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>
<script src="/js/cart-manager.js"></script>

<script>
    let userData = null;
    
    document.addEventListener('DOMContentLoaded', function() {
        loadUserProfile();
        loadWalletBalance();
        updateCartCount();
        
        // Check URL param for tab
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab');
        if (tab) switchTab(tab);
    });
    
    async function loadUserProfile() {
        const user = AuthService.getCurrentUser();
        if (!user || !user.cust_id) {
            showToast('Please login to view account', 'warning');
            setTimeout(() => location.href = 'login.html', 1500);
            return;
        }
        
        try {
            const response = await fetch(`/api/customer/profile?cust_id=${user.cust_id}`, {
                headers: AuthService.getAuthHeaders()
            });
            const data = await response.json();
            
            if (data.success) {
                userData = data.profile;
                renderProfile();
                loadOrders();
                loadAddresses();
                loadTransactions();
            }
        } catch (error) {
            console.error('Error loading profile:', error);
            showToast('Failed to load profile', 'error');
        }
    }
    
    function renderProfile() {
        if (!userData) return;
        
        document.getElementById('userName').innerText = userData.name || 'Customer';
        document.getElementById('userId').innerHTML = `CUST ID: ${userData.cust_id || 'N/A'}`;
        document.getElementById('trustScore').innerText = userData.trust_score || 100;
        
        const trustPercent = Math.min(100, (userData.trust_score || 100) / 500 * 100);
        document.getElementById('trustBar').style.width = `${trustPercent}%`;
        
        document.getElementById('walletBalance').innerText = userData.wallet_balance || 0;
        document.getElementById('walletBalanceBottom').innerText = userData.wallet_balance || 0;
        document.getElementById('walletFullBalance').innerHTML = `₹${userData.wallet_balance || 0}`;
        document.getElementById('coinsBalance').innerText = userData.coins || 0;
        document.getElementById('coinsFullBalance').innerText = userData.coins || 0;
        
        const codStatusEl = document.getElementById('codStatus');
        if (userData.cod_status === 'BLOCKED') {
            codStatusEl.innerText = 'Blocked';
            codStatusEl.classList.add('text-red-600');
            codStatusEl.classList.remove('text-green-600');
        } else {
            codStatusEl.innerText = 'Active';
            codStatusEl.classList.add('text-green-600');
            codStatusEl.classList.remove('text-red-600');
        }
    }
    
    async function loadOrders() {
        const container = document.getElementById('ordersTab');
        try {
            const response = await fetch(`/api/customer/orders-list?cust_id=${userData?.cust_id}&limit=5`, {
                headers: AuthService.getAuthHeaders()
            });
            const data = await response.json();
            
            if (data.success && data.orders && data.orders.length > 0) {
                let html = '';
                data.orders.slice(0, 5).forEach(order => {
                    html += `
                        <div class="bg-white rounded-2xl border border-gray-100 p-4">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <p class="text-xs text-gray-500">Order #${order.book_id}</p>
                                    <p class="text-xs text-gray-400">${formatDate(order.placed_at)}</p>
                                </div>
                                <span class="px-2 py-1 rounded-full text-[9px] font-bold ${getStatusColor(order.status)}">${order.status_display}</span>
                            </div>
                            <div class="flex justify-between items-center mt-2">
                                <div>
                                    <p class="text-sm font-bold">₹${order.final_amount}</p>
                                    <p class="text-[10px] text-gray-500">${order.items?.length || 0} items</p>
                                </div>
                                <button onclick="location.href='track-order.html?book_id=${order.book_id}'" class="text-orange-600 text-xs font-bold">Track →</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div class="text-center text-gray-500 py-8">No orders yet</div>';
            }
        } catch (error) {
            console.error('Error loading orders:', error);
            container.innerHTML = '<div class="text-center text-gray-500 py-8">Failed to load orders</div>';
        }
    }
    
    async function loadAddresses() {
        const container = document.getElementById('addressesTab');
        try {
            const response = await fetch(`/api/customer/profile?cust_id=${userData?.cust_id}`, {
                headers: AuthService.getAuthHeaders()
            });
            const data = await response.json();
            
            if (data.success && data.addresses && data.addresses.length > 0) {
                let html = '';
                data.addresses.forEach(addr => {
                    html += `
                        <div class="bg-white rounded-2xl border ${addr.is_default ? 'border-orange-300 bg-orange-50' : 'border-gray-100'} p-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="font-bold text-sm">${addr.name || userData?.name}</p>
                                    <p class="text-xs text-gray-600 mt-1">${addr.address_line1}, ${addr.city}, ${addr.state} - ${addr.pincode}</p>
                                    <p class="text-xs text-gray-500 mt-1">📱 ${addr.mobile || userData?.mobile}</p>
                                </div>
                                ${addr.is_default ? '<span class="text-[9px] bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full">Default</span>' : ''}
                            </div>
                            <div class="flex gap-2 mt-3">
                                ${!addr.is_default ? `<button onclick="setDefaultAddress('${addr.address_id}')" class="text-[10px] text-blue-600">Set Default</button>` : ''}
                                <button onclick="deleteAddress('${addr.address_id}')" class="text-[10px] text-red-500">Delete</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div class="text-center text-gray-500 py-8">No addresses saved</div>';
            }
        } catch (error) {
            console.error('Error loading addresses:', error);
        }
    }
    
    async function loadTransactions() {
        const container = document.getElementById('transactionsList');
        // For demo, show placeholder
        container.innerHTML = `
            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl">
                <div>
                    <p class="text-xs font-bold text-green-600">+ ₹500</p>
                    <p class="text-[9px] text-gray-400">Order completed</p>
                </div>
                <p class="text-[9px] text-gray-400">2 days ago</p>
            </div>
            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl">
                <div>
                    <p class="text-xs font-bold text-green-600">+ ₹1000</p>
                    <p class="text-[9px] text-gray-400">Referral bonus</p>
                </div>
                <p class="text-[9px] text-gray-400">5 days ago</p>
            </div>
        `;
    }
    
    function switchTab(tabId) {
        // Update tabs
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.classList.add('hidden');
        });
        document.getElementById(`${tabId}Tab`).classList.remove('hidden');
        
        // Update buttons
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('tab-active', 'text-orange-600', 'border-orange-600');
            btn.classList.add('text-gray-500');
            if (btn.dataset.tab === tabId) {
                btn.classList.add('tab-active', 'text-orange-600', 'border-orange-600');
                btn.classList.remove('text-gray-500');
            }
        });
        
        // Refresh content if needed
        if (tabId === 'addresses') loadAddresses();
        if (tabId === 'orders') loadOrders();
    }
    
    function addNewAddress() {
        // Simple prompt for demo
        const address = prompt('Enter your address:');
        if (address) {
            showToast('Address added (demo)', 'success');
            loadAddresses();
        }
    }
    
    function setDefaultAddress(addressId) {
        showToast('Default address updated', 'success');
        loadAddresses();
    }
    
    function deleteAddress(addressId) {
        if (confirm('Delete this address?')) {
            showToast('Address deleted', 'info');
            loadAddresses();
        }
    }
    
    function claimWalletBalance() {
        showToast('Claim feature: Enter UPI ID', 'info');
    }
    
    function supportTicket() {
        location.href = 'support.html';
    }
    
    function faq() {
        location.href = 'faq.html';
    }
    
    function logout() {
        AuthService.logout();
        location.href = 'login.html';
    }
    
    function deleteAccount() {
        if (confirm('Are you sure? This action cannot be undone.')) {
            showToast('Account deletion request submitted', 'warning');
        }
    }
    
    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }
    
    function getStatusColor(status) {
        const colors = {
            'PENDING': 'bg-yellow-100 text-yellow-800',
            'DELIVERED': 'bg-green-100 text-green-800',
            'CANCELLED': 'bg-red-100 text-red-800',
            'SHIPPED': 'bg-blue-100 text-blue-800'
        };
        return colors[status] || 'bg-gray-100 text-gray-600';
    }
    
    async function loadWalletBalance() {
        const user = AuthService.getCurrentUser();
        if (user && user.wallet_balance !== undefined) {
            document.getElementById('walletBalanceBottom').innerText = user.wallet_balance || 0;
        }
    }
    
    function claimWallet() {
        if (!AuthService.isAuthenticated()) {
            location.href = 'login.html';
            return;
        }
        switchTab('wallet');
    }
    
    async function updateCartCount() {
        if (CartManager) {
            const count = CartManager.getCartCount();
            const badge = document.getElementById('cartCount');
            if (badge) {
                if (count > 0) {
                    badge.innerText = count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
        }
    }
    
    function showToast(message, type) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.backgroundColor = type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#10b981';
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }
</script>
</body>
</html>
