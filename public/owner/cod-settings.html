<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>COD Settings - Suriyanwa Saffari Owner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .sidebar { transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 50px; font-size: 12px; z-index: 200; display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<div id="toast" class="toast"></div>

<!-- Mobile Menu Toggle -->
<button id="menuToggle" class="fixed bottom-20 left-4 z-50 bg-blue-900 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center md:hidden">
    <i class="fa-solid fa-bars text-xl"></i>
</button>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 overflow-y-auto">
    <div class="p-5 border-b"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gradient-to-r from-blue-900 to-orange-600 rounded-full flex items-center justify-center text-white font-bold text-xl">O</div><div><h2 class="font-black text-blue-900">Suriyanwa</h2><p class="text-[10px] text-gray-500">Owner Portal</p></div></div></div>
    <nav class="p-3">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-line w-5"></i><span class="text-sm font-medium">Dashboard</span></a>
        <a href="customers.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-users w-5"></i><span class="text-sm font-medium">Customers</span></a>
        <a href="sellers.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-store w-5"></i><span class="text-sm font-medium">Sellers</span></a>
        <a href="riders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-motorcycle w-5"></i><span class="text-sm font-medium">Riders</span></a>
        <a href="cod-settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-orange-50 text-orange-600 mb-1"><i class="fa-solid fa-money-bill w-5"></i><span class="text-sm font-medium">COD Settings</span></a>
        <a href="commission-settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-percent w-5"></i><span class="text-sm font-medium">Commission</span></a>
        <a href="rider-rate-settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-motorcycle w-5"></i><span class="text-sm font-medium">Rider Rates</span></a>
        <a href="delivery-charge-settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-truck w-5"></i><span class="text-sm font-medium">Delivery Charges</span></a>
        <a href="return-policy.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-rotate-left w-5"></i><span class="text-sm font-medium">Return Policy</span></a>
        <a href="general-settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-gear w-5"></i><span class="text-sm font-medium">General</span></a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t"><button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-red-600 w-full"><i class="fa-solid fa-sign-out-alt w-5"></i><span class="text-sm font-medium">Logout</span></button></div>
</aside>

<!-- Main Content -->
<main class="md:ml-64 p-4 pb-24">
    <div class="mb-6"><h1 class="text-2xl font-black text-blue-900">COD Settings</h1><p class="text-sm text-gray-500">Configure Cash on Delivery parameters</p></div>

    <form id="codSettingsForm" class="space-y-6">
        <!-- Basic COD Settings -->
        <div class="bg-white rounded-2xl shadow-sm p-5">
            <h2 class="font-bold text-gray-800 mb-4">Basic Settings</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="text-sm font-medium block mb-1">Enable COD</label><select id="codEnabled" class="w-full border rounded-xl p-3 text-sm"><option value="true">Yes</option><option value="false">No</option></select></div>
                <div><label class="text-sm font-medium block mb-1">Minimum Order Amount for COD</label><input type="number" id="codMinAmount" class="w-full border rounded-xl p-3 text-sm" placeholder="₹200"></div>
                <div><label class="text-sm font-medium block mb-1">Maximum Order Amount for COD</label><input type="number" id="codMaxAmount" class="w-full border rounded-xl p-3 text-sm" placeholder="₹50000"></div>
                <div><label class="text-sm font-medium block mb-1">COD Available Till Time</label><input type="time" id="codAvailableTill" class="w-full border rounded-xl p-3 text-sm"></div>
                <div><label class="text-sm font-medium block mb-1">COD Charge (%)</label><input type="number" id="codChargePercent" class="w-full border rounded-xl p-3 text-sm" placeholder="0"></div>
                <div><label class="text-sm font-medium block mb-1">COD Charge (Fixed)</label><input type="number" id="codChargeFixed" class="w-full border rounded-xl p-3 text-sm" placeholder="₹0"></div>
            </div>
        </div>

        <!-- Delivery Charges -->
        <div class="bg-white rounded-2xl shadow-sm p-5">
            <h2 class="font-bold text-gray-800 mb-4">Delivery Charges</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="text-sm font-medium block mb-1">Standard Delivery Charge</label><input type="number" id="deliveryCharge" class="w-full border rounded-xl p-3 text-sm" placeholder="₹40"></div>
                <div><label class="text-sm font-medium block mb-1">Free Delivery Minimum Order</label><input type="number" id="freeDeliveryMin" class="w-full border rounded-xl p-3 text-sm" placeholder="₹499"></div>
            </div>
        </div>

        <!-- RTO Settings -->
        <div class="bg-white rounded-2xl shadow-sm p-5">
            <h2 class="font-bold text-gray-800 mb-4">RTO & COD Block Settings</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="text-sm font-medium block mb-1">RTO Fine Amount</label><input type="number" id="rtoFineAmount" class="w-full border rounded-xl p-3 text-sm" placeholder="₹100"></div>
                <div><label class="text-sm font-medium block mb-1">COD Block Duration (Days)</label><input type="number" id="codBlockDays" class="w-full border rounded-xl p-3 text-sm" placeholder="30"></div>
                <div><label class="text-sm font-medium block mb-1">COD Unblock Fine</label><input type="number" id="codBlockFine" class="w-full border rounded-xl p-3 text-sm" placeholder="₹100"></div>
                <div><label class="text-sm font-medium block mb-1">RTO Threshold (%)</label><input type="number" id="highRtoThreshold" class="w-full border rounded-xl p-3 text-sm" placeholder="25"></div>
                <div><label class="text-sm font-medium block mb-1">Auto Block After RTO Count</label><input type="number" id="autoBlockRtoCount" class="w-full border rounded-xl p-3 text-sm" placeholder="3"></div>
            </div>
        </div>

        <!-- Pincode Restrictions -->
        <div class="bg-white rounded-2xl shadow-sm p-5">
            <h2 class="font-bold text-gray-800 mb-4">Pincode Restrictions</h2>
            <div><label class="text-sm font-medium block mb-1">Allowed Pincodes (comma separated)</label><input type="text" id="allowedPincodes" class="w-full border rounded-xl p-3 text-sm" placeholder="221404,221405,221406"></div>
            <div class="mt-3"><label class="text-sm font-medium block mb-1">Blocked Pincodes (comma separated)</label><input type="text" id="blockedPincodes" class="w-full border rounded-xl p-3 text-sm" placeholder="221400,221401"></div>
        </div>

        <!-- Save Button -->
        <div><button type="submit" class="w-full bg-blue-900 text-white py-3 rounded-xl font-bold">Save Settings</button></div>
    </form>
</main>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() { checkAuth(); loadSettings(); setupMobileMenu(); document.getElementById('codSettingsForm').addEventListener('submit', saveSettings); });
    
    function checkAuth() { const user = AuthService.getCurrentUser(); if(!user||user.user_type!=='owner') location.href='login.html'; }
    
    async function loadSettings() {
        try {
            const response = await fetch('/api/owner/settings/cod-settings', { headers: AuthService.getAuthHeaders() });
            const data = await response.json();
            if(data.success) {
                const s = data.settings;
                document.getElementById('codEnabled').value = s.cod_enabled || 'true';
                document.getElementById('codMinAmount').value = s.cod_min_amount || 200;
                document.getElementById('codMaxAmount').value = s.cod_max_amount || 50000;
                document.getElementById('codAvailableTill').value = s.cod_available_till_time || '20:00';
                document.getElementById('codChargePercent').value = s.cod_charge_percentage || 0;
                document.getElementById('codChargeFixed').value = s.cod_charge_fixed || 0;
                document.getElementById('deliveryCharge').value = s.delivery_charge || 40;
                document.getElementById('freeDeliveryMin').value = s.free_delivery_min || 499;
                document.getElementById('rtoFineAmount').value = s.rto_fine_amount || 100;
                document.getElementById('codBlockDays').value = s.cod_block_days || 30;
                document.getElementById('codBlockFine').value = s.cod_block_fine || 100;
                document.getElementById('highRtoThreshold').value = s.high_rto_threshold || 25;
                document.getElementById('autoBlockRtoCount').value = s.auto_block_cod_on_rto_count || 3;
                document.getElementById('allowedPincodes').value = Array.isArray(s.allowed_pincodes) ? s.allowed_pincodes.join(',') : '';
                document.getElementById('blockedPincodes').value = Array.isArray(s.blocked_pincodes) ? s.blocked_pincodes.join(',') : '';
            }
        } catch(error) { console.error('Error loading settings:', error); showToast('Failed to load settings', 'error'); }
    }
    
    async function saveSettings(e) {
        e.preventDefault();
        const data = { cod_enabled: document.getElementById('codEnabled').value, cod_min_amount: parseInt(document.getElementById('codMinAmount').value), cod_max_amount: parseInt(document.getElementById('codMaxAmount').value), cod_available_till_time: document.getElementById('codAvailableTill').value, cod_charge_percentage: parseInt(document.getElementById('codChargePercent').value), cod_charge_fixed: parseInt(document.getElementById('codChargeFixed').value), delivery_charge: parseInt(document.getElementById('deliveryCharge').value), free_delivery_min: parseInt(document.getElementById('freeDeliveryMin').value), rto_fine_amount: parseInt(document.getElementById('rtoFineAmount').value), cod_block_days: parseInt(document.getElementById('codBlockDays').value), cod_block_fine: parseInt(document.getElementById('codBlockFine').value), high_rto_threshold: parseInt(document.getElementById('highRtoThreshold').value), auto_block_cod_on_rto_count: parseInt(document.getElementById('autoBlockRtoCount').value), allowed_pincodes: document.getElementById('allowedPincodes').value.split(',').map(p=>p.trim()).filter(p=>p), blocked_pincodes: document.getElementById('blockedPincodes').value.split(',').map(p=>p.trim()).filter(p=>p) };
        try {
            const response = await fetch('/api/owner/settings/cod-settings', { method: 'PUT', headers: { 'Content-Type':'application/json' }, body: JSON.stringify(data) });
            const result = await response.json();
            if(result.success) showToast('Settings saved successfully', 'success');
            else showToast(result.error||'Save failed', 'error');
        } catch(error) { showToast('Save failed', 'error'); }
    }
    
    function setupMobileMenu() { const menuBtn=document.getElementById('menuToggle'),sidebar=document.getElementById('sidebar'); if(menuBtn&&sidebar) menuBtn.addEventListener('click',()=>{ sidebar.classList.toggle('open'); sidebar.style.transform=sidebar.classList.contains('open')?'translateX(0)':'translateX(-100%)'; }); }
    function logout() { AuthService.logout(); location.href='login.html'; }
    function showToast(msg,type) { const toast=document.getElementById('toast'); toast.textContent=msg; toast.style.backgroundColor=type==='error'?'#ef4444':type==='warning'?'#f59e0b':'#10b981'; toast.style.display='block'; setTimeout(()=>{ toast.style.display='none'; },2000); }
</script>
</body>
</html>
