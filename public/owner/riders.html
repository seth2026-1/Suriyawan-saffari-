<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Riders - Suriyanwa Saffari Owner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .sidebar { transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 50px; font-size: 12px; z-index: 200; display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<div id="toast" class="toast"></div>

<!-- Mobile Menu Toggle -->
<button id="menuToggle" class="fixed bottom-20 left-4 z-50 bg-blue-900 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center md:hidden">
    <i class="fa-solid fa-bars text-xl"></i>
</button>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 overflow-y-auto">
    <div class="p-5 border-b"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gradient-to-r from-blue-900 to-orange-600 rounded-full flex items-center justify-center text-white font-bold text-xl">O</div><div><h2 class="font-black text-blue-900">Suriyanwa</h2><p class="text-[10px] text-gray-500">Owner Portal</p></div></div></div>
    <nav class="p-3">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-line w-5"></i><span class="text-sm font-medium">Dashboard</span></a>
        <a href="customers.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-users w-5"></i><span class="text-sm font-medium">Customers</span></a>
        <a href="sellers.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-store w-5"></i><span class="text-sm font-medium">Sellers</span></a>
        <a href="riders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-orange-50 text-orange-600 mb-1"><i class="fa-solid fa-motorcycle w-5"></i><span class="text-sm font-medium">Riders</span></a>
        <a href="orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-truck w-5"></i><span class="text-sm font-medium">Orders</span></a>
        <a href="products.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-box w-5"></i><span class="text-sm font-medium">Products</span></a>
        <a href="payouts.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-wallet w-5"></i><span class="text-sm font-medium">Payouts</span></a>
        <a href="reports.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-simple w-5"></i><span class="text-sm font-medium">Reports</span></a>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-gear w-5"></i><span class="text-sm font-medium">Settings</span></a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t"><button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-red-600 w-full"><i class="fa-solid fa-sign-out-alt w-5"></i><span class="text-sm font-medium">Logout</span></button></div>
</aside>

<!-- Main Content -->
<main class="md:ml-64 p-4 pb-24">
    <div class="flex justify-between items-center mb-6">
        <div><h1 class="text-2xl font-black text-blue-900">Riders</h1><p class="text-sm text-gray-500">Manage delivery riders</p></div>
        <button onclick="openCreateRiderModal()" class="bg-blue-900 text-white px-4 py-2 rounded-xl text-sm font-bold"><i class="fa-solid fa-plus mr-1"></i> Add Rider</button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div class="bg-white rounded-2xl p-3 text-center shadow-sm"><p class="text-xl font-black text-blue-900" id="totalRiders">0</p><p class="text-[9px] text-gray-500">Total</p></div>
        <div class="bg-white rounded-2xl p-3 text-center shadow-sm"><p class="text-xl font-black text-green-600" id="activeRiders">0</p><p class="text-[9px] text-gray-500">Active</p></div>
        <div class="bg-white rounded-2xl p-3 text-center shadow-sm"><p class="text-xl font-black text-orange-600" id="onlineRiders">0</p><p class="text-[9px] text-gray-500">Online</p></div>
        <div class="bg-white rounded-2xl p-3 text-center shadow-sm"><p id="avgRiderRating" class="text-xl font-black text-purple-600">0</p><p class="text-[9px] text-gray-500">Avg Rating</p></div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl p-3 mb-4 flex flex-wrap gap-2 items-center">
        <input type="text" id="searchInput" placeholder="Search by name, mobile..." class="flex-1 border rounded-lg px-3 py-2 text-sm">
        <select id="statusFilter" class="border rounded-lg px-3 py-2 text-sm"><option value="all">All Status</option><option value="active">Active</option><option value="inactive">Inactive</option></select>
        <select id="onlineFilter" class="border rounded-lg px-3 py-2 text-sm"><option value="all">All</option><option value="online">Online</option><option value="offline">Offline</option></select>
        <button onclick="loadRiders()" class="bg-blue-900 text-white px-4 py-2 rounded-lg text-sm">Filter</button>
        <button onclick="exportRiders()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm"><i class="fa-solid fa-download"></i> Export</button>
    </div>

    <!-- Riders Table -->
    <div class="bg-white rounded-2xl shadow-sm overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b">:<tr><th class="p-3 text-left">Rider</th><th class="p-3 text-left">Contact</th><th class="p-3 text-left">Area</th><th class="p-3 text-left">Rating</th><th class="p-3 text-left">Rate</th><th class="p-3 text-left">Deliveries</th><th class="p-3 text-left">Wallet</th><th class="p-3 text-left">Status</th><th class="p-3 text-left">Actions</th></tr></thead>
            <tbody id="ridersTable"><table><td colspan="9" class="p-4 text-center text-gray-500">Loading...</td></tr></tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="flex justify-center gap-2 mt-6"></div>

    <!-- Create Rider Modal -->
    <div id="createRiderModal" class="fixed inset-0 bg-black/50 z-[200] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full max-h-[85vh] overflow-y-auto p-5"><h3 class="font-bold text-lg mb-3">Add New Rider</h3>
            <div class="space-y-3"><input type="text" id="riderName" placeholder="Full Name" class="w-full border rounded-xl p-3 text-sm"><input type="email" id="riderEmail" placeholder="Email" class="w-full border rounded-xl p-3 text-sm"><input type="tel" id="riderMobile" placeholder="Mobile" class="w-full border rounded-xl p-3 text-sm"><input type="text" id="riderUpi" placeholder="UPI ID" class="w-full border rounded-xl p-3 text-sm"><input type="text" id="riderArea" placeholder="Assigned Area" class="w-full border rounded-xl p-3 text-sm"><input type="text" id="riderPincodes" placeholder="Pincodes (comma separated)" class="w-full border rounded-xl p-3 text-sm"><div class="grid grid-cols-2 gap-2"><input type="number" id="riderRate" placeholder="Rate/Parcel" class="border rounded-xl p-3 text-sm" value="18"><input type="number" id="riderPickupRate" placeholder="Pickup Rate" class="border rounded-xl p-3 text-sm" value="10"></div><div class="flex gap-3"><button onclick="closeCreateRiderModal()" class="flex-1 border border-gray-300 py-3 rounded-xl">Cancel</button><button onclick="createRider()" class="flex-1 bg-blue-900 text-white py-3 rounded-xl font-bold">Create</button></div></div>
        </div>
    </div>

    <!-- Edit Rate Modal -->
    <div id="editRateModal" class="fixed inset-0 bg-black/50 z-[200] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-5"><h3 class="font-bold text-lg mb-3">Update Rider Rate</h3>
            <div class="space-y-3"><input type="number" id="editRate" placeholder="Rate per Parcel (₹)" class="w-full border rounded-xl p-3 text-sm"><input type="number" id="editPickupRate" placeholder="Pickup Rate (₹)" class="w-full border rounded-xl p-3 text-sm">
            <div class="flex gap-3"><button onclick="closeEditRateModal()" class="flex-1 border border-gray-300 py-3 rounded-xl">Cancel</button><button onclick="updateRiderRate()" class="flex-1 bg-blue-900 text-white py-3 rounded-xl font-bold">Update</button></div></div>
        </div>
    </div>
</main>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>

<script>
    let riders = [];
    let currentPage = 1;
    let totalPages = 1;
    let selectedRiderId = null;
    
    document.addEventListener('DOMContentLoaded', function() { checkAuth(); loadRiders(); setupMobileMenu(); });
    
    function checkAuth() { const user = AuthService.getCurrentUser(); if(!user||user.user_type!=='owner') location.href='login.html'; }
    
    async function loadRiders() {
        const search = document.getElementById('searchInput').value;
        const status = document.getElementById('statusFilter').value;
        const online = document.getElementById('onlineFilter').value;
        let url = `/api/owner/users/riders?page=${currentPage}&limit=20`;
        if(search) url += `&search=${encodeURIComponent(search)}`;
        if(status !== 'all') url += `&status=${status}`;
        if(online !== 'all') url += `&online_status=${online}`;
        try {
            const response = await fetch(url, { headers: AuthService.getAuthHeaders() });
            const data = await response.json();
            if(data.success) {
                riders = data.riders;
                totalPages = data.pagination.total_pages;
                updateStats(data.stats);
                renderRiders();
                renderPagination();
            }
        } catch(error) { console.error('Error loading riders:', error); showToast('Failed to load riders', 'error'); }
    }
    
    function updateStats(stats) {
        document.getElementById('totalRiders').innerText = stats.total||0;
        document.getElementById('activeRiders').innerText = stats.active||0;
        document.getElementById('onlineRiders').innerText = stats.online||0;
        document.getElementById('avgRiderRating').innerText = stats.avg_rating?.toFixed(1)||0;
    }
    
    function renderRiders() {
        const tbody = document.getElementById('ridersTable');
        if(!riders.length){ tbody.innerHTML='<tr><td colspan="9" class="p-4 text-center text-gray-500">No riders found</td></tr>'; return; }
        let html='';
        riders.forEach(r=>{ html+=`<tr class="border-b hover:bg-gray-50"><td class="p-3"><p class="font-medium">${r.name}</p><p class="text-[9px] text-gray-500">${r.rider_id}</p><tr><td class="p-3"><p class="text-xs">${r.mobile}</p><p class="text-[9px] text-gray-500">${r.email}</p></td><td class="p-3">${r.assigned_area||'-'}</td><td class="p-3">⭐ ${r.rating||0}</td><td class="p-3">₹${r.rate_per_parcel||18}/delivery<br>₹${r.pickup_rate||10}/pickup</td><td class="p-3">${r.total_deliveries||0}</td><td class="p-3">₹${r.wallet_balance||0}</td><td class="p-3"><span class="px-2 py-1 rounded-full text-[9px] font-bold ${r.is_active?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${r.is_active?'Active':'Inactive'}</span><br><span class="text-[9px] ${r.is_online?'text-green-600':'text-gray-500'}">${r.is_online?'● Online':'○ Offline'}</span></td>
            <td class="p-3"><button onclick="viewRider('${r.rider_id}')" class="text-blue-600 text-xs mr-2">View</button><button onclick="openEditRateModal('${r.rider_id}', ${r.rate_per_parcel||18}, ${r.pickup_rate||10})" class="text-orange-600 text-xs mr-2">Edit Rate</button><button onclick="toggleRiderStatus('${r.rider_id}', ${!r.is_active})" class="text-xs ${r.is_active?'text-red-500':'text-green-600'}">${r.is_active?'Deactivate':'Activate'}</button></td></tr>`; });
        tbody.innerHTML=html;
    }
    
    function renderPagination() { const container = document.getElementById('pagination'); if(totalPages<=1){ container.innerHTML=''; return; } let html=''; for(let i=1;i<=totalPages;i++) html+=`<button onclick="goToPage(${i})" class="w-8 h-8 rounded-lg ${i===currentPage?'bg-blue-900 text-white':'bg-gray-100 text-gray-600'} text-sm">${i}</button>`; container.innerHTML=html; }
    function goToPage(page) { currentPage=page; loadRiders(); window.scrollTo(0,0); }
    function viewRider(id) { location.href=`rider-detail.html?rider_id=${id}`; }
    
    function openCreateRiderModal() { document.getElementById('createRiderModal').classList.add('flex'); document.getElementById('createRiderModal').classList.remove('hidden'); }
    function closeCreateRiderModal() { document.getElementById('createRiderModal').classList.remove('flex'); document.getElementById('createRiderModal').classList.add('hidden'); }
    async function createRider() {
        const data = { name: document.getElementById('riderName').value, email: document.getElementById('riderEmail').value, mobile: document.getElementById('riderMobile').value, upi_id: document.getElementById('riderUpi').value, assigned_area: document.getElementById('riderArea').value, assigned_pincodes: document.getElementById('riderPincodes').value.split(',').map(p=>p.trim()), rate_per_parcel: parseInt(document.getElementById('riderRate').value), pickup_rate: parseInt(document.getElementById('riderPickupRate').value) };
        if(!data.name||!data.email||!data.mobile){ showToast('Name, email and mobile required','warning'); return; }
        try {
            const response = await fetch('/api/owner/users/create-rider', { method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify(data) });
            const result = await response.json();
            if(result.success) { showToast('Rider created successfully','success'); closeCreateRiderModal(); loadRiders(); }
            else showToast(result.error||'Creation failed','error');
        } catch(error) { showToast('Creation failed','error'); }
    }
    
    function openEditRateModal(riderId, rate, pickupRate) { selectedRiderId=riderId; document.getElementById('editRate').value=rate; document.getElementById('editPickupRate').value=pickupRate; document.getElementById('editRateModal').classList.add('flex'); document.getElementById('editRateModal').classList.remove('hidden'); }
    function closeEditRateModal() { document.getElementById('editRateModal').classList.remove('flex'); document.getElementById('editRateModal').classList.add('hidden'); selectedRiderId=null; }
    async function updateRiderRate() {
        try {
            const response = await fetch('/api/owner/users/riders', { method: 'PUT', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ rider_id: selectedRiderId, rate_per_parcel: parseInt(document.getElementById('editRate').value), pickup_rate: parseInt(document.getElementById('editPickupRate').value) }) });
            const data = await response.json();
            if(data.success) { showToast('Rate updated','success'); closeEditRateModal(); loadRiders(); }
            else showToast('Update failed','error');
        } catch(error) { showToast('Update failed','error'); }
    }
    
    async function toggleRiderStatus(riderId, activate) { if(confirm(activate?'Activate this rider?':'Deactivate this rider?')){ try{
        const response = await fetch('/api/owner/users/block-user', { method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ user_id: riderId, user_type: 'rider', action: activate?'unblock':'block', reason: 'Admin action' }) });
        const data = await response.json();
        if(data.success) { showToast(activate?'Rider activated':'Rider deactivated','success'); loadRiders(); }
        else showToast('Action failed','error');
    } catch(error){ showToast('Action failed','error'); } } }
    
    function exportRiders() { window.location.href='/api/owner/reports/export?export_type=riders&format=csv'; }
    function setupMobileMenu() { const menuBtn=document.getElementById('menuToggle'),sidebar=document.getElementById('sidebar'); if(menuBtn&&sidebar) menuBtn.addEventListener('click',()=>{ sidebar.classList.toggle('open'); sidebar.style.transform=sidebar.classList.contains('open')?'translateX(0)':'translateX(-100%)'; }); }
    function logout() { AuthService.logout(); location.href='login.html'; }
    function showToast(msg,type) { const toast=document.getElementById('toast'); toast.textContent=msg; toast.style.backgroundColor=type==='error'?'#ef4444':type==='warning'?'#f59e0b':'#10b981'; toast.style.display='block'; setTimeout(()=>{ toast.style.display='none'; },2000); }
</script>
</body>
</html>
