<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RTO Processing - Suriyanwa Saffari Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .sidebar { transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 50px; font-size: 12px; z-index: 200; display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<div id="toast" class="toast"></div>

<!-- Mobile Menu Toggle -->
<button id="menuToggle" class="fixed bottom-20 left-4 z-50 bg-blue-900 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center md:hidden">
    <i class="fa-solid fa-bars text-xl"></i>
</button>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 overflow-y-auto">
    <div class="p-5 border-b"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gradient-to-r from-blue-900 to-orange-600 rounded-full flex items-center justify-center text-white font-bold text-xl">L</div><div><h2 class="font-black text-blue-900">Suriyanwa</h2><p class="text-[10px] text-gray-500">Hub Portal</p></div></div></div>
    <nav class="p-3">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-line w-5"></i><span class="text-sm font-medium">Dashboard</span></a>
        <a href="runsheet.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-clipboard-list w-5"></i><span class="text-sm font-medium">Runsheets</span></a>
        <a href="create-runsheet.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-plus-circle w-5"></i><span class="text-sm font-medium">Create Runsheet</span></a>
        <a href="inbound.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-download w-5"></i><span class="text-sm font-medium">Inbound Scan</span></a>
        <a href="outbound.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-upload w-5"></i><span class="text-sm font-medium">Outbound Scan</span></a>
        <a href="bagging.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-box w-5"></i><span class="text-sm font-medium">Bagging</span></a>
        <a href="cod.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-money-bill w-5"></i><span class="text-sm font-medium">COD Collection</span></a>
        <a href="rto.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-orange-50 text-orange-600 mb-1"><i class="fa-solid fa-undo w-5"></i><span class="text-sm font-medium">RTO Processing</span></a>
        <a href="riders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-motorcycle w-5"></i><span class="text-sm font-medium">Riders</span></a>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-gear w-5"></i><span class="text-sm font-medium">Settings</span></a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t"><button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-red-600 w-full"><i class="fa-solid fa-sign-out-alt w-5"></i><span class="text-sm font-medium">Logout</span></button></div>
</aside>

<!-- Main Content -->
<main class="md:ml-64 p-4 pb-24">
    <div class="mb-6"><h1 class="text-2xl font-black text-blue-900">RTO Processing</h1><p class="text-sm text-gray-500">Handle Return to Origin shipments</p></div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div class="bg-white rounded-2xl p-3 shadow-sm"><p class="text-[9px] text-gray-400">Total RTO</p><p id="totalRto" class="text-xl font-black text-red-600">0</p></div>
        <div class="bg-white rounded-2xl p-3 shadow-sm"><p class="text-[9px] text-gray-400">Total Amount</p><p id="totalRtoAmount" class="text-xl font-black text-orange-600">₹0</p></div>
        <div class="bg-white rounded-2xl p-3 shadow-sm"><p class="text-[9px] text-gray-400">Pending Return</p><p id="pendingReturn" class="text-xl font-black text-yellow-600">0</p></div>
        <div class="bg-white rounded-2xl p-3 shadow-sm"><p class="text-[9px] text-gray-400">This Month</p><p id="monthlyRto" class="text-xl font-black text-purple-600">0</p></div>
    </div>

    <!-- RTO Orders List -->
    <div class="bg-white rounded-2xl shadow-sm"><div class="px-4 py-3 border-b"><h3 class="font-bold text-gray-800">RTO Orders</h3></div><div id="rtoList" class="divide-y"><div class="p-4 text-center text-gray-500">Loading...</div></div></div>

    <!-- Action Modal -->
    <div id="actionModal" class="fixed inset-0 bg-black/50 z-[200] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-5"><h3 id="modalTitle" class="font-bold text-lg mb-3">Process RTO</h3><p id="modalOrder" class="text-sm text-gray-600 mb-3"></p>
            <div class="space-y-3"><select id="actionSelect" class="w-full border rounded-xl p-3 text-sm"><option value="">Select Action</option><option value="return">Return to Seller</option><option value="restock">Restock Inventory</option><option value="dispose">Dispose (Damaged)</option></select>
            <textarea id="actionNotes" rows="2" class="w-full border rounded-xl p-3 text-sm" placeholder="Notes / Reason"></textarea>
            <div class="flex gap-3"><button onclick="closeModal()" class="flex-1 border border-gray-300 py-3 rounded-xl">Cancel</button><button onclick="processRTO()" class="flex-1 bg-orange-600 text-white py-3 rounded-xl font-bold">Process</button></div></div>
        </div>
    </div>
</main>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>

<script>
    let hubData = null;
    let rtoOrders = [];
    let selectedOrder = null;
    
    document.addEventListener('DOMContentLoaded', function() { checkAuth(); loadRtoOrders(); setupMobileMenu(); });
    
    function checkAuth() { const user = AuthService.getCurrentUser(); if(!user||!user.hub_id) location.href='login.html'; else hubData=user; }
    
    async function loadRtoOrders() {
        try {
            const response = await fetch(`/api/logistics/hub/rto-process?hub_id=${hubData.hub_id}`, { headers: AuthService.getAuthHeaders() });
            const data = await response.json();
            if(data.success) {
                rtoOrders = data.rto_orders||[];
                document.getElementById('totalRto').innerText = data.stats.total_rto||0;
                document.getElementById('totalRtoAmount').innerHTML = `₹${data.stats.total_rto_amount||0}`;
                document.getElementById('pendingReturn').innerText = data.stats.pending_return_to_seller||0;
                document.getElementById('monthlyRto').innerText = data.stats.monthly_rto||0;
                renderRtoList();
            }
        } catch(error) { console.error('Error loading RTO orders:', error); showToast('Failed to load RTO orders', 'error'); }
    }
    
    function renderRtoList() {
        const container = document.getElementById('rtoList');
        if(!rtoOrders.length){ container.innerHTML='<div class="p-4 text-center text-gray-500">No RTO orders</div>'; return; }
        let html='';
        rtoOrders.forEach(o=>{ html+=`<div class="p-3 flex justify-between items-center"><div><p class="font-medium">#${o.book_id}</p><p class="text-[9px] text-gray-500">Customer: ${o.customer?.name} • Seller: ${o.seller?.shop_name}</p><p class="text-[9px] text-gray-400">Reason: ${o.cancel_reason||'N/A'}</p></div><div class="text-right"><p class="font-bold text-red-600">₹${o.amount}</p><button onclick="openActionModal('${o.book_id}', ${o.amount})" class="text-orange-600 text-xs mt-1">Process →</button></div></div>`; });
        container.innerHTML=html;
    }
    
    function openActionModal(bookId, amount) { selectedOrder=bookId; document.getElementById('modalOrder').innerHTML=`Order #${bookId} • Amount: ₹${amount}`; document.getElementById('actionModal').classList.add('flex'); document.getElementById('actionModal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('actionModal').classList.remove('flex'); document.getElementById('actionModal').classList.add('hidden'); selectedOrder=null; }
    
    async function processRTO() {
        const action = document.getElementById('actionSelect').value;
        const notes = document.getElementById('actionNotes').value;
        if(!action) { showToast('Select action','warning'); return; }
        try {
            const response = await fetch('/api/logistics/hub/rto-process', {
                method: 'POST',
                headers: { 'Content-Type':'application/json' },
                body: JSON.stringify({ hub_id: hubData.hub_id, book_id: selectedOrder, action: action, damage_notes: notes })
            });
            const data = await response.json();
            if(data.success) { showToast(`Order ${action}ed successfully`,'success'); closeModal(); loadRtoOrders(); }
            else showToast(data.error||'Processing failed','error');
        } catch(error) { showToast('Processing failed','error'); }
    }
    
    function setupMobileMenu() { const menuBtn=document.getElementById('menuToggle'),sidebar=document.getElementById('sidebar'); if(menuBtn&&sidebar) menuBtn.addEventListener('click',()=>{ sidebar.classList.toggle('open'); sidebar.style.transform=sidebar.classList.contains('open')?'translateX(0)':'translateX(-100%)'; }); }
    function logout() { AuthService.logout(); location.href='login.html'; }
    function showToast(msg,type) { const toast=document.getElementById('toast'); toast.textContent=msg; toast.style.backgroundColor=type==='error'?'#ef4444':type==='warning'?'#f59e0b':'#10b981'; toast.style.display='block'; setTimeout(()=>{ toast.style.display='none'; },2000); }
</script>
</body>
</html>
