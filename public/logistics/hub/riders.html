<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Riders - Suriyanwa Saffari Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .sidebar { transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 50px; font-size: 12px; z-index: 200; display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<div id="toast" class="toast"></div>

<!-- Mobile Menu Toggle -->
<button id="menuToggle" class="fixed bottom-20 left-4 z-50 bg-blue-900 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center md:hidden">
    <i class="fa-solid fa-bars text-xl"></i>
</button>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 overflow-y-auto">
    <div class="p-5 border-b"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gradient-to-r from-blue-900 to-orange-600 rounded-full flex items-center justify-center text-white font-bold text-xl">L</div><div><h2 class="font-black text-blue-900">Suriyanwa</h2><p class="text-[10px] text-gray-500">Hub Portal</p></div></div></div>
    <nav class="p-3">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-line w-5"></i><span class="text-sm font-medium">Dashboard</span></a>
        <a href="runsheet.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-clipboard-list w-5"></i><span class="text-sm font-medium">Runsheets</span></a>
        <a href="create-runsheet.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-plus-circle w-5"></i><span class="text-sm font-medium">Create Runsheet</span></a>
        <a href="inbound.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-download w-5"></i><span class="text-sm font-medium">Inbound Scan</span></a>
        <a href="outbound.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-upload w-5"></i><span class="text-sm font-medium">Outbound Scan</span></a>
        <a href="bagging.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-box w-5"></i><span class="text-sm font-medium">Bagging</span></a>
        <a href="cod.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-money-bill w-5"></i><span class="text-sm font-medium">COD Collection</span></a>
        <a href="rto.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-undo w-5"></i><span class="text-sm font-medium">RTO Processing</span></a>
        <a href="riders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-orange-50 text-orange-600 mb-1"><i class="fa-solid fa-motorcycle w-5"></i><span class="text-sm font-medium">Riders</span></a>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-gear w-5"></i><span class="text-sm font-medium">Settings</span></a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t"><button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-red-600 w-full"><i class="fa-solid fa-sign-out-alt w-5"></i><span class="text-sm font-medium">Logout</span></button></div>
</aside>

<!-- Main Content -->
<main class="md:ml-64 p-4 pb-24">
    <div class="flex justify-between items-center mb-6"><div><h1 class="text-2xl font-black text-blue-900">Riders</h1><p class="text-sm text-gray-500">Manage delivery riders</p></div><button onclick="openAddRiderModal()" class="bg-blue-900 text-white px-4 py-2 rounded-xl text-sm font-bold"><i class="fa-solid fa-plus mr-1"></i> Add Rider</button></div>

    <!-- Stats -->
    <div class="grid grid-cols-4 gap-3 mb-6">
        <div class="bg-white rounded-2xl p-3 text-center shadow-sm"><p id="totalRiders" class="text-xl font-black text-blue-900">0</p><p class="text-[9px] text-gray-500">Total</p></div>
        <div class="bg-white rounded-2xl p-3 text-center shadow-sm"><p id="activeRiders" class="text-xl font-black text-green-600">0</p><p class="text-[9px] text-gray-500">Active</p></div>
        <div class="bg-white rounded-2xl p-3 text-center shadow-sm"><p id="onlineRiders" class="text-xl font-black text-orange-600">0</p><p class="text-[9px] text-gray-500">Online</p></div>
        <div class="bg-white rounded-2xl p-3 text-center shadow-sm"><p id="avgRating" class="text-xl font-black text-purple-600">0</p><p class="text-[9px] text-gray-500">Avg Rating</p></div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl p-3 mb-4 flex flex-wrap gap-2"><input type="text" id="searchInput" placeholder="Search by name/mobile" class="flex-1 border rounded-lg px-3 py-2 text-sm"><select id="statusFilter" class="border rounded-lg px-3 py-2 text-sm"><option value="all">All</option><option value="active">Active</option><option value="inactive">Inactive</option><option value="online">Online</option><option value="offline">Offline</option></select><button onclick="loadRiders()" class="bg-blue-900 text-white px-4 py-2 rounded-lg text-sm">Filter</button></div>

    <!-- Riders List -->
    <div id="ridersList" class="space-y-3"><div class="p-4 text-center text-gray-500">Loading...</div></div>

    <!-- Add Rider Modal -->
    <div id="addRiderModal" class="fixed inset-0 bg-black/50 z-[200] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full max-h-[85vh] overflow-y-auto p-5"><h3 class="font-bold text-lg mb-3">Add New Rider</h3>
            <div class="space-y-3"><input type="text" id="riderName" placeholder="Full Name" class="w-full border rounded-xl p-3 text-sm"><input type="email" id="riderEmail" placeholder="Email" class="w-full border rounded-xl p-3 text-sm"><input type="tel" id="riderMobile" placeholder="Mobile" class="w-full border rounded-xl p-3 text-sm"><input type="text" id="riderUpi" placeholder="UPI ID" class="w-full border rounded-xl p-3 text-sm"><input type="text" id="riderArea" placeholder="Assigned Area" class="w-full border rounded-xl p-3 text-sm"><input type="text" id="riderPincodes" placeholder="Assigned Pincodes (comma separated)" class="w-full border rounded-xl p-3 text-sm"><div class="grid grid-cols-2 gap-3"><input type="number" id="riderRate" placeholder="Rate per Parcel" class="border rounded-xl p-3 text-sm" value="18"><input type="number" id="riderPickupRate" placeholder="Pickup Rate" class="border rounded-xl p-3 text-sm" value="10"></div>
            <div class="flex gap-3 mt-3"><button onclick="closeAddRiderModal()" class="flex-1 border border-gray-300 py-3 rounded-xl">Cancel</button><button onclick="addRider()" class="flex-1 bg-blue-900 text-white py-3 rounded-xl font-bold">Add Rider</button></div></div>
        </div>
    </div>

    <!-- Edit Rate Modal -->
    <div id="editRateModal" class="fixed inset-0 bg-black/50 z-[200] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-5"><h3 class="font-bold text-lg mb-3">Update Rider Rate</h3>
            <div class="space-y-3"><input type="number" id="editRate" placeholder="Rate per Parcel (₹)" class="w-full border rounded-xl p-3 text-sm"><input type="number" id="editPickupRate" placeholder="Pickup Rate (₹)" class="w-full border rounded-xl p-3 text-sm">
            <div class="flex gap-3"><button onclick="closeEditRateModal()" class="flex-1 border border-gray-300 py-3 rounded-xl">Cancel</button><button onclick="updateRate()" class="flex-1 bg-blue-900 text-white py-3 rounded-xl font-bold">Update</button></div></div>
        </div>
    </div>
</main>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>

<script>
    let hubData = null;
    let riders = [];
    let selectedRiderId = null;
    
    document.addEventListener('DOMContentLoaded', function() { checkAuth(); loadRiders(); setupMobileMenu(); });
    
    function checkAuth() { const user = AuthService.getCurrentUser(); if(!user||!user.hub_id) location.href='login.html'; else hubData=user; }
    
    async function loadRiders() {
        try {
            const search = document.getElementById('searchInput').value;
            const status = document.getElementById('statusFilter').value;
            let url = `/api/logistics/hub/riders?hub_id=${hubData.hub_id}`;
            if(search) url+=`&search=${encodeURIComponent(search)}`;
            if(status!=='all') url+=`&status=${status}`;
            const response = await fetch(url, { headers: AuthService.getAuthHeaders() });
            const data = await response.json();
            if(data.success) {
                riders = data.riders||[];
                document.getElementById('totalRiders').innerText = data.stats.total||0;
                document.getElementById('activeRiders').innerText = data.stats.active||0;
                document.getElementById('onlineRiders').innerText = data.stats.online||0;
                document.getElementById('avgRating').innerText = data.stats.avg_rating.toFixed(1);
                renderRiders();
            }
        } catch(error) { console.error('Error loading riders:', error); showToast('Failed to load riders', 'error'); }
    }
    
    function renderRiders() {
        const container = document.getElementById('ridersList');
        if(!riders.length){ container.innerHTML='<div class="text-center py-8 text-gray-500">No riders found</div>'; return; }
        let html='';
        riders.forEach(r=>{ html+=`<div class="bg-white rounded-xl border border-gray-100 p-4"><div class="flex justify-between items-start"><div><p class="font-bold">${r.name}</p><p class="text-[9px] text-gray-500">${r.mobile} • ${r.email}</p><p class="text-[9px] text-gray-400 mt-1">Area: ${r.assigned_area||'N/A'}</p></div><div class="text-right"><span class="status-badge px-2 py-0.5 rounded-full text-[9px] ${r.is_online?'bg-green-100 text-green-700':'bg-gray-100 text-gray-600'}">${r.is_online?'Online':'Offline'}</span><p class="text-sm font-bold mt-1">⭐ ${r.rating||0}</p></div></div>
            <div class="flex justify-between items-center mt-3"><div><p class="text-sm">📦 Delivery: ₹${r.rate_per_parcel} | 📍 Pickup: ₹${r.pickup_rate}</p><p class="text-[9px] text-gray-400">Wallet: ₹${r.wallet_balance||0}</p></div><div class="flex gap-2"><button onclick="openEditRateModal('${r.rider_id}', ${r.rate_per_parcel}, ${r.pickup_rate})" class="text-blue-600 text-xs">Edit Rate</button><button onclick="toggleRiderStatus('${r.rider_id}', ${!r.is_active})" class="text-xs ${r.is_active?'text-red-500':'text-green-600'}">${r.is_active?'Deactivate':'Activate'}</button></div></div></div>`; });
        container.innerHTML=html;
    }
    
    function openAddRiderModal() { document.getElementById('addRiderModal').classList.add('flex'); document.getElementById('addRiderModal').classList.remove('hidden'); }
    function closeAddRiderModal() { document.getElementById('addRiderModal').classList.remove('flex'); document.getElementById('addRiderModal').classList.add('hidden'); }
    
    async function addRider() {
        const data = { hub_id: hubData.hub_id, name: document.getElementById('riderName').value, email: document.getElementById('riderEmail').value, mobile: document.getElementById('riderMobile').value, upi_id: document.getElementById('riderUpi').value, assigned_area: document.getElementById('riderArea').value, assigned_pincodes: document.getElementById('riderPincodes').value.split(',').map(p=>p.trim()), rate_per_parcel: parseInt(document.getElementById('riderRate').value), pickup_rate: parseInt(document.getElementById('riderPickupRate').value) };
        if(!data.name||!data.email||!data.mobile) { showToast('Name, email and mobile required','warning'); return; }
        try {
            const response = await fetch('/api/logistics/hub/riders', { method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify(data) });
            const result = await response.json();
            if(result.success) { showToast('Rider added successfully!','success'); closeAddRiderModal(); loadRiders(); }
            else showToast(result.error||'Failed','error');
        } catch(error) { showToast('Failed to add rider','error'); }
    }
    
    function openEditRateModal(riderId, rate, pickupRate) { selectedRiderId=riderId; document.getElementById('editRate').value=rate; document.getElementById('editPickupRate').value=pickupRate; document.getElementById('editRateModal').classList.add('flex'); document.getElementById('editRateModal').classList.remove('hidden'); }
    function closeEditRateModal() { document.getElementById('editRateModal').classList.remove('flex'); document.getElementById('editRateModal').classList.add('hidden'); selectedRiderId=null; }
    
    async function updateRate() {
        try {
            const response = await fetch('/api/logistics/hub/riders', { method: 'PUT', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ rider_id: selectedRiderId, hub_id: hubData.hub_id, rate_per_parcel: parseInt(document.getElementById('editRate').value), pickup_rate: parseInt(document.getElementById('editPickupRate').value) }) });
            const data = await response.json();
            if(data.success) { showToast('Rate updated','success'); closeEditRateModal(); loadRiders(); }
            else showToast('Update failed','error');
        } catch(error) { showToast('Update failed','error'); }
    }
    
    async function toggleRiderStatus(riderId, activate) {
        try {
            const response = await fetch('/api/logistics/hub/riders', { method: 'PUT', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ rider_id: riderId, hub_id: hubData.hub_id, is_active: activate }) });
            const data = await response.json();
            if(data.success) { showToast(activate?'Rider activated':'Rider deactivated','success'); loadRiders(); }
            else showToast('Operation failed','error');
        } catch(error) { showToast('Operation failed','error'); }
    }
    
    function setupMobileMenu() { const menuBtn=document.getElementById('menuToggle'),sidebar=document.getElementById('sidebar'); if(menuBtn&&sidebar) menuBtn.addEventListener('click',()=>{ sidebar.classList.toggle('open'); sidebar.style.transform=sidebar.classList.contains('open')?'translateX(0)':'translateX(-100%)'; }); }
    function logout() { AuthService.logout(); location.href='login.html'; }
    function showToast(msg,type) { const toast=document.getElementById('toast'); toast.textContent=msg; toast.style.backgroundColor=type==='error'?'#ef4444':type==='warning'?'#f59e0b':'#10b981'; toast.style.display='block'; setTimeout(()=>{ toast.style.display='none'; },2000); }
</script>
</body>
</html>
