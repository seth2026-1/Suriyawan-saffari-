<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Deliveries - Suriyanwa Saffari Rider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .bottom-nav { transition: all 0.2s; }
        .bottom-nav.active { color: #f59e0b; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 50px; font-size: 12px; z-index: 200; display: none; }
        .open-box-btn { background: #fef3c7; color: #d97706; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; margin-left: 8px; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-20">

<div id="toast" class="toast"></div>

<!-- Header -->
<header class="bg-white sticky top-0 z-50 shadow-md px-4 py-3 flex justify-between items-center">
    <div><h1 class="text-xl font-black text-blue-900">Deliveries</h1><p class="text-[10px] text-gray-500">Cash on Delivery only</p></div>
    <button onclick="location.reload()" class="text-gray-500"><i class="fa-solid fa-arrows-rotate"></i></button>
</header>

<!-- Scanner Input -->
<div class="bg-white rounded-2xl shadow-sm m-4 p-4">
    <div class="text-center"><i class="fa-solid fa-qrcode text-5xl text-gray-300 mb-2"></i><p class="text-sm text-gray-600 mb-3">Scan order barcode</p>
        <div class="flex gap-2"><input type="text" id="barcodeInput" placeholder="Scan or enter barcode" class="flex-1 border rounded-xl p-3 text-sm" autofocus><button onclick="processScan()" class="bg-blue-900 text-white px-6 py-3 rounded-xl">Submit</button></div>
        <p id="scanResult" class="text-sm mt-2 hidden"></p>
    </div>
</div>

<!-- Pending Deliveries List -->
<div class="bg-white rounded-2xl shadow-sm mx-4 mb-4"><div class="px-4 py-3 border-b"><h3 class="font-bold">Pending Deliveries</h3></div><div id="deliveriesList" class="divide-y"><div class="p-4 text-center text-gray-500">Loading...</div></div></div>

<!-- Delivery Modal -->
<div id="deliveryModal" class="fixed inset-0 bg-black/50 z-[200] hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full max-h-[85vh] overflow-y-auto"><div class="sticky top-0 bg-white p-4 border-b flex justify-between"><h3 class="font-bold text-lg">Complete Delivery</h3><button onclick="closeDeliveryModal()" class="text-gray-500"><i class="fa-solid fa-times"></i></button></div>
        <div class="p-4 space-y-3"><div class="bg-gray-50 p-3 rounded-xl"><p id="modalOrderId" class="text-xs font-mono">Order #XXXX</p><p id="modalCustomer" class="text-sm font-bold">Customer Name</p><p id="modalAmount" class="text-lg font-black text-green-600">₹0</p></div>
        <div class="border p-3 rounded-xl bg-yellow-50"><label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="openBoxCheck"> <span class="text-sm font-bold">Open Box Verification</span><span class="text-[9px] text-yellow-600 ml-auto">Mandatory</span></label><p class="text-[9px] text-gray-500 mt-1">Open and show product to customer before payment</p></div>
        <div><label class="text-sm font-medium">Cash Collected</label><input type="number" id="cashCollected" class="w-full border rounded-xl p-3 text-sm mt-1" placeholder="Enter amount"></div>
        <div><label class="text-sm font-medium">Cancel Code (if customer wants to cancel)</label><input type="text" id="cancelCode" class="w-full border rounded-xl p-3 text-sm mt-1" placeholder="6-digit code"></div>
        <div><label class="text-sm font-medium">Notes (Optional)</label><textarea id="deliveryNotes" rows="2" class="w-full border rounded-xl p-3 text-sm"></textarea></div>
        <div class="flex gap-3"><button onclick="closeDeliveryModal()" class="flex-1 border border-gray-300 py-3 rounded-xl">Cancel</button><button onclick="completeDelivery()" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold">Complete Delivery</button></div>
        <div class="flex gap-3 mt-2"><button onclick="processCancellation()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold">Cancel Order (with code)</button></div></div>
    </div>
</div>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2 shadow-lg">
    <button class="bottom-nav flex flex-col items-center py-1" onclick="location.href='dashboard.html'"><i class="fa-solid fa-house text-xl"></i><span class="text-[9px]">Home</span></button>
    <button class="bottom-nav flex flex-col items-center py-1" onclick="location.href='my-runsheet.html'"><i class="fa-solid fa-clipboard-list text-xl"></i><span class="text-[9px]">Runsheet</span></button>
    <button class="bottom-nav active flex flex-col items-center py-1" onclick="location.href='delivery.html'"><i class="fa-solid fa-truck-fast text-xl"></i><span class="text-[9px]">Deliveries</span></button>
    <button class="bottom-nav flex flex-col items-center py-1" onclick="location.href='earnings.html'"><i class="fa-solid fa-wallet text-xl"></i><span class="text-[9px]">Earnings</span></button>
    <button class="bottom-nav flex flex-col items-center py-1" onclick="location.href='profile.html'"><i class="fa-regular fa-user text-xl"></i><span class="text-[9px]">Profile</span></button>
</nav>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>

<script>
    let riderData = null;
    let pendingDeliveries = [];
    let selectedOrder = null;
    
    document.addEventListener('DOMContentLoaded', function() { checkAuth(); loadDeliveries(); document.getElementById('barcodeInput').focus(); });
    
    function checkAuth() { const user = AuthService.getCurrentUser(); if(!user||!user.rider_id) location.href='login.html'; else riderData=user; }
    
    async function loadDeliveries() {
        try {
            const response = await fetch(`/api/logistics/rider/delivery-scan?rider_id=${riderData.rider_id}`, { headers: AuthService.getAuthHeaders() });
            const data = await response.json();
            if(data.success) { pendingDeliveries = data.pending_deliveries||[]; renderDeliveries(); }
        } catch(error) { console.error('Error loading deliveries:', error); showToast('Failed to load deliveries', 'error'); }
    }
    
    function renderDeliveries() {
        const container = document.getElementById('deliveriesList');
        if(!pendingDeliveries.length){ container.innerHTML='<div class="p-4 text-center text-gray-500">No pending deliveries</div>'; return; }
        let html='';
        pendingDeliveries.forEach(d=>{ html+=`<div class="p-3 flex justify-between items-center"><div><p class="font-medium">#${d.book_id}</p><p class="text-[9px] text-gray-500">${d.customer_name}</p><p class="text-[9px] text-gray-400">📍 ${d.address}</p><p class="text-xs font-bold text-green-600 mt-1">₹${d.amount} COD</p></div><button onclick="openDeliveryModal('${d.book_id}', '${d.customer_name}', ${d.amount})" class="bg-green-600 text-white px-3 py-1 rounded-lg text-xs">Deliver</button></div>`; });
        container.innerHTML=html;
    }
    
    async function processScan() { const barcode = document.getElementById('barcodeInput').value.trim(); if(!barcode){ showToast('Enter barcode','warning'); return; } await processDeliveryByBarcode(barcode); }
    
    async function processDeliveryByBarcode(barcode) {
        try {
            const response = await fetch(`/api/logistics/rider/delivery-scan?rider_id=${riderData.rider_id}&barcode=${barcode}`, { headers: AuthService.getAuthHeaders() });
            const data = await response.json();
            if(data.success && data.order) { openDeliveryModal(data.order.book_id, data.order.customer_name, data.order.amount); document.getElementById('barcodeInput').value=''; }
            else { const resultDiv=document.getElementById('scanResult'); resultDiv.className='text-sm mt-2 text-red-600'; resultDiv.innerHTML=`❌ Order not found`; showToast('Order not found','error'); setTimeout(()=>resultDiv.classList.add('hidden'),2000); }
        } catch(error) { showToast('Order not found','error'); }
    }
    
    function openDeliveryModal(bookId, customerName, amount) { selectedOrder=bookId; document.getElementById('modalOrderId').innerText=`Order #${bookId}`; document.getElementById('modalCustomer').innerText=customerName; document.getElementById('modalAmount').innerHTML=`₹${amount}`; document.getElementById('openBoxCheck').checked=false; document.getElementById('cashCollected').value=amount; document.getElementById('cancelCode').value=''; document.getElementById('deliveryNotes').value=''; document.getElementById('deliveryModal').classList.add('flex'); document.getElementById('deliveryModal').classList.remove('hidden'); }
    function closeDeliveryModal() { document.getElementById('deliveryModal').classList.remove('flex'); document.getElementById('deliveryModal').classList.add('hidden'); selectedOrder=null; }
    
    async function completeDelivery() {
        const openBoxVerified = document.getElementById('openBoxCheck').checked;
        const cashCollected = parseInt(document.getElementById('cashCollected').value);
        if(!openBoxVerified) { showToast('Open box verification is mandatory','warning'); return; }
        if(!cashCollected) { showToast('Enter cash collected amount','warning'); return; }
        try {
            const response = await fetch('/api/logistics/rider/delivery-scan', {
                method: 'POST',
                headers: { 'Content-Type':'application/json' },
                body: JSON.stringify({ rider_id: riderData.rider_id, book_id: selectedOrder, open_box_verified: true, cash_collected: cashCollected, notes: document.getElementById('deliveryNotes').value, location: await getCurrentLocation() })
            });
            const data = await response.json();
            if(data.success) { showToast('Delivery completed! +₹18','success'); closeDeliveryModal(); loadDeliveries(); }
            else showToast(data.error||'Delivery failed','error');
        } catch(error) { showToast('Delivery failed','error'); }
    }
    
    async function processCancellation() {
        const cancelCode = document.getElementById('cancelCode').value;
        if(!cancelCode) { showToast('Enter cancel code','warning'); return; }
        try {
            const response = await fetch('/api/logistics/rider/cancel-with-code', {
                method: 'POST',
                headers: { 'Content-Type':'application/json' },
                body: JSON.stringify({ rider_id: riderData.rider_id, cancel_code: cancelCode, book_id: selectedOrder, reason: 'Customer cancelled at delivery', location: await getCurrentLocation() })
            });
            const data = await response.json();
            if(data.success) { showToast('Order cancelled','success'); closeDeliveryModal(); loadDeliveries(); }
            else showToast(data.error||'Cancellation failed','error');
        } catch(error) { showToast('Cancellation failed','error'); }
    }
    
    async function getCurrentLocation() { return new Promise((resolve)=>{ if(navigator.geolocation) navigator.geolocation.getCurrentPosition((pos)=>resolve(`${pos.coords.latitude},${pos.coords.longitude}`),()=>resolve('Unknown')); else resolve('Unknown'); }); }
    function showToast(msg,type) { const toast=document.getElementById('toast'); toast.textContent=msg; toast.style.backgroundColor=type==='error'?'#ef4444':type==='warning'?'#f59e0b':'#10b981'; toast.style.display='block'; setTimeout(()=>{ toast.style.display='none'; },2000); }
</script>
</body>
</html>
