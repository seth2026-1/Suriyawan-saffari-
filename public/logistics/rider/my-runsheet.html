<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>My Runsheet - Suriyanwa Saffari Rider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .bottom-nav { transition: all 0.2s; }
        .bottom-nav.active { color: #f59e0b; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 50px; font-size: 12px; z-index: 200; display: none; }
        .status-badge { padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: bold; }
        .status-assigned { background: #fef3c7; color: #d97706; }
        .status-accepted { background: #dbeafe; color: #2563eb; }
        .status-started { background: #e0e7ff; color: #4338ca; }
        .status-completed { background: #d1fae5; color: #059669; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-20">

<div id="toast" class="toast"></div>

<!-- Header -->
<header class="bg-white sticky top-0 z-50 shadow-md px-4 py-3 flex justify-between items-center">
    <div><h1 class="text-xl font-black text-blue-900">My Runsheet</h1><p id="dateDisplay" class="text-[10px] text-gray-500">Loading...</p></div>
    <button onclick="location.reload()" class="text-gray-500"><i class="fa-solid fa-arrows-rotate"></i></button>
</header>

<!-- Runsheet Status -->
<div id="runsheetContainer" class="p-4">
    <div class="bg-white rounded-2xl shadow-sm p-4 text-center text-gray-500">Loading runsheet...</div>
</div>

<!-- Action Buttons -->
<div id="actionButtons" class="px-4 pb-4 flex gap-3"></div>

<!-- Pickups Section -->
<div id="pickupsSection" class="px-4 mb-4 hidden"><h3 class="font-bold mb-2">📦 Pickups</h3><div id="pickupsList" class="space-y-2"></div></div>

<!-- Deliveries Section -->
<div id="deliveriesSection" class="px-4 mb-20 hidden"><h3 class="font-bold mb-2">🚚 Deliveries</h3><div id="deliveriesList" class="space-y-2"></div></div>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2 shadow-lg">
    <button class="bottom-nav flex flex-col items-center py-1" onclick="location.href='dashboard.html'"><i class="fa-solid fa-house text-xl"></i><span class="text-[9px]">Home</span></button>
    <button class="bottom-nav active flex flex-col items-center py-1" onclick="location.href='my-runsheet.html'"><i class="fa-solid fa-clipboard-list text-xl"></i><span class="text-[9px]">Runsheet</span></button>
    <button class="bottom-nav flex flex-col items-center py-1" onclick="location.href='delivery.html'"><i class="fa-solid fa-truck-fast text-xl"></i><span class="text-[9px]">Deliveries</span></button>
    <button class="bottom-nav flex flex-col items-center py-1" onclick="location.href='earnings.html'"><i class="fa-solid fa-wallet text-xl"></i><span class="text-[9px]">Earnings</span></button>
    <button class="bottom-nav flex flex-col items-center py-1" onclick="location.href='profile.html'"><i class="fa-regular fa-user text-xl"></i><span class="text-[9px]">Profile</span></button>
</nav>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>

<script>
    let riderData = null;
    let runsheetData = null;
    
    document.addEventListener('DOMContentLoaded', function() { checkAuth(); loadRunsheet(); });
    
    function checkAuth() { const user = AuthService.getCurrentUser(); if(!user||!user.rider_id) location.href='login.html'; else riderData=user; document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('en-IN'); }
    
    async function loadRunsheet() {
        try {
            const response = await fetch(`/api/logistics/rider/my-runsheet?rider_id=${riderData.rider_id}`, { headers: AuthService.getAuthHeaders() });
            const data = await response.json();
            if(data.success && data.has_runsheet) {
                runsheetData = data;
                renderRunsheet();
            } else {
                document.getElementById('runsheetContainer').innerHTML = '<div class="bg-white rounded-2xl shadow-sm p-8 text-center"><i class="fa-regular fa-calendar-xmark text-4xl text-gray-300 mb-2"></i><p class="text-gray-500">No runsheet assigned for today</p><button onclick="location.reload()" class="mt-3 text-orange-600 text-sm">Refresh</button></div>';
            }
        } catch(error) { showToast('Failed to load runsheet', 'error'); }
    }
    
    function renderRunsheet() {
        const runsheet = runsheetData.runsheet;
        const pickups = runsheetData.pickups||[];
        const deliveries = runsheetData.deliveries||[];
        const actions = runsheetData.actions;
        
        document.getElementById('runsheetContainer').innerHTML = `
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <div class="bg-gradient-to-r from-blue-900 to-blue-800 text-white p-4"><p class="text-xs opacity-80">Runsheet ID</p><p class="font-bold text-lg">${runsheet.run_id}</p><p class="text-xs opacity-80 mt-1">Shift: ${runsheet.shift} | Date: ${runsheet.date}</p></div>
                <div class="p-4"><div class="flex justify-between items-center mb-3"><span class="text-sm font-medium">Status:</span><span class="status-badge status-${runsheet.status.toLowerCase()}">${runsheet.status_display}</span></div>
                <div class="flex justify-between text-sm mb-2"><span>📦 Deliveries</span><span>${runsheet.completed_deliveries}/${runsheet.total_deliveries}</span></div>
                <div class="flex justify-between text-sm mb-2"><span>📍 Pickups</span><span>${runsheet.completed_pickups}/${runsheet.total_pickups}</span></div>
                <div class="flex justify-between text-sm font-bold pt-2 border-t"><span>Estimated Earnings</span><span>₹${runsheet.estimated_earnings}</span></div>
                <div class="w-full bg-gray-200 rounded-full h-2 mt-3"><div class="bg-green-600 rounded-full h-2" style="width:${runsheet.progress_percentage}%"></div></div></div>
            </div>`;
        
        // Action Buttons
        let btnsHtml = '';
        if(actions.can_accept) btnsHtml += `<button onclick="updateStatus('accept')" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold">Accept Runsheet</button>`;
        if(actions.can_start) btnsHtml += `<button onclick="updateStatus('start')" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">Start Runsheet</button>`;
        if(actions.can_complete) btnsHtml += `<button onclick="updateStatus('complete')" class="flex-1 bg-purple-600 text-white py-3 rounded-xl font-bold">Complete Runsheet</button>`;
        document.getElementById('actionButtons').innerHTML = btnsHtml ? `<div class="flex gap-3">${btnsHtml}</div>` : '';
        
        // Pickups
        if(pickups.length){
            document.getElementById('pickupsSection').classList.remove('hidden');
            let pickupsHtml = '';
            pickups.forEach(p=>{ pickupsHtml+=`<div class="bg-white rounded-xl p-3 border flex justify-between items-center"><div><p class="font-medium">#${p.book_id}</p><p class="text-[9px] text-gray-500">${p.seller_name}</p><p class="text-[9px] text-gray-400">📍 ${p.seller_address}</p></div>${!p.is_completed?`<button onclick="location.href='pickup-scan.html?book_id=${p.book_id}'" class="bg-blue-900 text-white px-3 py-1 rounded-lg text-xs">Scan</button>`:'<span class="text-green-600 text-xs"><i class="fa-solid fa-check-circle"></i> Done</span>'}</div>`; });
            document.getElementById('pickupsList').innerHTML = pickupsHtml;
        }
        
        // Deliveries
        if(deliveries.length){
            document.getElementById('deliveriesSection').classList.remove('hidden');
            let deliveriesHtml = '';
            deliveries.forEach(d=>{ deliveriesHtml+=`<div class="bg-white rounded-xl p-3 border flex justify-between items-center"><div><p class="font-medium">#${d.book_id}</p><p class="text-[9px] text-gray-500">${d.customer_name}</p><p class="text-[9px] text-gray-400">📍 ${d.address}</p><p class="text-xs font-bold text-green-600 mt-1">₹${d.amount} COD</p></div>${!d.is_completed?`<button onclick="location.href='delivery-scan.html?book_id=${d.book_id}'" class="bg-green-600 text-white px-3 py-1 rounded-lg text-xs">Deliver</button>`:'<span class="text-green-600 text-xs"><i class="fa-solid fa-check-circle"></i> Done</span>'}</div>`; });
            document.getElementById('deliveriesList').innerHTML = deliveriesHtml;
        }
    }
    
    async function updateStatus(action) {
        try {
            const response = await fetch('/api/logistics/rider/my-runsheet', {
                method: 'PUT',
                headers: { 'Content-Type':'application/json' },
                body: JSON.stringify({ run_id: runsheetData.runsheet.run_id, rider_id: riderData.rider_id, action: action })
            });
            const data = await response.json();
            if(data.success) { showToast(`Runsheet ${action}ed`, 'success'); loadRunsheet(); }
            else showToast(data.error||'Action failed','error');
        } catch(error) { showToast('Action failed','error'); }
    }
    
    function showToast(msg,type) { const toast=document.getElementById('toast'); toast.textContent=msg; toast.style.backgroundColor=type==='error'?'#ef4444':type==='warning'?'#f59e0b':'#10b981'; toast.style.display='block'; setTimeout(()=>{ toast.style.display='none'; },2000); }
</script>
</body>
</html>
