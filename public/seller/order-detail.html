<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Order Detail - Suriyanwa Saffari Seller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .sidebar { transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        .timeline-step { position: relative; padding-left: 30px; }
        .timeline-step:before { content: ''; position: absolute; left: 10px; top: 25px; width: 2px; height: calc(100% - 30px); background: #e5e7eb; }
        .timeline-step:last-child:before { display: none; }
        .timeline-icon { position: absolute; left: 0; top: 0; width: 22px; height: 22px; border-radius: 50%; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .timeline-step.completed .timeline-icon { background: #10b981; color: white; }
        .timeline-step.active .timeline-icon { background: #f59e0b; color: white; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0.4)}50%{box-shadow:0 0 0 6px rgba(245,158,11,0)}}
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 50px; font-size: 12px; z-index: 200; display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<div id="toast" class="toast"></div>

<!-- Mobile Menu Toggle -->
<button id="menuToggle" class="fixed bottom-20 left-4 z-50 bg-blue-900 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center md:hidden">
    <i class="fa-solid fa-bars text-xl"></i>
</button>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 overflow-y-auto">
    <div class="p-5 border-b"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gradient-to-r from-blue-900 to-orange-600 rounded-full flex items-center justify-center text-white font-bold text-xl">S</div><div><h2 class="font-black text-blue-900">Suriyanwa</h2><p class="text-[10px] text-gray-500">Seller Portal</p></div></div></div>
    <nav class="p-3">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-line w-5"></i><span class="text-sm font-medium">Dashboard</span></a>
        <a href="products.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-box w-5"></i><span class="text-sm font-medium">Products</span></a>
        <a href="orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-orange-50 text-orange-600 mb-1"><i class="fa-solid fa-truck w-5"></i><span class="text-sm font-medium">Orders</span></a>
        <a href="payouts.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-wallet w-5"></i><span class="text-sm font-medium">Payouts</span></a>
        <a href="analytics.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-simple w-5"></i><span class="text-sm font-medium">Analytics</span></a>
        <a href="coupons.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-ticket w-5"></i><span class="text-sm font-medium">Coupons</span></a>
        <a href="ads.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-bullhorn w-5"></i><span class="text-sm font-medium">Ad Campaigns</span></a>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-gear w-5"></i><span class="text-sm font-medium">Settings</span></a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t"><button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-red-600 w-full"><i class="fa-solid fa-sign-out-alt w-5"></i><span class="text-sm font-medium">Logout</span></button></div>
</aside>

<!-- Main Content -->
<main class="md:ml-64 p-4 pb-24">
    <div class="flex justify-between items-center mb-4"><div><h1 class="text-2xl font-black text-blue-900">Order Details</h1><p id="orderId" class="text-sm text-gray-500">Loading...</p></div><button onclick="window.history.back()" class="text-gray-500"><i class="fa-solid fa-arrow-left text-xl"></i></button></div>

    <div id="orderContent" class="space-y-4">
        <div class="bg-white rounded-2xl p-5 shadow-sm"><div class="skeleton h-40 w-full"></div></div>
    </div>
</main>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>

<script>
    let sellerData = null;
    const urlParams = new URLSearchParams(window.location.search);
    const bookId = urlParams.get('book_id');
    
    document.addEventListener('DOMContentLoaded', function() { checkAuth(); if(bookId) loadOrderDetail(); else { showToast('Order ID missing','error'); setTimeout(()=>location.href='orders.html',1500); } setupMobileMenu(); });
    
    function checkAuth() { const user = AuthService.getCurrentUser(); if(!user||!user.seller_id) location.href='login.html'; else sellerData=user; }
    
    async function loadOrderDetail() {
        try {
            const response = await fetch(`/api/seller/order-action?book_id=${bookId}&seller_id=${sellerData.seller_id}`, { headers: AuthService.getAuthHeaders() });
            const data = await response.json();
            if(data.success) renderOrderDetail(data.order, data.actions);
            else showToast('Order not found','error');
        } catch(error) { showToast('Failed to load order','error'); }
    }
    
    function renderOrderDetail(order, actions) {
        document.getElementById('orderId').innerHTML = `Order #${order.book_id} • ${order.status_display}`;
        const customer = order.customer;
        const itemsHtml = order.items.map(i => `<div class="flex justify-between py-2 border-b"><div><p class="font-medium">${i.name}</p><p class="text-[10px] text-gray-500">Qty: ${i.quantity}</p></div><p class="font-bold">₹${i.total}</p></div>`).join('');
        const timelineHtml = getTimelineHtml(order);
        const actionButtons = getActionButtons(order, actions);
        
        document.getElementById('orderContent').innerHTML = `
            <div class="bg-white rounded-2xl p-5 shadow-sm"><h3 class="font-bold mb-3">Customer Details</h3><p><strong>${customer.name}</strong><br>${customer.mobile}<br>${customer.email}</p><div class="mt-2 p-2 bg-gray-50 rounded"><p class="text-xs">📍 ${order.address?.address_line1 || order.address}, ${order.address?.city}, ${order.address?.state} - ${order.address?.pincode}</p></div></div>
            <div class="bg-white rounded-2xl p-5 shadow-sm"><h3 class="font-bold mb-3">Items</h3>${itemsHtml}<div class="flex justify-between font-bold pt-2 mt-2 border-t"><span>Total</span><span>₹${order.final_amount}</span></div></div>
            <div class="bg-white rounded-2xl p-5 shadow-sm"><h3 class="font-bold mb-3">Order Timeline</h3>${timelineHtml}</div>
            <div class="flex gap-3">${actionButtons}</div>`;
        
        document.querySelectorAll('.action-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); updateOrderStatus(btn.dataset.action); }));
    }
    
    function getTimelineHtml(order) {
        const steps = ['PENDING','ACCEPTED','PACKED','SHIPPED','OUT_FOR_DELIVERY','DELIVERED'];
        let currentIndex = steps.indexOf(order.status);
        if(order.status==='CANCELLED') currentIndex = -1;
        if(order.status==='RTO') currentIndex = -2;
        let html = '<div class="space-y-4">';
        steps.forEach((step,idx) => {
            let isCompleted = idx <= currentIndex;
            let isActive = idx === currentIndex;
            let date = order[`${step.toLowerCase()}_at`] || null;
            html += `<div class="timeline-step ${isCompleted?'completed':''} ${isActive?'active':''}"><div class="timeline-icon"><i class="fa-solid ${isCompleted?'fa-check':idx===currentIndex?'fa-spinner fa-pulse':'fa-clock'}"></i></div><div><p class="font-medium">${step.replace('_',' ')}</p><p class="text-[10px] text-gray-400">${date?formatDate(date):'Pending'}</p></div></div>`;
        });
        if(order.status==='CANCELLED') html += `<div class="timeline-step completed"><div class="timeline-icon bg-red-500"><i class="fa-solid fa-times"></i></div><div><p class="font-medium">Cancelled</p><p class="text-[10px] text-gray-400">${formatDate(order.cancelled_at)}</p></div></div>`;
        if(order.status==='RTO') html += `<div class="timeline-step completed"><div class="timeline-icon bg-red-500"><i class="fa-solid fa-undo"></i></div><div><p class="font-medium">Return to Origin</p><p class="text-[10px] text-gray-400">${formatDate(order.cancelled_at)}</p></div></div>`;
        html += '</div>';
        return html;
    }
    
    function getActionButtons(order, actions) {
        let btns = '';
        if(actions.can_accept) btns += `<button data-action="accept" class="action-btn flex-1 bg-green-600 text-white py-2 rounded-xl font-bold">Accept Order</button>`;
        if(actions.can_reject) btns += `<button data-action="reject" class="action-btn flex-1 bg-red-600 text-white py-2 rounded-xl font-bold">Reject Order</button>`;
        if(actions.can_pack) btns += `<button data-action="pack" class="action-btn flex-1 bg-blue-600 text-white py-2 rounded-xl font-bold">Mark as Packed</button>`;
        if(actions.can_ship) btns += `<button data-action="ship" class="action-btn flex-1 bg-purple-600 text-white py-2 rounded-xl font-bold">Mark as Shipped</button>`;
        if(btns==='') btns = `<div class="text-center text-gray-500">No actions available</div>`;
        return btns;
    }
    
    async function updateOrderStatus(action) {
        let reason = '';
        if(action==='reject') { reason = prompt('Reason for rejection:'); if(!reason) return; }
        try {
            const response = await fetch('/api/seller/order-action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ book_id: bookId, seller_id: sellerData.seller_id, action: action, rejection_reason: reason })
            });
            const data = await response.json();
            if(data.success) { showToast(`Order ${action}ed`, 'success'); setTimeout(()=>location.reload(),1000); }
            else showToast(data.error||'Action failed','error');
        } catch(error) { showToast('Action failed','error'); }
    }
    
    function formatDate(d) { if(!d) return 'N/A'; return new Date(d).toLocaleString('en-IN'); }
    function setupMobileMenu() { const menuBtn=document.getElementById('menuToggle'),sidebar=document.getElementById('sidebar'); if(menuBtn&&sidebar) menuBtn.addEventListener('click',()=>{ sidebar.classList.toggle('open'); sidebar.style.transform=sidebar.classList.contains('open')?'translateX(0)':'translateX(-100%)'; }); }
    function logout() { AuthService.logout(); location.href='login.html'; }
    function showToast(msg,type) { const toast=document.getElementById('toast'); toast.textContent=msg; toast.style.backgroundColor=type==='error'?'#ef4444':type==='warning'?'#f59e0b':'#10b981'; toast.style.display='block'; setTimeout(()=>{ toast.style.display='none'; },2000); }
</script>
</body>
</html>
