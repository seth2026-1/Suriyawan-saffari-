<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Payouts - Suriyanwa Saffari Seller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .sidebar { transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 50px; font-size: 12px; z-index: 200; display: none; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<div id="toast" class="toast"></div>

<!-- Mobile Menu Toggle -->
<button id="menuToggle" class="fixed bottom-20 left-4 z-50 bg-blue-900 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center md:hidden">
    <i class="fa-solid fa-bars text-xl"></i>
</button>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 overflow-y-auto">
    <div class="p-5 border-b"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gradient-to-r from-blue-900 to-orange-600 rounded-full flex items-center justify-center text-white font-bold text-xl">S</div><div><h2 class="font-black text-blue-900">Suriyanwa</h2><p class="text-[10px] text-gray-500">Seller Portal</p></div></div></div>
    <nav class="p-3">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-line w-5"></i><span class="text-sm font-medium">Dashboard</span></a>
        <a href="products.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-box w-5"></i><span class="text-sm font-medium">Products</span></a>
        <a href="orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-truck w-5"></i><span class="text-sm font-medium">Orders</span></a>
        <a href="payouts.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-orange-50 text-orange-600 mb-1"><i class="fa-solid fa-wallet w-5"></i><span class="text-sm font-medium">Payouts</span></a>
        <a href="analytics.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-simple w-5"></i><span class="text-sm font-medium">Analytics</span></a>
        <a href="coupons.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-ticket w-5"></i><span class="text-sm font-medium">Coupons</span></a>
        <a href="ads.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-bullhorn w-5"></i><span class="text-sm font-medium">Ad Campaigns</span></a>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-gear w-5"></i><span class="text-sm font-medium">Settings</span></a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t"><button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-red-600 w-full"><i class="fa-solid fa-sign-out-alt w-5"></i><span class="text-sm font-medium">Logout</span></button></div>
</aside>

<!-- Main Content -->
<main class="md:ml-64 p-4 pb-24">
    <div class="flex justify-between items-center mb-6"><div><h1 class="text-2xl font-black text-blue-900">Payouts</h1><p class="text-sm text-gray-500">Manage your earnings</p></div></div>

    <!-- Wallet Balance Card -->
    <div class="bg-gradient-to-r from-blue-900 to-blue-800 rounded-2xl p-5 text-white mb-6">
        <p class="text-sm opacity-80">Available Balance</p>
        <p id="walletBalance" class="text-3xl font-black">₹0</p>
        <button onclick="openClaimModal()" id="claimBtn" class="mt-3 bg-orange-500 px-4 py-2 rounded-xl text-sm font-bold">Request Payout</button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="bg-white rounded-xl p-3 text-center shadow-sm"><p class="text-[10px] text-gray-400">Total Earned</p><p id="totalEarned" class="text-xl font-black text-green-600">₹0</p></div>
        <div class="bg-white rounded-xl p-3 text-center shadow-sm"><p class="text-[10px] text-gray-400">Pending Payouts</p><p id="pendingPayouts" class="text-xl font-black text-yellow-600">₹0</p></div>
    </div>

    <!-- Tabs -->
    <div class="border-b bg-white mb-4 flex"><button class="tab-btn flex-1 py-3 text-sm font-bold text-orange-600 border-b-2 border-orange-600" data-tab="transactions" onclick="switchTab('transactions')">Transactions</button><button class="tab-btn flex-1 py-3 text-sm font-bold text-gray-500" data-tab="payouts" onclick="switchTab('payouts')">Payout History</button></div>

    <!-- Transactions Tab -->
    <div id="transactionsTab" class="space-y-2"><div class="skeleton h-16 rounded-xl"></div><div class="skeleton h-16 rounded-xl"></div></div>

    <!-- Payouts Tab -->
    <div id="payoutsTab" class="space-y-2 hidden"><div class="skeleton h-20 rounded-xl"></div><div class="skeleton h-20 rounded-xl"></div></div>

    <!-- Claim Modal -->
    <div id="claimModal" class="fixed inset-0 bg-black/50 z-[200] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-5"><h3 class="font-bold text-lg mb-3">Request Payout</h3>
            <div class="space-y-3"><div><label class="text-xs font-medium">Amount (Min ₹500)</label><input type="number" id="claimAmount" class="w-full border rounded-xl p-3 text-sm mt-1"><p id="maxAmountMsg" class="text-[10px] text-gray-400 mt-1">Max: ₹<span id="maxAmount">0</span></p></div>
            <div><label class="text-xs font-medium">UPI ID</label><input type="text" id="upiId" class="w-full border rounded-xl p-3 text-sm mt-1" placeholder="username@ybl"></div>
            <div class="bg-yellow-50 p-3 rounded-xl"><p class="text-[10px] text-yellow-800">TDS of 1% will be deducted</p></div></div>
            <div class="flex gap-3 mt-5"><button onclick="closeClaimModal()" class="flex-1 border border-gray-300 py-2 rounded-xl">Cancel</button><button onclick="submitClaim()" class="flex-1 bg-orange-600 text-white py-2 rounded-xl font-bold">Request</button></div>
        </div>
    </div>
</main>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>

<script>
    let sellerData = null;
    let walletData = null;
    
    document.addEventListener('DOMContentLoaded', function() { checkAuth(); loadPayouts(); setupMobileMenu(); });
    
    function checkAuth() { const user = AuthService.getCurrentUser(); if(!user||!user.seller_id) location.href='login.html'; else sellerData=user; }
    
    async function loadPayouts() {
        try {
            const response = await fetch(`/api/seller/payouts?seller_id=${sellerData.seller_id}`, { headers: AuthService.getAuthHeaders() });
            const data = await response.json();
            if(data.success) {
                walletData = data;
                document.getElementById('walletBalance').innerHTML = `₹${data.seller.wallet_balance || 0}`;
                document.getElementById('totalEarned').innerHTML = `₹${data.earnings.net_earnings || 0}`;
                document.getElementById('pendingPayouts').innerHTML = `₹${data.wallet.pending_payouts || 0}`;
                document.getElementById('maxAmount').innerText = data.seller.wallet_balance;
                renderTransactions(data.transactions);
                renderPayouts(data.payouts);
            }
        } catch(error) { console.error('Error loading payouts:', error); showToast('Failed to load data', 'error'); }
    }
    
    function renderTransactions(transactions) {
        const container = document.getElementById('transactionsTab');
        if(!transactions||transactions.length===0) { container.innerHTML='<div class="text-center text-gray-500 py-4">No transactions</div>'; return; }
        let html='';
        transactions.forEach(t=>{ html+=`<div class="bg-white rounded-xl p-3 flex justify-between items-center border border-gray-100"><div><p class="text-xs font-bold ${t.type==='credit'?'text-green-600':'text-red-600'}">${t.type==='credit'?'+':'−'} ₹${t.amount}</p><p class="text-[9px] text-gray-400">${t.reason}</p></div><p class="text-[9px] text-gray-400">${formatDate(t.created_at)}</p></div>`; });
        container.innerHTML=html;
    }
    
    function renderPayouts(payouts) {
        const container = document.getElementById('payoutsTab');
        if(!payouts||payouts.length===0) { container.innerHTML='<div class="text-center text-gray-500 py-4">No payout requests</div>'; return; }
        let html='';
        payouts.forEach(p=>{ html+=`<div class="bg-white rounded-xl p-3 border border-gray-100"><div class="flex justify-between"><p class="text-xs font-mono">#${p.payout_id}</p><span class="px-2 py-0.5 rounded-full text-[9px] font-bold ${getStatusColor(p.status)}">${p.status}</span></div><div class="flex justify-between mt-2"><div><p class="text-sm font-bold">₹${p.amount}</p><p class="text-[9px] text-gray-400">Requested: ${formatDate(p.requested_at)}</p></div><div class="text-right"><p class="text-[10px] text-gray-500">Net: ₹${p.net_amount}</p>${p.utr_number?`<p class="text-[9px] text-green-600">UTR: ${p.utr_number}</p>`:''}</div></div></div>`; });
        container.innerHTML=html;
    }
    
    function getStatusColor(status) { const colors={PENDING:'bg-yellow-100 text-yellow-800',PROCESSING:'bg-blue-100 text-blue-800',COMPLETED:'bg-green-100 text-green-800',FAILED:'bg-red-100 text-red-800'}; return colors[status]||'bg-gray-100 text-gray-600'; }
    
    function openClaimModal() { if(walletData?.seller?.wallet_balance<500) { showToast('Minimum ₹500 required','warning'); return; } document.getElementById('claimModal').classList.add('flex'); document.getElementById('claimModal').classList.remove('hidden'); document.getElementById('claimAmount').value = walletData?.seller?.wallet_balance||0; }
    function closeClaimModal() { document.getElementById('claimModal').classList.remove('flex'); document.getElementById('claimModal').classList.add('hidden'); }
    
    async function submitClaim() {
        const amount = parseInt(document.getElementById('claimAmount').value);
        const upiId = document.getElementById('upiId').value;
        if(!amount||amount<500) { showToast('Min ₹500','warning'); return; }
        if(amount>walletData.seller.wallet_balance) { showToast('Amount exceeds balance','warning'); return; }
        if(!upiId) { showToast('UPI ID required','warning'); return; }
        try {
            const response = await fetch('/api/seller/claim-payout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ seller_id: sellerData.seller_id, amount: amount, upi_id: upiId })
            });
            const data = await response.json();
            if(data.success) { showToast('Payout request submitted!','success'); closeClaimModal(); loadPayouts(); }
            else showToast(data.error||'Request failed','error');
        } catch(error) { showToast('Request failed','error'); }
    }
    
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn=>{ btn.classList.remove('text-orange-600','border-orange-600'); btn.classList.add('text-gray-500'); });
        document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('text-orange-600','border-orange-600');
        document.getElementById('transactionsTab').classList.add('hidden'); document.getElementById('payoutsTab').classList.add('hidden');
        document.getElementById(`${tab}Tab`).classList.remove('hidden');
    }
    
    function formatDate(d) { if(!d) return 'N/A'; return new Date(d).toLocaleDateString('en-IN'); }
    function setupMobileMenu() { const menuBtn=document.getElementById('menuToggle'),sidebar=document.getElementById('sidebar'); if(menuBtn&&sidebar) menuBtn.addEventListener('click',()=>{ sidebar.classList.toggle('open'); sidebar.style.transform=sidebar.classList.contains('open')?'translateX(0)':'translateX(-100%)'; }); }
    function logout() { AuthService.logout(); location.href='login.html'; }
    function showToast(msg,type) { const toast=document.getElementById('toast'); toast.textContent=msg; toast.style.backgroundColor=type==='error'?'#ef4444':type==='warning'?'#f59e0b':'#10b981'; toast.style.display='block'; setTimeout(()=>{ toast.style.display='none'; },2000); }
</script>
</body>
</html>
