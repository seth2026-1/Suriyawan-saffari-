<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>My Products - Suriyanwa Saffari Seller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .sidebar { transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        .product-card { transition: all 0.2s; }
        .product-card:active { transform: scale(0.98); }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 12px;
            z-index: 200;
            display: none;
        }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<div id="toast" class="toast"></div>

<!-- Mobile Menu Toggle -->
<button id="menuToggle" class="fixed bottom-20 left-4 z-50 bg-blue-900 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center md:hidden">
    <i class="fa-solid fa-bars text-xl"></i>
</button>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 overflow-y-auto">
    <div class="p-5 border-b">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-r from-blue-900 to-orange-600 rounded-full flex items-center justify-center text-white font-bold text-xl">S</div>
            <div>
                <h2 class="font-black text-blue-900">Suriyanwa</h2>
                <p class="text-[10px] text-gray-500">Seller Portal</p>
            </div>
        </div>
    </div>
    <nav class="p-3">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1">
            <i class="fa-solid fa-chart-line w-5"></i>
            <span class="text-sm font-medium">Dashboard</span>
        </a>
        <a href="products.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-orange-50 text-orange-600 mb-1">
            <i class="fa-solid fa-box w-5"></i>
            <span class="text-sm font-medium">Products</span>
        </a>
        <a href="orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1">
            <i class="fa-solid fa-truck w-5"></i>
            <span class="text-sm font-medium">Orders</span>
        </a>
        <a href="payouts.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1">
            <i class="fa-solid fa-wallet w-5"></i>
            <span class="text-sm font-medium">Payouts</span>
        </a>
        <a href="analytics.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1">
            <i class="fa-solid fa-chart-simple w-5"></i>
            <span class="text-sm font-medium">Analytics</span>
        </a>
        <a href="coupons.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1">
            <i class="fa-solid fa-ticket w-5"></i>
            <span class="text-sm font-medium">Coupons</span>
        </a>
        <a href="ads.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1">
            <i class="fa-solid fa-bullhorn w-5"></i>
            <span class="text-sm font-medium">Ad Campaigns</span>
        </a>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1">
            <i class="fa-solid fa-gear w-5"></i>
            <span class="text-sm font-medium">Settings</span>
        </a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t">
        <button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-red-600 w-full">
            <i class="fa-solid fa-sign-out-alt w-5"></i>
            <span class="text-sm font-medium">Logout</span>
        </button>
    </div>
</aside>

<!-- Main Content -->
<main class="md:ml-64 p-4 pb-24">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
        <div>
            <h1 class="text-2xl font-black text-blue-900">My Products</h1>
            <p class="text-sm text-gray-500">Manage your inventory</p>
        </div>
        <button onclick="location.href='add-product.html'" class="bg-blue-900 text-white px-4 py-2 rounded-xl text-sm font-bold active:scale-95 transition">
            <i class="fa-solid fa-plus mr-1"></i> Add New Product
        </button>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
        <div class="bg-white rounded-xl p-3 text-center shadow-sm">
            <p class="text-2xl font-black text-blue-900" id="totalProducts">0</p>
            <p class="text-[9px] text-gray-500">Total</p>
        </div>
        <div class="bg-white rounded-xl p-3 text-center shadow-sm">
            <p class="text-2xl font-black text-green-600" id="activeProducts">0</p>
            <p class="text-[9px] text-gray-500">Active</p>
        </div>
        <div class="bg-white rounded-xl p-3 text-center shadow-sm">
            <p class="text-2xl font-black text-yellow-600" id="pendingProducts">0</p>
            <p class="text-[9px] text-gray-500">Pending Approval</p>
        </div>
        <div class="bg-white rounded-xl p-3 text-center shadow-sm">
            <p class="text-2xl font-black text-red-600" id="lowStockProducts">0</p>
            <p class="text-[9px] text-gray-500">Low Stock</p>
        </div>
        <div class="bg-white rounded-xl p-3 text-center shadow-sm">
            <p class="text-2xl font-black text-gray-600" id="outStockProducts">0</p>
            <p class="text-[9px] text-gray-500">Out of Stock</p>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl p-3 mb-4 flex flex-wrap gap-2 items-center">
        <input type="text" id="searchInput" placeholder="Search products..." class="flex-1 border rounded-lg px-3 py-2 text-sm">
        <select id="statusFilter" class="border rounded-lg px-3 py-2 text-sm">
            <option value="all">All Products</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="pending">Pending Approval</option>
            <option value="low_stock">Low Stock</option>
            <option value="out_of_stock">Out of Stock</option>
        </select>
        <button onclick="applyFilters()" class="bg-blue-900 text-white px-4 py-2 rounded-lg text-sm">Filter</button>
    </div>

    <!-- Products Grid -->
    <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="skeleton h-48 rounded-xl"></div>
        <div class="skeleton h-48 rounded-xl"></div>
        <div class="skeleton h-48 rounded-xl"></div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="flex justify-center gap-2 mt-6"></div>
</main>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>

<script>
    let sellerData = null;
    let products = [];
    let currentPage = 1;
    let totalPages = 1;
    let currentFilter = 'all';
    let searchQuery = '';
    
    document.addEventListener('DOMContentLoaded', function() {
        checkAuth();
        loadProducts();
        setupMobileMenu();
        
        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            searchQuery = e.target.value;
            applyFilters();
        });
    });
    
    function checkAuth() {
        const user = AuthService.getCurrentUser();
        if (!user || !user.seller_id) {
            location.href = 'login.html';
            return;
        }
        sellerData = user;
    }
    
    async function loadProducts() {
        if (!sellerData) return;
        
        try {
            let url = `/api/seller/products?seller_id=${sellerData.seller_id}&page=${currentPage}&limit=12`;
            if (currentFilter !== 'all') url += `&status=${currentFilter}`;
            if (searchQuery) url += `&search=${encodeURIComponent(searchQuery)}`;
            
            const response = await fetch(url, {
                headers: AuthService.getAuthHeaders()
            });
            const data = await response.json();
            
            if (data.success) {
                products = data.products;
                totalPages = data.pagination.total_pages;
                updateStats(data.stats);
                renderProducts();
                renderPagination();
            }
        } catch (error) {
            console.error('Error loading products:', error);
            showToast('Failed to load products', 'error');
        }
    }
    
    function updateStats(stats) {
        document.getElementById('totalProducts').innerText = stats.total || 0;
        document.getElementById('activeProducts').innerText = stats.active || 0;
        document.getElementById('pendingProducts').innerText = stats.pending_approval || 0;
        document.getElementById('lowStockProducts').innerText = stats.low_stock || 0;
        document.getElementById('outStockProducts').innerText = stats.out_of_stock || 0;
    }
    
    function renderProducts() {
        const container = document.getElementById('productsGrid');
        if (!products || products.length === 0) {
            container.innerHTML = '<div class="col-span-3 text-center py-8 text-gray-500">No products found</div>';
            return;
        }
        
        let html = '';
        products.forEach(product => {
            const statusBadge = product.is_approved ? 
                (product.is_active ? '<span class="text-[9px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full">Active</span>' : '<span class="text-[9px] bg-red-100 text-red-700 px-2 py-0.5 rounded-full">Inactive</span>') :
                '<span class="text-[9px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">Pending</span>';
            
            html += `
                <div class="product-card bg-white rounded-xl border border-gray-100 overflow-hidden shadow-sm">
                    <img src="${product.images?.[0] || 'https://via.placeholder.com/300/f9f9f9/000?text=Product'}" class="w-full h-40 object-cover">
                    <div class="p-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-sm text-gray-800 line-clamp-2">${product.name}</h3>
                                <p class="text-[10px] text-gray-500 mt-0.5">${product.category_name || 'Uncategorized'}</p>
                            </div>
                            ${statusBadge}
                        </div>
                        <div class="flex justify-between items-center mt-2">
                            <div>
                                <p class="text-sm font-bold text-blue-900">₹${product.selling_price}</p>
                                <p class="text-[9px] text-gray-400 line-through">₹${product.mrp}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-bold ${product.stock <= 5 ? 'text-red-600' : 'text-green-600'}">Stock: ${product.stock}</p>
                                <p class="text-[9px] text-gray-400">Sold: ${product.total_sold || 0}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 mt-3">
                            <button onclick="location.href='edit-product.html?prod_id=${product.prod_id}'" class="flex-1 bg-gray-100 text-gray-700 py-1.5 rounded-lg text-xs font-medium">Edit</button>
                            <button onclick="toggleProductStatus('${product.prod_id}', ${!product.is_active})" class="flex-1 ${product.is_active ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'} py-1.5 rounded-lg text-xs font-medium">
                                ${product.is_active ? 'Deactivate' : 'Activate'}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    function renderPagination() {
        const container = document.getElementById('pagination');
        if (totalPages <= 1) {
            container.innerHTML = '';
            return;
        }
        
        let html = '';
        for (let i = 1; i <= totalPages; i++) {
            html += `<button onclick="goToPage(${i})" class="w-8 h-8 rounded-lg ${i === currentPage ? 'bg-blue-900 text-white' : 'bg-gray-100 text-gray-600'} text-sm">${i}</button>`;
        }
        container.innerHTML = html;
    }
    
    function goToPage(page) {
        currentPage = page;
        loadProducts();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function applyFilters() {
        currentPage = 1;
        currentFilter = document.getElementById('statusFilter').value;
        loadProducts();
    }
    
    async function toggleProductStatus(prodId, activate) {
        try {
            const response = await fetch('/api/seller/products', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prod_id: prodId,
                    seller_id: sellerData.seller_id,
                    is_active: activate
                })
            });
            
            const data = await response.json();
            if (data.success) {
                showToast(activate ? 'Product activated' : 'Product deactivated', 'success');
                loadProducts();
            } else {
                showToast(data.error || 'Operation failed', 'error');
            }
        } catch (error) {
            showToast('Operation failed', 'error');
        }
    }
    
    function setupMobileMenu() {
        const menuBtn = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        if (menuBtn && sidebar) {
            menuBtn.addEventListener('click', () => {
                sidebar.classList.toggle('open');
                if (sidebar.classList.contains('open')) {
                    sidebar.style.transform = 'translateX(0)';
                } else {
                    sidebar.style.transform = 'translateX(-100%)';
                }
            });
        }
    }
    
    function logout() {
        AuthService.logout();
        location.href = 'login.html';
    }
    
    function showToast(message, type) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.backgroundColor = type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#10b981';
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }
</script>
</body>
</html>
