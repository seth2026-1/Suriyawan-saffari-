<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Analytics - Suriyanwa Saffari Seller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .sidebar { transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 50px; font-size: 12px; z-index: 200; display: none; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<div id="toast" class="toast"></div>

<!-- Mobile Menu Toggle -->
<button id="menuToggle" class="fixed bottom-20 left-4 z-50 bg-blue-900 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center md:hidden">
    <i class="fa-solid fa-bars text-xl"></i>
</button>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 overflow-y-auto">
    <div class="p-5 border-b"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gradient-to-r from-blue-900 to-orange-600 rounded-full flex items-center justify-center text-white font-bold text-xl">S</div><div><h2 class="font-black text-blue-900">Suriyanwa</h2><p class="text-[10px] text-gray-500">Seller Portal</p></div></div></div>
    <nav class="p-3">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-line w-5"></i><span class="text-sm font-medium">Dashboard</span></a>
        <a href="products.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-box w-5"></i><span class="text-sm font-medium">Products</span></a>
        <a href="orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-truck w-5"></i><span class="text-sm font-medium">Orders</span></a>
        <a href="payouts.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-wallet w-5"></i><span class="text-sm font-medium">Payouts</span></a>
        <a href="analytics.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-orange-50 text-orange-600 mb-1"><i class="fa-solid fa-chart-simple w-5"></i><span class="text-sm font-medium">Analytics</span></a>
        <a href="coupons.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-ticket w-5"></i><span class="text-sm font-medium">Coupons</span></a>
        <a href="ads.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-bullhorn w-5"></i><span class="text-sm font-medium">Ad Campaigns</span></a>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-gear w-5"></i><span class="text-sm font-medium">Settings</span></a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t"><button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-red-600 w-full"><i class="fa-solid fa-sign-out-alt w-5"></i><span class="text-sm font-medium">Logout</span></button></div>
</aside>

<!-- Main Content -->
<main class="md:ml-64 p-4 pb-24">
    <div class="flex justify-between items-center mb-6"><div><h1 class="text-2xl font-black text-blue-900">Analytics</h1><p class="text-sm text-gray-500">Track your sales performance</p></div>
        <select id="periodSelect" class="border rounded-lg px-3 py-2 text-sm"><option value="week">Last 7 Days</option><option value="month">Last 30 Days</option><option value="year">Last 12 Months</option><option value="custom">Custom Range</option></select>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div class="bg-white rounded-xl p-3 shadow-sm"><p class="text-[9px] text-gray-400">Total Revenue</p><p id="totalRevenue" class="text-xl font-black text-green-600">₹0</p></div>
        <div class="bg-white rounded-xl p-3 shadow-sm"><p class="text-[9px] text-gray-400">Total Orders</p><p id="totalOrders" class="text-xl font-black text-blue-900">0</p></div>
        <div class="bg-white rounded-xl p-3 shadow-sm"><p class="text-[9px] text-gray-400">Avg Order Value</p><p id="avgOrderValue" class="text-xl font-black text-purple-600">₹0</p></div>
        <div class="bg-white rounded-xl p-3 shadow-sm"><p class="text-[9px] text-gray-400">RTO Rate</p><p id="rtoRate" class="text-xl font-black text-red-600">0%</p></div>
    </div>

    <!-- Sales Chart -->
    <div class="bg-white rounded-2xl shadow-sm p-4 mb-6"><canvas id="salesChart" height="200"></canvas></div>

    <!-- Top Products -->
    <div class="bg-white rounded-2xl shadow-sm mb-6"><div class="px-4 py-3 border-b"><h3 class="font-bold text-gray-800">Top Selling Products</h3></div><div id="topProducts" class="divide-y"><div class="skeleton h-16 m-3"></div></div></div>

    <!-- Category Breakdown -->
    <div class="bg-white rounded-2xl shadow-sm"><div class="px-4 py-3 border-b"><h3 class="font-bold text-gray-800">Sales by Category</h3></div><div id="categoryBreakdown" class="p-3"><div class="skeleton h-40 w-full"></div></div></div>
</main>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>

<script>
    let sellerData = null;
    let salesChart = null;
    
    document.addEventListener('DOMContentLoaded', function() { checkAuth(); loadAnalytics('month'); setupMobileMenu(); document.getElementById('periodSelect').addEventListener('change',(e)=>loadAnalytics(e.target.value)); });
    
    function checkAuth() { const user = AuthService.getCurrentUser(); if(!user||!user.seller_id) location.href='login.html'; else sellerData=user; }
    
    async function loadAnalytics(period) {
        try {
            const response = await fetch(`/api/seller/analytics?seller_id=${sellerData.seller_id}&period=${period}`, { headers: AuthService.getAuthHeaders() });
            const data = await response.json();
            if(data.success) {
                const a = data.analytics;
                document.getElementById('totalRevenue').innerHTML = `₹${a.revenue.total}`;
                document.getElementById('totalOrders').innerText = a.orders.total;
                document.getElementById('avgOrderValue').innerHTML = `₹${Math.round(a.orders.average_order_value)}`;
                document.getElementById('rtoRate').innerHTML = `${a.rto_analysis.rto_rate}%`;
                renderSalesChart(a.daily_trends);
                renderTopProducts(a.products.top_selling);
                renderCategoryChart(a.category_breakdown);
            }
        } catch(error) { console.error('Error loading analytics:', error); showToast('Failed to load data', 'error'); }
    }
    
    function renderSalesChart(trends) {
        const ctx = document.getElementById('salesChart').getContext('2d');
        if(salesChart) salesChart.destroy();
        salesChart = new Chart(ctx, {
            type: 'line',
            data: { labels: trends.map(t=>t.date), datasets: [{ label: 'Revenue (₹)', data: trends.map(t=>t.revenue), borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.1)', tension: 0.4, fill: true }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true, ticks: { callback: (v)=>'₹'+v } } } }
        });
    }
    
    function renderTopProducts(products) {
        const container = document.getElementById('topProducts');
        if(!products||products.length===0) { container.innerHTML='<div class="p-4 text-center text-gray-500">No products sold</div>'; return; }
        let html='';
        products.forEach(p=>{ html+=`<div class="p-3 flex justify-between items-center"><div class="flex items-center gap-3"><img src="${p.image||'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-lg object-cover"><div><p class="text-sm font-bold">${p.name}</p><p class="text-[9px] text-gray-500">Sold: ${p.quantity_sold}</p></div></div><p class="text-sm font-bold text-green-600">₹${p.revenue}</p></div>`; });
        container.innerHTML=html;
    }
    
    function renderCategoryChart(categories) {
        const container = document.getElementById('categoryBreakdown');
        if(!categories||categories.length===0) { container.innerHTML='<div class="text-center text-gray-500">No data available</div>'; return; }
        const canvas = document.createElement('canvas');
        canvas.id = 'categoryChart';
        container.innerHTML = '';
        container.appendChild(canvas);
        new Chart(canvas.getContext('2d'), { type: 'pie', data: { labels: categories.map(c=>c.name), datasets: [{ data: categories.map(c=>c.revenue), backgroundColor: ['#f59e0b','#3b82f6','#10b981','#ef4444','#8b5cf6','#ec4899'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } } } });
    }
    
    function setupMobileMenu() { const menuBtn=document.getElementById('menuToggle'),sidebar=document.getElementById('sidebar'); if(menuBtn&&sidebar) menuBtn.addEventListener('click',()=>{ sidebar.classList.toggle('open'); sidebar.style.transform=sidebar.classList.contains('open')?'translateX(0)':'translateX(-100%)'; }); }
    function logout() { AuthService.logout(); location.href='login.html'; }
    function showToast(msg,type) { const toast=document.getElementById('toast'); toast.textContent=msg; toast.style.backgroundColor=type==='error'?'#ef4444':type==='warning'?'#f59e0b':'#10b981'; toast.style.display='block'; setTimeout(()=>{ toast.style.display='none'; },2000); }
</script>
</body>
</html>
