<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Coupons - Suriyanwa Saffari Seller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .sidebar { transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 50px; font-size: 12px; z-index: 200; display: none; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<div id="toast" class="toast"></div>

<!-- Mobile Menu Toggle -->
<button id="menuToggle" class="fixed bottom-20 left-4 z-50 bg-blue-900 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center md:hidden">
    <i class="fa-solid fa-bars text-xl"></i>
</button>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 overflow-y-auto">
    <div class="p-5 border-b"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gradient-to-r from-blue-900 to-orange-600 rounded-full flex items-center justify-center text-white font-bold text-xl">S</div><div><h2 class="font-black text-blue-900">Suriyanwa</h2><p class="text-[10px] text-gray-500">Seller Portal</p></div></div></div>
    <nav class="p-3">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-line w-5"></i><span class="text-sm font-medium">Dashboard</span></a>
        <a href="products.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-box w-5"></i><span class="text-sm font-medium">Products</span></a>
        <a href="orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-truck w-5"></i><span class="text-sm font-medium">Orders</span></a>
        <a href="payouts.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-wallet w-5"></i><span class="text-sm font-medium">Payouts</span></a>
        <a href="analytics.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-simple w-5"></i><span class="text-sm font-medium">Analytics</span></a>
        <a href="coupons.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-orange-50 text-orange-600 mb-1"><i class="fa-solid fa-ticket w-5"></i><span class="text-sm font-medium">Coupons</span></a>
        <a href="ads.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-bullhorn w-5"></i><span class="text-sm font-medium">Ad Campaigns</span></a>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-gear w-5"></i><span class="text-sm font-medium">Settings</span></a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t"><button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-red-600 w-full"><i class="fa-solid fa-sign-out-alt w-5"></i><span class="text-sm font-medium">Logout</span></button></div>
</aside>

<!-- Main Content -->
<main class="md:ml-64 p-4 pb-24">
    <div class="flex justify-between items-center mb-6"><div><h1 class="text-2xl font-black text-blue-900">Coupons</h1><p class="text-sm text-gray-500">Create and manage discount coupons</p></div><button onclick="openCreateModal()" class="bg-blue-900 text-white px-4 py-2 rounded-xl text-sm font-bold"><i class="fa-solid fa-plus mr-1"></i> Create Coupon</button></div>

    <!-- Stats -->
    <div class="grid grid-cols-4 gap-3 mb-6">
        <div class="bg-white rounded-xl p-3 text-center shadow-sm"><p id="totalCoupons" class="text-xl font-black text-blue-900">0</p><p class="text-[9px] text-gray-500">Total</p></div>
        <div class="bg-white rounded-xl p-3 text-center shadow-sm"><p id="activeCoupons" class="text-xl font-black text-green-600">0</p><p class="text-[9px] text-gray-500">Active</p></div>
        <div class="bg-white rounded-xl p-3 text-center shadow-sm"><p id="expiredCoupons" class="text-xl font-black text-red-600">0</p><p class="text-[9px] text-gray-500">Expired</p></div>
        <div class="bg-white rounded-xl p-3 text-center shadow-sm"><p id="totalUsage" class="text-xl font-black text-orange-600">0</p><p class="text-[9px] text-gray-500">Total Used</p></div>
    </div>

    <!-- Coupons List -->
    <div id="couponsList" class="space-y-3"><div class="skeleton h-24 rounded-xl"></div><div class="skeleton h-24 rounded-xl"></div></div>

    <!-- Create Coupon Modal -->
    <div id="createModal" class="fixed inset-0 bg-black/50 z-[200] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full max-h-[85vh] overflow-y-auto"><div class="sticky top-0 bg-white p-4 border-b flex justify-between"><h3 class="font-bold text-lg">Create Coupon</h3><button onclick="closeCreateModal()" class="text-gray-500"><i class="fa-solid fa-times"></i></button></div>
            <div class="p-4 space-y-3"><input type="text" id="couponCode" placeholder="Coupon Code (e.g., SAVE20)" class="w-full border rounded-xl p-3 text-sm uppercase">
                <select id="discountType" class="w-full border rounded-xl p-3 text-sm"><option value="percentage">Percentage (%)</option><option value="fixed">Fixed Amount (₹)</option></select>
                <input type="number" id="discountValue" placeholder="Discount Value" class="w-full border rounded-xl p-3 text-sm">
                <input type="number" id="minOrder" placeholder="Minimum Order Amount" class="w-full border rounded-xl p-3 text-sm">
                <input type="number" id="maxDiscount" placeholder="Max Discount (for percentage)" class="w-full border rounded-xl p-3 text-sm">
                <input type="number" id="usageLimit" placeholder="Usage Limit (optional)" class="w-full border rounded-xl p-3 text-sm">
                <input type="date" id="expiryDate" class="w-full border rounded-xl p-3 text-sm">
                <textarea id="couponDesc" placeholder="Description (optional)" rows="2" class="w-full border rounded-xl p-3 text-sm"></textarea>
                <div class="flex gap-3 pt-2"><button onclick="closeCreateModal()" class="flex-1 border border-gray-300 py-3 rounded-xl">Cancel</button><button onclick="createCoupon()" class="flex-1 bg-blue-900 text-white py-3 rounded-xl font-bold">Create</button></div>
            </div>
        </div>
    </div>
</main>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>

<script>
    let sellerData = null;
    let coupons = [];
    
    document.addEventListener('DOMContentLoaded', function() { checkAuth(); loadCoupons(); setupMobileMenu(); });
    
    function checkAuth() { const user = AuthService.getCurrentUser(); if(!user||!user.seller_id) location.href='login.html'; else sellerData=user; }
    
    async function loadCoupons() {
        try {
            const response = await fetch(`/api/seller/coupons?seller_id=${sellerData.seller_id}`, { headers: AuthService.getAuthHeaders() });
            const data = await response.json();
            if(data.success) {
                coupons = data.coupons;
                updateStats(data.statistics);
                renderCoupons();
            }
        } catch(error) { console.error('Error loading coupons:', error); showToast('Failed to load coupons', 'error'); }
    }
    
    function updateStats(stats) { document.getElementById('totalCoupons').innerText=stats.total||0; document.getElementById('activeCoupons').innerText=stats.active||0; document.getElementById('expiredCoupons').innerText=stats.expired||0; document.getElementById('totalUsage').innerText=stats.total_usage||0; }
    
    function renderCoupons() {
        const container = document.getElementById('couponsList');
        if(!coupons||coupons.length===0) { container.innerHTML='<div class="text-center py-8 text-gray-500">No coupons created yet</div>'; return; }
        let html='';
        coupons.forEach(coupon=>{
            const isExpired = new Date(coupon.expiry_date) < new Date();
            html+=`<div class="bg-white rounded-xl border border-gray-100 p-4"><div class="flex justify-between items-start"><div><p class="font-bold text-blue-900">${coupon.code}</p><p class="text-[9px] text-gray-500">${coupon.discount_type==='percentage'?`${coupon.discount_value}% OFF`:`₹${coupon.discount_value} OFF`}</p></div><span class="px-2 py-0.5 rounded-full text-[9px] font-bold ${coupon.is_active&&!isExpired?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${coupon.is_active&&!isExpired?'Active':'Inactive'}</span></div>
                <div class="flex justify-between items-center mt-2"><div><p class="text-[10px] text-gray-500">Min: ₹${coupon.min_order||0} | Used: ${coupon.used_count||0}/${coupon.usage_limit||'∞'}</p><p class="text-[9px] text-gray-400">Expires: ${formatDate(coupon.expiry_date)}</p></div>
                <div class="flex gap-2"><button onclick="toggleCouponStatus('${coupon.coupon_id}',${!coupon.is_active})" class="text-[10px] ${coupon.is_active?'text-red-500':'text-green-600'}">${coupon.is_active?'Deactivate':'Activate'}</button></div></div></div>`;
        });
        container.innerHTML=html;
    }
    
    function openCreateModal() { document.getElementById('createModal').classList.add('flex'); document.getElementById('createModal').classList.remove('hidden'); document.getElementById('expiryDate').valueAsDate = new Date(Date.now()+30*24*60*60*1000); }
    function closeCreateModal() { document.getElementById('createModal').classList.remove('flex'); document.getElementById('createModal').classList.add('hidden'); }
    
    async function createCoupon() {
        const data = { seller_id: sellerData.seller_id, code: document.getElementById('couponCode').value, discount_type: document.getElementById('discountType').value, discount_value: parseInt(document.getElementById('discountValue').value),
            min_order: parseInt(document.getElementById('minOrder').value)||0, max_discount: parseInt(document.getElementById('maxDiscount').value)||null, usage_limit: parseInt(document.getElementById('usageLimit').value)||null,
            expiry_date: document.getElementById('expiryDate').value, description: document.getElementById('couponDesc').value };
        if(!data.code||!data.discount_value||!data.expiry_date) { showToast('Please fill required fields','warning'); return; }
        try {
            const response = await fetch('/api/seller/coupons', { method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify(data) });
            const result = await response.json();
            if(result.success) { showToast('Coupon created','success'); closeCreateModal(); loadCoupons(); }
            else showToast(result.error||'Creation failed','error');
        } catch(error) { showToast('Creation failed','error'); }
    }
    
    async function toggleCouponStatus(couponId, activate) {
        try {
            const response = await fetch('/api/seller/coupons', { method: 'PUT', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ coupon_id: couponId, seller_id: sellerData.seller_id, is_active: activate }) });
            const data = await response.json();
            if(data.success) { showToast(activate?'Coupon activated':'Coupon deactivated','success'); loadCoupons(); }
            else showToast('Operation failed','error');
        } catch(error) { showToast('Operation failed','error'); }
    }
    
    function formatDate(d) { if(!d) return 'N/A'; return new Date(d).toLocaleDateString('en-IN'); }
    function setupMobileMenu() { const menuBtn=document.getElementById('menuToggle'),sidebar=document.getElementById('sidebar'); if(menuBtn&&sidebar) menuBtn.addEventListener('click',()=>{ sidebar.classList.toggle('open'); sidebar.style.transform=sidebar.classList.contains('open')?'translateX(0)':'translateX(-100%)'; }); }
    function logout() { AuthService.logout(); location.href='login.html'; }
    function showToast(msg,type) { const toast=document.getElementById('toast'); toast.textContent=msg; toast.style.backgroundColor=type==='error'?'#ef4444':type==='warning'?'#f59e0b':'#10b981'; toast.style.display='block'; setTimeout(()=>{ toast.style.display='none'; },2000); }
</script>
</body>
</html>
