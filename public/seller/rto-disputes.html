<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RTO Disputes - Suriyanwa Saffari Seller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        .sidebar { transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        .dispute-card { transition: all 0.2s; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 50px; font-size: 12px; z-index: 200; display: none; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<div id="toast" class="toast"></div>

<!-- Mobile Menu Toggle -->
<button id="menuToggle" class="fixed bottom-20 left-4 z-50 bg-blue-900 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center md:hidden">
    <i class="fa-solid fa-bars text-xl"></i>
</button>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 overflow-y-auto">
    <div class="p-5 border-b"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gradient-to-r from-blue-900 to-orange-600 rounded-full flex items-center justify-center text-white font-bold text-xl">S</div><div><h2 class="font-black text-blue-900">Suriyanwa</h2><p class="text-[10px] text-gray-500">Seller Portal</p></div></div></div>
    <nav class="p-3">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-line w-5"></i><span class="text-sm font-medium">Dashboard</span></a>
        <a href="products.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-box w-5"></i><span class="text-sm font-medium">Products</span></a>
        <a href="orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-truck w-5"></i><span class="text-sm font-medium">Orders</span></a>
        <a href="payouts.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-wallet w-5"></i><span class="text-sm font-medium">Payouts</span></a>
        <a href="analytics.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-chart-simple w-5"></i><span class="text-sm font-medium">Analytics</span></a>
        <a href="coupons.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-ticket w-5"></i><span class="text-sm font-medium">Coupons</span></a>
        <a href="ads.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-bullhorn w-5"></i><span class="text-sm font-medium">Ad Campaigns</span></a>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 mb-1"><i class="fa-solid fa-gear w-5"></i><span class="text-sm font-medium">Settings</span></a>
        <a href="rto-disputes.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-orange-50 text-orange-600 mb-1"><i class="fa-solid fa-gavel w-5"></i><span class="text-sm font-medium">RTO Disputes</span></a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t"><button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-red-600 w-full"><i class="fa-solid fa-sign-out-alt w-5"></i><span class="text-sm font-medium">Logout</span></button></div>
</aside>

<!-- Main Content -->
<main class="md:ml-64 p-4 pb-24">
    <div class="flex justify-between items-center mb-6"><div><h1 class="text-2xl font-black text-blue-900">RTO Disputes</h1><p class="text-sm text-gray-500">Raise disputes for RTO orders</p></div></div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div class="bg-white rounded-xl p-3 text-center shadow-sm"><p class="text-xl font-black text-red-600" id="totalRto">0</p><p class="text-[9px] text-gray-500">Total RTO</p></div>
        <div class="bg-white rounded-xl p-3 text-center shadow-sm"><p class="text-xl font-black text-yellow-600" id="pendingDisputes">0</p><p class="text-[9px] text-gray-500">Pending</p></div>
        <div class="bg-white rounded-xl p-3 text-center shadow-sm"><p class="text-xl font-black text-green-600" id="resolvedDisputes">0</p><p class="text-[9px] text-gray-500">Resolved</p></div>
        <div class="bg-white rounded-xl p-3 text-center shadow-sm"><p class="text-xl font-black text-blue-600" id="totalAmount">0</p><p class="text-[9px] text-gray-500">RTO Amount (₹)</p></div>
    </div>

    <!-- RTO Orders List -->
    <div id="rtoOrdersList" class="space-y-3">
        <div class="skeleton h-32 rounded-xl"></div>
        <div class="skeleton h-32 rounded-xl"></div>
    </div>

    <!-- Dispute Modal -->
    <div id="disputeModal" class="fixed inset-0 bg-black/50 z-[200] hidden items-end md:items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md max-h-[85vh] overflow-y-auto">
            <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center"><h3 class="font-bold text-lg">Raise Dispute</h3><button onclick="closeDisputeModal()" class="w-8 h-8 rounded-full bg-gray-100"><i class="fa-solid fa-times"></i></button></div>
            <div class="p-4 space-y-4">
                <div><p class="text-sm font-medium">Order ID: <span id="disputeOrderId"></span></p></div>
                <div><label class="text-sm font-medium block mb-1">Reason *</label><select id="disputeReason" class="w-full border rounded-xl p-3 text-sm"><option value="">Select reason</option><option value="Customer rejected but product fine">Customer rejected but product fine</option><option value="Wrong address provided">Wrong address provided</option><option value="Delivery attempted but customer not available">Delivery attempted but customer not available</option><option value="Area not serviceable">Area not serviceable</option><option value="Product damaged in transit">Product damaged in transit</option><option value="Other">Other</option></select></div>
                <div><label class="text-sm font-medium block mb-1">Description</label><textarea id="disputeDesc" rows="3" class="w-full border rounded-xl p-3 text-sm" placeholder="Provide details..."></textarea></div>
                <div><label class="text-sm font-medium block mb-1">Upload Photo/Proof</label><input type="file" id="disputePhoto" accept="image/*" class="w-full border rounded-xl p-2 text-sm"></div>
                <div><label class="text-sm font-medium block mb-1">Claim Amount</label><input type="number" id="claimAmount" class="w-full border rounded-xl p-3 text-sm" placeholder="Amount claimed"></div>
            </div>
            <div class="sticky bottom-0 bg-white p-4 border-t flex gap-3"><button onclick="closeDisputeModal()" class="flex-1 border border-gray-300 py-3 rounded-xl">Cancel</button><button onclick="submitDispute()" class="flex-1 bg-orange-600 text-white py-3 rounded-xl font-bold">Submit Dispute</button></div>
        </div>
    </div>
</main>

<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/common.js"></script>

<script>
    let sellerData = null;
    let rtoOrders = [];
    let selectedOrder = null;
    
    document.addEventListener('DOMContentLoaded', function() { checkAuth(); loadRtoOrders(); setupMobileMenu(); });
    
    function checkAuth() { const user = AuthService.getCurrentUser(); if(!user||!user.seller_id) location.href='login.html'; else sellerData=user; }
    
    async function loadRtoOrders() {
        try {
            const response = await fetch(`/api/seller/rto-dispute?seller_id=${sellerData.seller_id}`, { headers: AuthService.getAuthHeaders() });
            const data = await response.json();
            if(data.success) {
                rtoOrders = data.rto_orders;
                updateStats(data.statistics);
                renderRtoOrders();
            }
        } catch(error) { console.error('Error loading RTO orders:', error); showToast('Failed to load RTO orders', 'error'); }
    }
    
    function updateStats(stats) {
        document.getElementById('totalRto').innerText = stats.total_rto || 0;
        document.getElementById('pendingDisputes').innerText = stats.disputed || 0;
        document.getElementById('resolvedDisputes').innerText = stats.resolved || 0;
        document.getElementById('totalAmount').innerText = stats.total_rto_amount || 0;
    }
    
    function renderRtoOrders() {
        const container = document.getElementById('rtoOrdersList');
        if(!rtoOrders||rtoOrders.length===0) { container.innerHTML='<div class="text-center py-8 text-gray-500">No RTO orders found</div>'; return; }
        let html='';
        rtoOrders.forEach(order => {
            const disputeStatus = order.dispute ? `<span class="ml-2 px-2 py-0.5 rounded-full text-[9px] font-bold ${order.dispute.status==='PENDING'?'bg-yellow-100 text-yellow-800':order.dispute.status==='RESOLVED'?'bg-green-100 text-green-800':'bg-red-100 text-red-800'}">${order.dispute.status}</span>` : '';
            html += `<div class="bg-white rounded-xl border border-gray-100 p-4"><div class="flex justify-between items-start"><div><p class="text-xs font-mono text-gray-500">Order #${order.book_id}</p><p class="text-xs text-gray-500">Customer: ${order.customer?.name}</p></div><span class="px-2 py-0.5 rounded-full text-[9px] font-bold bg-red-100 text-red-800">RTO</span></div>
                <div class="flex justify-between items-center mt-3"><div><p class="text-sm font-bold text-red-600">₹${order.final_amount}</p><p class="text-[9px] text-gray-400">${order.cancelled_at?formatDate(order.cancelled_at):'N/A'}</p></div>
                ${!order.dispute ? `<button onclick="openDisputeModal('${order.book_id}', ${order.final_amount})" class="bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Raise Dispute</button>` : `<button class="bg-gray-100 text-gray-500 px-4 py-2 rounded-lg text-sm">Dispute ${order.dispute.status}</button>`}</div></div>`;
        });
        container.innerHTML = html;
    }
    
    function openDisputeModal(bookId, amount) {
        selectedOrder = bookId;
        document.getElementById('disputeOrderId').innerText = bookId;
        document.getElementById('claimAmount').value = amount;
        document.getElementById('disputeModal').classList.add('flex');
        document.getElementById('disputeModal').classList.remove('hidden');
    }
    
    function closeDisputeModal() { document.getElementById('disputeModal').classList.remove('flex'); document.getElementById('disputeModal').classList.add('hidden'); }
    
    async function submitDispute() {
        const reason = document.getElementById('disputeReason').value;
        const description = document.getElementById('disputeDesc').value;
        const claimAmount = document.getElementById('claimAmount').value;
        if(!reason) { showToast('Please select a reason','warning'); return; }
        try {
            const response = await fetch('/api/seller/rto-dispute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ seller_id: sellerData.seller_id, book_id: selectedOrder, reason: reason, description: description, amount_claimed: parseInt(claimAmount) })
            });
            const data = await response.json();
            if(data.success) { showToast('Dispute raised successfully','success'); closeDisputeModal(); loadRtoOrders(); }
            else showToast(data.error||'Failed to raise dispute','error');
        } catch(error) { showToast('Failed to raise dispute','error'); }
    }
    
    function formatDate(d) { if(!d) return 'N/A'; return new Date(d).toLocaleDateString('en-IN'); }
    function setupMobileMenu() { const menuBtn=document.getElementById('menuToggle'),sidebar=document.getElementById('sidebar'); if(menuBtn&&sidebar) menuBtn.addEventListener('click',()=>{ sidebar.classList.toggle('open'); sidebar.style.transform=sidebar.classList.contains('open')?'translateX(0)':'translateX(-100%)'; }); }
    function logout() { AuthService.logout(); location.href='login.html'; }
    function showToast(msg,type) { const toast=document.getElementById('toast'); toast.textContent=msg; toast.style.backgroundColor=type==='error'?'#ef4444':type==='warning'?'#f59e0b':'#10b981'; toast.style.display='block'; setTimeout(()=>{ toast.style.display='none'; },2000); }
</script>
</body>
</html>
